name: regenerate-goldens

# One-shot helper: re-runs the golden test suite on a Linux runner with the
# `--update-goldens` flag, then commits the new PNG baselines straight to
# the branch. Goldens generated on macOS drift from CI (Linux) due to font
# rendering differences; this keeps the CI baseline canonical.
#
# Delete this workflow file once the goldens are in sync and CI is green.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Update goldens
        run: flutter test --update-goldens test/golden/

      - name: Commit regenerated goldens
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add test/golden/goldens/
          if git diff --cached --quiet; then
            echo "Goldens already in sync — nothing to commit."
          else
            git commit -m "test: regenerate goldens on linux (CI baseline)"
            git push
          fi

      - name: Upload as artifact (fallback for manual integration)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regenerated-goldens
          path: test/golden/goldens/
          retention-days: 7
