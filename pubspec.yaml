name: noma_chat
description: >-
  Plug & play Flutter chat: SDK with REST + real-time client, offline Hive
  cache, UI adapter and ready-to-use UI components for the Nomasystems chat
  backend.
version: 0.9.2

homepage: https://github.com/nomasystems/noma_chat_flutter
repository: https://github.com/nomasystems/noma_chat_flutter
issue_tracker: https://github.com/nomasystems/noma_chat_flutter/issues
documentation: https://pub.dev/documentation/noma_chat/latest/

topics:
  - chat
  - websocket
  - sdk
  - flutter
  - ui-kit

screenshots:
  - description: 'Real-time chat between two users with reactions'
    path: screenshots/realtime_demo.gif
  - description: 'Room list with unread badges and presence indicators'
    path: screenshots/room_list.png
  - description: 'Chat view with message bubbles, reactions and mentions'
    path: screenshots/chat_view.png
  - description: 'Voice recorder with lock gesture'
    path: screenshots/voice_recorder.png
  - description: 'Group info management and member list'
    path: screenshots/group_info.png

platforms:
  android:
  ios:
  macos:
  linux:
  windows:
  web:

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  web_socket_channel: ^3.0.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.8.0
  hive_ce: ^2.19.0
  cached_network_image: ^3.4.1
  emoji_picker_flutter: ^4.3.0
  audioplayers: ^6.1.0
  path_provider: ^2.1.5
  record: ^7.0.0
  url_launcher: ^6.3.1
  html: ^0.15.5
  image_picker: ^1.1.0
  # Bumped to >=9.0.0 because v9 removed `FilePicker.platform.pickFiles`
  # in favour of the static `FilePicker.pickFiles`. Loose upper bound so
  # consumers (e.g. WB/mobile already on ^11) don't hit version-solving
  # conflicts. The narrow surface we use (`FilePicker.pickFiles` with
  # `type`, `allowedExtensions`, `withData`) is stable across 9.x → 11.x.
  file_picker: '>=11.0.0 <12.0.0'
  image_cropper: ^12.2.1
  characters: ^1.4.0
  shared_preferences: ^2.2.0
  uuid: ^4.0.0
  intl: ^0.20.2
  meta: ^1.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  fake_async: ^1.3.0
  build_runner: ^2.4.0
  freezed: ^3.1.0
  json_serializable: ^6.6.1
  golden_toolkit: ^0.15.0
  benchmark_harness: ^2.3.0
