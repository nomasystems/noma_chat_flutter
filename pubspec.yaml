name: noma_chat
description: >-
  Plug & play Flutter chat: SDK with REST + real-time client, offline Hive
  cache, UI adapter and ready-to-use UI components for the Nomasystems chat
  backend.
version: 0.12.1

homepage: https://github.com/nomasystems/noma_chat_flutter
repository: https://github.com/nomasystems/noma_chat_flutter
issue_tracker: https://github.com/nomasystems/noma_chat_flutter/issues
documentation: https://pub.dev/documentation/noma_chat/latest/

topics:
  - chat
  - messaging
  - realtime
  - websocket
  - ui-kit

screenshots:
  - description: 'Real-time chat between two users with reactions'
    path: screenshots/realtime_demo.gif
  - description: 'Room list with unread badges and presence indicators'
    path: screenshots/room_list.png
  - description: 'Chat view with message bubbles, reactions and mentions'
    path: screenshots/chat_view.png
  - description: 'Voice recorder with lock gesture'
    path: screenshots/voice_recorder.png
  - description: 'Group info management and member list'
    path: screenshots/group_info.png

platforms:
  android:
  ios:
  macos:
  linux:
  windows:
  web:

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  web_socket_channel: ^3.0.0
  freezed_annotation: ^3.0.0
  hive_ce: ^2.19.0
  cached_network_image: ^3.4.1
  emoji_picker_flutter: ^4.3.0
  audioplayers: ^6.1.0
  path_provider: ^2.1.5
  record: ^7.0.0
  url_launcher: ^6.3.1
  # Default "open file/PDF attachment" handler. Opens a downloaded file by its
  # on-disk extension via the OS viewer, independent of the HTTP Content-Type
  # the server returns. Maintained fork of `open_file`.
  open_filex: ^4.7.0
  html: ^0.15.5
  image_picker: ^1.1.0
  # Bumped to >=9.0.0 because v9 removed `FilePicker.platform.pickFiles`
  # in favour of the static `FilePicker.pickFiles`. Loose upper bound so
  # consumers (e.g. WB/mobile already on ^11) don't hit version-solving
  # conflicts. The narrow surface we use (`FilePicker.pickFiles` with
  # `type`, `allowedExtensions`, `withData`) is stable across 9.x â†’ 11.x.
  file_picker: '>=11.0.0 <12.0.0'
  # Capped below 12.x on purpose. Under Swift Package Manager (the Flutter
  # 3.44 default), file_picker pulls DKImagePickerController whose SPM
  # manifest pins `TOCropViewController` to >=2.6.0 <3.0.0, while
  # image_cropper 12.x jumped to `TOCropViewController` ~>3.1.2 â€” the two are
  # mutually exclusive and break the iOS build in any consumer that uses SPM
  # (e.g. WB/mobile). image_cropper 11.x stays on TOCropViewController 2.8.x,
  # which co-resolves cleanly, and exposes the identical Dart API (both 11 and
  # 12 depend on image_cropper_platform_interface ^8.0.0 â€” cropImage /
  # AndroidUiSettings / IOSUiSettings / CropStyle / CropAspectRatioPreset are
  # unchanged). Do NOT bump to ^12 until file_picker's DKImagePickerController
  # moves to TOCropViewController 3.x; otherwise consumers need an
  # SPM-disabling workaround in their own pubspec, which defeats plug & play.
  image_cropper: ^11.0.0
  characters: ^1.4.0
  shared_preferences: ^2.2.0
  uuid: ^4.0.0
  intl: ^0.20.2
  meta: ^1.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  fake_async: ^1.3.0
  build_runner: ^2.4.0
  freezed: ^3.1.0
  alchemist: ^0.12.0
  benchmark_harness: ^2.3.0
