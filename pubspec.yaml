name: noma_chat
description: >-
  Plug & play Flutter chat: SDK with REST + real-time client, offline Hive
  cache, UI adapter and a ready-to-use UI Kit for the Noma chat backend.
version: 0.3.0

homepage: https://github.com/nomasystems/noma_chat_flutter
repository: https://github.com/nomasystems/noma_chat_flutter
issue_tracker: https://github.com/nomasystems/noma_chat_flutter/issues
documentation: https://pub.dev/documentation/noma_chat/latest/

topics:
  - chat
  - websocket
  - sdk
  - flutter
  - ui-kit

platforms:
  android:
  ios:
  macos:
  linux:
  windows:
  web:

environment:
  sdk: ^3.8.0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  web_socket_channel: ^3.0.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.8.0
  hive_ce: ^2.19.0
  cached_network_image: ^3.4.1
  emoji_picker_flutter: ^4.3.0
  audioplayers: ^6.1.0
  path_provider: ^2.1.5
  record: ^6.0.0
  url_launcher: ^6.3.1
  html: ^0.15.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  fake_async: ^1.3.0
  build_runner: ^2.4.0
  freezed: ^3.1.0
  json_serializable: ^6.6.1
  golden_toolkit: ^0.15.0
