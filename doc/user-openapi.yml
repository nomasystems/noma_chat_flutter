            schema:
              type: object
              properties:
                name:
                  type: string
                subject:
                  type: string
                audience:
                  type: string
                  enum:
                    - public
                    - contacts
                    - unrestricted
      responses:
        "204":
          description: Room configuration updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
