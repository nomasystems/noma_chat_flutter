        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
      responses:
        "204":
          description: Room deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /internal/rooms/{roomId}/users:
