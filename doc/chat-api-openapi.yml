openapi: 3.0.1
info:
  title: NChat API
  description: |
    Backend API for the NChat user client. Supports REST, SSE and WebSocket communication modes.

    ## Authentication
    All endpoints (except `/v1/health`) require authentication. Supported methods:

    - **Bearer token**: `Authorization: Bearer <token>`. The token is validated by the
      configured `bearer_auth_mod` behaviour (e.g. JWT validation, external auth service).
    - **Basic auth**: `Authorization: Basic <base64(user:pass)>`. Validated by the
      configured `basic_auth_mod` behaviour.
    - **API Key** (internal endpoints only): `x-api-key` header with a pre-shared key.

    The authentication module is configurable via behaviours. In development mode
    (`always_trust`), basic auth trusts the username and bearer tokens are decoded
    without signature verification.

    ## Rate Limiting
    Authenticated endpoints are rate-limited per user. When enabled, responses include
    `X-RateLimit-Limit`, `X-RateLimit-Remaining`, and `X-RateLimit-Reset` headers.
    When the limit is exceeded, the server responds `429 Too Many Requests`.
    The server does **not** send a `Retry-After` header; clients should derive
    the wait from `X-RateLimit-Reset` (unix seconds until the window resets).

    ## Deprecation policy
    Operations and fields marked `deprecated: true` remain functional for at
    least one release cycle before removal. Deprecated routes may carry
    `Deprecation` and `Sunset` response headers indicating the planned removal.
    Prefer the documented replacement noted in each deprecated operation's
    description.

    ## Error responses
    Error bodies share the shape `{ "code": <int>, "detail": <string> }`. In addition to the
    per-operation `4xx` responses documented below, **any endpoint may return
    `500 Internal Server Error`** on an unexpected fault, and `503 Service Unavailable` when a
    backing dependency (MongoDB, the session store) is transiently unreachable. These
    transversal `5xx` responses are part of the contract but are not repeated on every
    operation to avoid noise.

    ## CORS
    CORS is not handled by the API itself. A reverse proxy or API gateway
    should be configured to add the appropriate CORS headers.

    ## Real-time communication
    In addition to REST endpoints, this API supports:
    - **SSE**: `GET /events` for server-sent events (server -> client)
    - **WebSocket**: `WS /ws` for bidirectional communication

    Both real-time channels can be enabled/disabled by configuration.
  version: 1.0.0
  contact:
    name: Nomasystems
  license:
    name: Proprietary
    url: https://nomasystems.com

servers:
  - url: "https://{host}/v1"
    description: Production Server
    variables:
      host:
        default: chat.nomasystems.com
        description: Server hostname
  - url: "http://localhost:9077/v1"
    description: Local Development (via CORS proxy)
  - url: "http://localhost:8077/v1"
    description: Local Development (direct, no CORS)

security:
  - BearerAuth: []
  - BasicAuth: []

tags:
  - name: users
    description: User management (create, get, delete)
  - name: managed-users
    description: Managed users administration
  - name: contacts
    description: Contact list management
  - name: rooms
    description: Room management (create, configure, members)
  - name: messages
    description: Message operations (send, edit, delete, receipts)
  - name: attachments
    description: File upload and download
  - name: presence
    description: User presence and activity status
  - name: events
    description: Real-time event streams (SSE and WebSocket)
  - name: preferences
    description: Room preferences (mute, pin, hidden)
  - name: read-receipts
    description: Read receipts per room
  - name: message-pins
    description: Pin and unpin individual messages in rooms
  - name: moderation
    description: Room moderation (reports, bans, mutes)
  - name: admin
    description: |
      Admin-only management endpoints (requires admin role).
      Admin GET list endpoints use named wrappers with `hasMore` flag,
      consistent with user-facing endpoints (e.g. `{users: [...], hasMore: boolean}`).
  - name: internal
    description: Internal service-to-service endpoints (requires API key)
  - name: health
    description: Health check endpoint
  - name: reactions
    description: Message reactions (add, remove)
  - name: batch
    description: Batch operations
  - name: content-filter
    description: Content filtering and moderation words
  - name: scheduled-messages
    description: Scheduled message operations

paths:
  # ============================================================
  # USERS
  # ============================================================
  /users:
    get:
      operationId: searchUsers
      summary: Search users by displayName, id, email or bio
      description: >
        Searches across displayName, id, email and bio fields using
        case-insensitive regex matching. Available to any authenticated user.
      tags:
        - users
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
            maxLength: 256
          description: |
            Search term. A single character returns `400`; **two or more**
            characters search across displayName/id/email/bio. When omitted or
            empty the endpoint runs in discovery mode and lists all active users
            (used by the suggestion bar). Capped at 256 characters (`400` if
            exceeded).
        - $ref: "#/components/parameters/queryLimit"
        - $ref: "#/components/parameters/queryOffset"
        - $ref: "#/components/parameters/querySort"
        - $ref: "#/components/parameters/queryOrder"
      responses:
        "200":
          description: List of matching users
          headers:
            X-Total-Count:
              schema:
                type: integer
              description: Total number of matching users before pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserSearchResult"
                  hasMore:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      operationId: createUser
      summary: Create a new chat user from external credentials
      tags:
        - users
      requestBody:
        $ref: "#/components/requestBodies/PostUserRequest"
      responses:
        "201":
          $ref: "#/components/responses/PostUserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /users/{userId}:
    get:
      operationId: getUser
      summary: Get user information
      tags:
        - users
      parameters:
        - $ref: "#/components/parameters/pathUserId"
      responses:
        "200":
          $ref: "#/components/responses/GetUserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    patch:
      operationId: patchUser
      summary: Update user profile or active status
      description: >
        Partial update of user profile fields or user active status.
        Only the fields sent in the request body are updated (merge).
        The authenticated user can edit their own profile; admins can
        edit any user.


        When setting `active: false` (deactivation), the user themselves
        or an admin can do it. Active sessions are terminated.
        When setting `active: true` (reactivation), only admins can do it.
        Deactivated users cannot login or use the API.
        Inactive users do not appear in search results.
      tags:
        - users
      parameters:
        - $ref: "#/components/parameters/pathUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                  maxLength: 128
                avatarUrl:
                  type: string
                  maxLength: 2048
                bio:
                  type: string
                  maxLength: 500
                email:
                  type: string
                  maxLength: 256
                custom:
                  type: object
                  additionalProperties: true
                active:
                  type: boolean
                  description: >
                    User active status. Set to false to deactivate (soft-delete).
                    Only admins can set to true (reactivate). Deactivated users
                    cannot login, their sessions are killed, and they do not
                    appear in search results.
              minProperties: 1
      responses:
        "200":
          $ref: "#/components/responses/GetUserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    delete:
      operationId: deleteUser
      summary: Delete a user
      description: >
        Deletes the authenticated user's own account. The endpoint always
        operates on the authenticated account; the `userId` path parameter
        is informational. Idempotent: returns 204 even if the account is
        already gone.
      tags:
        - users
      parameters:
        - $ref: "#/components/parameters/pathUserId"
        - $ref: "#/components/parameters/headerUserId"
      responses:
        "204":
          description: User deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ============================================================
  # MANAGED USERS
  # ============================================================
  /managed-users:
    get:
      operationId: searchManagedUsers
      summary: Search managed users by external ID
      tags:
        - managed-users
      parameters:
        - name: externalId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/ManagedUserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      operationId: createManagedUsers
      summary: Create managed users for a parent user
      tags:
        - managed-users
      requestBody:
        $ref: "#/components/requestBodies/PostManagedUsersRequest"
      responses:
        "201":
          $ref: "#/components/responses/CreateManagedUsersResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /managed-users/{userId}:
    get:
      x-audience: user
      operationId: getManagedUsers
      summary: Get all managed users for a parent user
      deprecated: true
      description: >-
        Deprecated. Use `GET /users/{parentId}/managed-users` instead, which
        carries the same query parameters and response shape. This path remains
        available for older clients; removal is deferred.
      tags:
        - managed-users
      parameters:
        - $ref: "#/components/parameters/pathUserId"
        - $ref: "#/components/parameters/queryLimit"
        - $ref: "#/components/parameters/queryOffset"
        - $ref: "#/components/parameters/querySort"
        - $ref: "#/components/parameters/queryOrder"
      responses:
        "200":
          $ref: "#/components/responses/ManagedUsersListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    delete:
      x-audience: user
      operationId: deleteManagedUser
      summary: Delete a managed user
      tags:
        - managed-users
      parameters:
        - $ref: "#/components/parameters/pathUserId"
        - $ref: "#/components/parameters/headerUserId"
      responses:
        "204":
          description: Managed user deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /users/{parentId}/managed-users:
    get:
      x-audience: user
      operationId: getManagedUsersByParent
      summary: Get all managed users for a parent user
      description: >-
        Canonical replacement for the deprecated `GET /managed-users/{userId}`
        list endpoint. Returns the managed users owned by `{parentId}` with the
        same query parameters and response shape. The caller must be the parent
        user; otherwise the request is rejected with `403 Forbidden`.
      tags:
        - managed-users
      parameters:
        - $ref: "#/components/parameters/pathParentId"
        - $ref: "#/components/parameters/queryLimit"
        - $ref: "#/components/parameters/queryOffset"
        - $ref: "#/components/parameters/querySort"
        - $ref: "#/components/parameters/queryOrder"
      responses:
        "200":
          $ref: "#/components/responses/ManagedUsersListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /managed-users/{userId}/configuration:
    get:
      operationId: getManagedUserConfiguration
      summary: Get managed user configuration
      tags:
        - managed-users
      parameters:
        - $ref: "#/components/parameters/pathUserId"
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Configuration"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    put:
      operationId: putManagedUserConfiguration
      summary: Update managed user configuration
      tags:
        - managed-users
      parameters:
        - $ref: "#/components/parameters/pathUserId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Configuration"
      responses:
        "204":
          description: Configuration updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ============================================================
  # CONTACTS
  # ============================================================
  /contacts:
    post:
      operationId: addContact
      summary: Add a contact to the user's contact list
      description: |
        Adds a user to the authenticated user's contact list (roster).
        Returns 204 because it modifies an existing roster rather than creating a new resource.
      tags:
        - contacts
      requestBody:
        $ref: "#/components/requestBodies/PostContactRequest"
      responses:
        "204":
          description: Contact added to roster
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    get:
      operationId: getContacts
      summary: Get all contacts of the authenticated user
      tags:
        - contacts
      parameters:
        - $ref: "#/components/parameters/headerUserId"
        - $ref: "#/components/parameters/queryLimit"
        - $ref: "#/components/parameters/queryOffset"
        - $ref: "#/components/parameters/querySort"
        - $ref: "#/components/parameters/queryOrder"
      responses:
        "200":
          $ref: "#/components/responses/ContactsListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /contacts/{userId}:
    delete:
      operationId: deleteContact
      summary: Remove a contact from the user's contact list
      tags:
        - contacts
      parameters:
        - $ref: "#/components/parameters/pathUserId"
        - $ref: "#/components/parameters/headerUserId"
      responses:
        "204":
          description: Contact removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /contacts/{userId}/messages:
    post:
      operationId: sendDirectMessage
      summary: Send a direct message to a contact (1:1)
      description: |
        Direct messages are plain text only. The server reads `text` (required),
        and optionally `reply`, `metadata` and `clientMessageId`; it ignores the
        rich `messageType`/`emoji`/`attachmentUrl`/`referencedMessageId`/`sourceRoomId`
        fields of room sends — reactions, attachments and forwards are not
        supported in DMs.

        **Idempotency.** When `clientMessageId` is supplied the send is
        idempotent over the DM conversation: a retry that replays the same key
        returns the already-persisted message with the same `201` (no
        duplicate). The key round-trips inside the response `metadata`
        (`metadata.clientMessageId`) for optimistic reconciliation.
      tags:
        - contacts
        - messages
      parameters:
        - $ref: "#/components/parameters/pathUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
              properties:
                text:
                  type: string
                  maxLength: 10000
                reply:
                  type: string
                  description: Optional reply text.
                metadata:
                  $ref: "#/components/schemas/Metadata"
                clientMessageId:
                  type: string
                  maxLength: 128
                  description: >-
                    Optional client-generated idempotency key. See the
                    idempotency note above and `NewMessage.clientMessageId`.
      responses:
        "201":
          $ref: "#/components/responses/PostMessageResponse"
        "204":
          description: >-
            Message accepted but not delivered because the recipient has blocked
            the sender (silent drop, WhatsApp parity). No response body.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    get:
      operationId: getDirectMessages
      summary: Get message history with a contact (1:1)
      tags:
        - contacts
        - messages
      parameters:
        - $ref: "#/components/parameters/pathUserId"
        - $ref: "#/components/parameters/headerUserId"
        - $ref: "#/components/parameters/queryBefore"
        - $ref: "#/components/parameters/queryAfter"
        - $ref: "#/components/parameters/queryLimit"
      responses:
        "200":
          $ref: "#/components/responses/MessageListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ============================================================
  # ROOMS
  # ============================================================
  /rooms:
    post:
      operationId: createRoom
      summary: Create a new room
      tags:
        - rooms
      requestBody:
        $ref: "#/components/requestBodies/PostRoomRequest"
      responses:
        "201":
          $ref: "#/components/responses/PostRoomResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    get:
      operationId: getUserRooms
      summary: Get all user rooms with unread info and invitations
      tags:
        - rooms
      parameters:
        - $ref: "#/components/parameters/headerUserId"
        - $ref: "#/components/parameters/queryLimit"
        - $ref: "#/components/parameters/queryOffset"
        - $ref: "#/components/parameters/querySort"
        - $ref: "#/components/parameters/queryOrder"
        - name: type
          in: query
          required: true
          description: "'all' returns all rooms with their unread counts. 'unread' returns only rooms that have unread messages."
          schema:
            type: string
            enum:
              - all
              - unread
      responses:
        "200":
          $ref: "#/components/responses/RoomsListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /rooms/discover:
    get:
      operationId: discoverRooms
      summary: Discover public rooms by name or subject
      description: >
        Searches public rooms (allowinvitations = true) by name and subject
        using case-insensitive regex matching. Rooms where the requesting user
        is already a member are excluded from results. The match set is capped
        at 200 rooms before pagination, so `X-Total-Count` never exceeds 200 and
        offsets beyond that range return no further results.
      tags:
        - rooms
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
          description: Search term (minimum 2 characters)
        - $ref: "#/components/parameters/queryLimit"
        - $ref: "#/components/parameters/queryOffset"
        - $ref: "#/components/parameters/querySort"
        - $ref: "#/components/parameters/queryOrder"
      responses:
        "200":
          description: List of matching public rooms
          headers:
            X-Total-Count:
              schema:
                type: integer
              description: Total number of matching rooms before pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  rooms:
                    type: array
                    items:
                      type: object
                      properties:
                        roomId:
                          type: string
                        name:
                          type: string
                        subject:
                          type: string
                        owner:
                          type: string
                        memberCount:
                          type: integer
                        avatarUrl:
                          type: string
                          nullable: true
                          maxLength: 2048
                        custom:
                          type: object
                          nullable: true
                          additionalProperties: true
                  hasMore:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /rooms/{roomId}:
    get:
      operationId: getRoom
      summary: Get room details
      description: |
        Returns details for a single room. Only members of the room can access this endpoint.
        The member list is not included; use GET /rooms/{roomId}/users for that.
      tags:
        - rooms
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/headerUserId"
      responses:
        "200":
          description: Room details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    delete:
      operationId: deleteRoom
      summary: Delete a room
      tags:
        - rooms
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/headerUserId"
      responses:
        "204":
          description: Room deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /rooms/{roomId}/config:
    put:
      operationId: updateRoomConfig
      summary: Update room configuration (name, subject)
      tags:
        - rooms
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
      requestBody:
        $ref: "#/components/requestBodies/PutRoomConfigRequest"
      responses:
        "204":
          description: Configuration updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /rooms/{roomId}/users:
    get:
      operationId: getRoomUsers
      summary: Get all users in a room
      tags:
        - rooms
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/headerUserId"
        - $ref: "#/components/parameters/queryLimit"
        - $ref: "#/components/parameters/queryOffset"
        - $ref: "#/components/parameters/querySort"
        - $ref: "#/components/parameters/queryOrder"
      responses:
        "200":
          $ref: "#/components/responses/RoomUsersResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      operationId: addRoomUser
      summary: Add, invite or manage user membership in a room
      description: |
        Adds users to a room, sends invitations, or manages invitation status.
        Returns 204 when all operations succeed, 207 when results are mixed
        (some succeed, some fail), or the specific error code when all fail.

        In `invite`/`invite_and_join` modes the `userIds` list is the set of
        targets. In `accept_invitation`/`decline_invitation` modes the action
        always applies to the **authenticated caller** — `userIds` is ignored,
        so a user can only accept or decline their own pending invitation, never
        a third party's (send the caller's own id, or any non-empty list).
        `userIds` is limited to 100 entries per request.
      tags:
        - rooms
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
      requestBody:
        $ref: "#/components/requestBodies/PostRoomUserRequest"
      responses:
        "204":
          description: All operations completed successfully
        "207":
          description: >-
            Multi-Status. Returned when some operations succeed and others fail.
            The response body is an array of per-user results.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - user
                    - result
                  properties:
                    user:
                      $ref: "#/components/schemas/UserId"
                    result:
                      type: string
                      enum: [invited, error]
                    code:
                      type: integer
                      description: HTTP error code (only present when result is "error")
                    detail:
                      type: string
                      description: Error description (only present when result is "error")
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /rooms/{roomId}/users/{userId}:
    delete:
      operationId: removeRoomUser
      summary: Remove another user from a room
      description: Remove another user from the room (requires admin/owner role).
      tags:
        - rooms
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathUserId"
        - $ref: "#/components/parameters/headerUserId"
      responses:
        "204":
          description: User removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /rooms/{roomId}/users/{userId}/leave:
    post:
      operationId: leaveRoom
      summary: Leave a room
      description: Current user leaves the room voluntarily.
      tags:
        - rooms
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathUserId"
        - $ref: "#/components/parameters/headerUserId"
      responses:
        "204":
          description: Left room
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /rooms/{roomId}/users/{userId}/role:
    put:
      operationId: updateRoomUserRole
      summary: Update user role in a room
      description: |
        Sets a member's role. The `{userId}` path parameter identifies the
        target and `role` must be `admin` or `user` (an invalid role returns
        `400`). When the request targets several users at once the response is
        `207 Multi-Status` with a per-user result array.
      tags:
        - rooms
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathUserId"
      requestBody:
        $ref: "#/components/requestBodies/PutRoomUserRoleRequest"
      responses:
        "204":
          description: Role updated
        "207":
          description: >-
            Multi-Status. Returned when several targets are processed and
            results are mixed. The body is an array of per-user results.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - user
                    - result
                  properties:
                    user:
                      $ref: "#/components/schemas/UserId"
                    result:
                      type: string
                    code:
                      type: integer
                      description: HTTP error code (only present when result is an error)
                    detail:
                      type: string
                      description: Error description (only present when result is an error)
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /rooms/{roomId}/users/{userId}/activity:
    put:
      operationId: updateRoomActivity
      summary: Send typing indicator or other activity status in a room
      description: |
        The server reads only `activity`; the `from` field is ignored (the
        authenticated user is the sender). An unknown activity value or a
        malformed body is accepted silently with `204` and has no effect
        (mirrors the DM activity endpoint).
      tags:
        - rooms
        - presence
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathUserId"
      requestBody:
        $ref: "#/components/requestBodies/PutRoomActivityRequest"
      responses:
        "204":
          description: Activity sent (or silently ignored for unknown values)
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ============================================================
  # ROOM PREFERENCES (mute/pin)
  # ============================================================
  /rooms/{roomId}/preferences:
    patch:
      operationId: patchRoomPreferences
      summary: Update the authenticated user's room preferences (unified)
      description: |
        Partially updates the calling user's per-room preferences in a single
        request. Send only the fields you want to change; omitted fields are
        left untouched. Returns the merged effective state.

        `muted` accepts a boolean (`true`/`false`) or an ISO-8601 instant
        string: a string mutes the room until that time (lazy expiry, like
        `PUT /rooms/{roomId}/mute` with `until`), `false` unmutes, `true`
        mutes permanently. `null` is also accepted for `muted` to clear the
        mute. This is the canonical endpoint; the six legacy toggle endpoints
        (`/mute`, `/pin`, `/hidden` PUT/DELETE) remain for backward
        compatibility.
      tags:
        - preferences
        - rooms
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                muted:
                  description: >-
                    `true`/`false` for a permanent mute/unmute, an ISO-8601
                    instant string for a timed mute, or `null` to clear.
                  nullable: true
                  oneOf:
                    - type: boolean
                    - type: string
                      format: date-time
                pinned:
                  type: boolean
                hidden:
                  type: boolean
      responses:
        "200":
          description: Merged preference state after the update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomPreferences"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /rooms/{roomId}/mute:
    put:
      operationId: muteRoom
      summary: Mute a room for the authenticated user
      description: |
        Mutes the room for the calling user. The body is optional: with no body
        (or no `until`) the mute is permanent; supplying `until` mutes only
        until that instant, after which the room reads as unmuted (lazy expiry).
        The room's `muted` flag in listings/detail reflects the current
        effective state. The response does not echo `until`.
      tags:
        - preferences
        - rooms
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                until:
                  type: string
                  format: date-time
                  description: >-
                    ISO-8601 instant until which the room stays muted. Omit for
                    a permanent mute. A non-string value returns `400`.
      responses:
        "200":
          description: Room muted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    delete:
      operationId: unmuteRoom
      summary: Unmute a room for the authenticated user
      tags:
        - preferences
        - rooms
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
      responses:
        "200":
          description: Room unmuted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /rooms/{roomId}/pin:
    put:
      operationId: pinRoom
      summary: Pin a room for the authenticated user
      tags:
        - preferences
        - rooms
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
      responses:
        "200":
          description: Room pinned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    delete:
      operationId: unpinRoom
      summary: Unpin a room for the authenticated user
      tags:
        - preferences
        - rooms
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
      responses:
        "200":
          description: Room unpinned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /rooms/{roomId}/hidden:
    put:
      operationId: hideRoom
      summary: Hide a room from the authenticated user's room list
      tags:
        - preferences
        - rooms
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
      responses:
        "200":
          description: Room hidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    delete:
      operationId: unhideRoom
      summary: Unhide a room for the authenticated user
      tags:
        - preferences
        - rooms
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
      responses:
        "200":
          description: Room unhidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ============================================================
  # READ RECEIPTS
  # ============================================================
  /rooms/{roomId}/read:
    post:
      operationId: markRoomAsRead
      summary: Mark a room as read
      description: |
        Marks a room as read. If `lastReadMessageId` is provided, marks as read up to that
        specific message AND fans out a `receipt_updated` event of status `read` to the
        other room members (so the original sender's client can flip the second tick).
        If omitted, only the room-level `lastReadAt` is persisted and no event is emitted.
      tags:
        - read-receipts
        - rooms
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lastReadMessageId:
                  type: string
                  description: >
                    The ID of the last message that was read. If omitted, all messages
                    in the room are marked as read.
            examples:
              withMessageId:
                summary: Mark read up to specific message
                value:
                  lastReadMessageId: "msg-001"
              withoutMessageId:
                summary: Mark entire room as read
                value: {}
      responses:
        "204":
          description: Read receipt stored successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /rooms/{roomId}/receipts:
    get:
      operationId: getRoomReceipts
      summary: Get read receipt status for all members of a room
      tags:
        - read-receipts
        - rooms
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
      responses:
        "200":
          description: |
            List of receipt rows for all members who confirmed reads or
            deliveries. Each row carries the read fields plus the delivered
            cursor companions (`lastDeliveredMessageId`, `lastDeliveredAt`);
            the delivered companions are masked on rows of users with a block
            relation with the caller.
          content:
            application/json:
              schema:
                type: object
                properties:
                  receipts:
                    type: array
                    items:
                      $ref: "#/components/schemas/ReadReceipt"
                  hasMore:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ============================================================
  # BATCH OPERATIONS
  # ============================================================
  /rooms/batch/read:
    post:
      operationId: batchMarkRoomsAsRead
      summary: Mark multiple rooms as read
      description: |
        Marks multiple rooms as read in a single request. Rooms where the user
        is not a member are silently skipped.
      tags:
        - batch
        - rooms
        - read-receipts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - roomIds
              properties:
                roomIds:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items:
                    type: string
                  description: List of room IDs to mark as read
            examples:
              default:
                summary: Mark several rooms as read
                value:
                  roomIds:
                    - "room1@chat-core.com"
                    - "room2@chat-core.com"
      responses:
        "204":
          description: Rooms marked as read successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /rooms/batch/unread:
    post:
      operationId: batchGetUnreadCounts
      summary: Get unread counts for multiple rooms
      description: |
        Returns unread message counts and last unread message for multiple rooms
        in a single request. Rooms where the user is not a member are silently excluded
        from the response.
      tags:
        - batch
        - rooms
        - read-receipts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - roomIds
              properties:
                roomIds:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items:
                    type: string
                  description: List of room IDs to query
            examples:
              default:
                summary: Get unread counts for several rooms
                value:
                  roomIds:
                    - "room1@chat-core.com"
                    - "room2@chat-core.com"
      responses:
        "200":
          description: Unread counts for requested rooms
          content:
            application/json:
              schema:
                type: object
                properties:
                  rooms:
                    type: array
                    items:
                      type: object
                      properties:
                        roomId:
                          type: string
                        unreadMessages:
                          type: integer
                        lastUnreadMessage:
                          description: Last unread message object or 0 if none
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ============================================================
  # MESSAGES
  # ============================================================
  /rooms/{roomId}/messages:
    post:
      operationId: sendRoomMessage
      summary: Send a message in a room
      description: |
        Send a text message, attachment, reaction, reply, or forwarded message to a room.
        The `messageType` field determines the type of message.
        For reactions, `referencedMessageId` and `emoji` are required.

        **Deprecated for reactions.** Sending `messageType: "reaction"` still
        works for backward compatibility, but new clients should use the
        canonical `POST /rooms/{roomId}/messages/{messageId}/reactions`
        endpoint, which models a reaction as a message sub-resource instead of
        a synthetic timeline message.
        For replies, `referencedMessageId` and `text` (or `reply`) are required.
        For attachments, `attachmentUrl` is required.
        For forwards, `referencedMessageId` and `sourceRoomId` are required.

        In 1:1 DM rooms, returns 403 with `{"code": 403, "detail": "blocked"}` if either
        user has blocked the other. This check does not apply to group rooms.

        **Idempotency.** When the request carries a `clientMessageId`, the send
        is idempotent over `(roomId, from, clientMessageId)`. A retry that
        replays the same `clientMessageId` does not create a duplicate: the
        server returns the already-persisted message with the same `201` as a
        fresh send (the two are indistinguishable by status — reconcile by
        matching `metadata.clientMessageId`).
      tags:
        - messages
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
      requestBody:
        $ref: "#/components/requestBodies/PostRoomMessageRequest"
      responses:
        "201":
          $ref: "#/components/responses/PostMessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    get:
      operationId: getRoomMessages
      summary: Get messages in a room
      tags:
        - messages
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/headerUserId"
        - $ref: "#/components/parameters/queryBefore"
        - $ref: "#/components/parameters/queryAfter"
        - $ref: "#/components/parameters/queryLimit"
        - name: unreadOnly
          in: query
          description: When true, returns only unread messages. Defaults to false.
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          $ref: "#/components/responses/MessageListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /rooms/{roomId}/messages/{messageId}:
    put:
      operationId: updateRoomMessage
      summary: Edit a message in a room
      description: |
        Edits the caller's own message. Only the author may edit. Edits are
        allowed within a time window after the message was sent (default
        15 minutes); past it the server returns `403` with detail
        `edit window expired`. The window is configurable and may be disabled.
      tags:
        - messages
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathMessageId"
        - $ref: "#/components/parameters/headerUserId"
      requestBody:
        $ref: "#/components/requestBodies/PutRoomMessageRequest"
      responses:
        "204":
          description: Message updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: >-
            Forbidden — the caller is not the author, or the edit window has
            expired (detail `edit window expired`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    delete:
      operationId: deleteRoomMessage
      summary: Delete a message in a room
      description: |
        Deletes the caller's own message. Only the author may delete. Deletes
        are allowed within a time window after the message was sent (default
        2 days); past it the server returns `403` with detail
        `delete window expired`. The window is configurable and may be disabled.
      tags:
        - messages
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathMessageId"
        - $ref: "#/components/parameters/headerUserId"
      responses:
        "204":
          description: Message deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: >-
            Forbidden — the caller is not the author, or the delete window has
            expired (detail `delete window expired`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /rooms/{roomId}/messages/{messageId}/thread:
    get:
      operationId: getMessageThread
      summary: Get the complete thread for a message
      description: |
        Returns the root message and all its replies (direct and nested) as a flat
        array sorted by timestamp. Supports the same pagination parameters as
        `GET /rooms/{roomId}/messages`.
      tags:
        - messages
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathMessageId"
        - $ref: "#/components/parameters/queryBefore"
        - $ref: "#/components/parameters/queryAfter"
        - $ref: "#/components/parameters/queryLimit"
      responses:
        "200":
          description: Thread messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
                  hasMore:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /rooms/{roomId}/messages/{messageId}/receipts:
    put:
      operationId: updateMessageReceipt
      summary: Update message delivery/read receipt
      description: |
        `status` is required (see `ReceiptUpdateStatus`). Semantics:
          - `read` — advances the caller's read marker up to the message.
          - `delivered` — advances the caller's delivered cursor up to the
            message; does NOT touch the read marker. Emits a consolidated
            `message_delivered` event to the other members only when the
            cursor actually advances (repeated or stale confirmations are
            silent no-ops, still `204`).
          - a missing `status`, `sent`, or any other value — rejected with
            `400`.
      tags:
        - messages
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathMessageId"
      requestBody:
        $ref: "#/components/requestBodies/PutReceiptRequest"
      responses:
        "204":
          description: Receipt updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ============================================================
  # REACTIONS
  # ============================================================
  /rooms/{roomId}/messages/{messageId}/reactions:
    get:
      operationId: getMessageReactions
      summary: Get aggregated reactions for a message
      description: Returns reactions grouped by emoji with count and list of users who reacted.
      tags:
        - reactions
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathMessageId"
      responses:
        "200":
          description: Aggregated reactions
          content:
            application/json:
              schema:
                type: object
                properties:
                  reactions:
                    type: array
                    items:
                      type: object
                      properties:
                        emoji:
                          type: string
                          description: The reaction emoji
                        count:
                          type: integer
                          description: Number of users who reacted with this emoji
                        users:
                          type: array
                          items:
                            type: string
                          description: List of user IDs who reacted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      operationId: addReaction
      summary: Add the caller's reaction to a message
      description: |
        Adds `emoji` as the authenticated user's reaction to the message.
        This is the canonical reactions endpoint: a reaction is modelled as a
        first-class sub-resource of the message rather than a synthetic
        reaction-typed message, so it never appears in the message timeline.
        Emits a `reaction_added` realtime event to every room member.

        Idempotent: re-adding the same emoji the caller already reacted with
        returns `201` without creating a duplicate.

        Prefer this over `POST /rooms/{roomId}/messages` with
        `messageType: "reaction"`, which is deprecated for reactions.
      tags:
        - reactions
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathMessageId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - emoji
              properties:
                emoji:
                  type: string
                  description: The reaction emoji (e.g. "👍").
            example:
              emoji: "👍"
      responses:
        "201":
          description: Reaction added
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    delete:
      operationId: deleteReaction
      summary: Delete own reaction from a message
      description: |
        Removes the authenticated user's reaction from the message. Pass the
        optional `emoji` query parameter to remove a specific reaction on
        backends that track more than one reaction per user; omit it to clear
        the user's reaction on the message wholesale (the historical
        single-reaction-per-user behaviour). Other users' reactions are never
        affected. Emits a `reaction_deleted` realtime event. Idempotent:
        deleting when no reaction is present returns `200`.
      tags:
        - reactions
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathMessageId"
        - name: emoji
          in: query
          required: false
          description: |
            Specific reaction emoji to remove. Omit to clear the caller's
            reaction on the message wholesale.
          schema:
            type: string
      responses:
        "200":
          description: Reaction deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ============================================================
  # MESSAGE SEARCH
  # ============================================================
  /messages/search:
    get:
      operationId: searchMessages
      summary: Search messages in a room by text content
      tags:
        - messages
      parameters:
        - name: q
          in: query
          required: true
          description: Search query (min 2 characters)
          schema:
            type: string
            minLength: 2
        - name: roomId
          in: query
          required: true
          description: Room to search in
          schema:
            $ref: "#/components/schemas/RoomId"
        - $ref: "#/components/parameters/queryLimit"
        - $ref: "#/components/parameters/queryOffset"
        - $ref: "#/components/parameters/querySort"
        - $ref: "#/components/parameters/queryOrder"
      responses:
        "200":
          description: Search results
          headers:
            X-Total-Count:
              description: Total number of items before pagination
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
                  hasMore:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ============================================================
  # STARRED MESSAGES
  # ============================================================
  /rooms/{roomId}/messages/{messageId}/star:
    put:
      operationId: starMessage
      summary: Star a message for the authenticated user
      description: |
        Marks the message as starred for the calling user (a private,
        per-user bookmark — other members are not notified and do not see it).
        Idempotent: starring an already-starred message still returns `200`.
      tags:
        - messages
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathMessageId"
      responses:
        "200":
          description: Message starred
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [starred]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    delete:
      operationId: unstarMessage
      summary: Remove a star from a message
      description: |
        Removes the caller's star from the message. Idempotent: returns `200`
        even when the message was not starred.
      tags:
        - messages
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathMessageId"
      responses:
        "200":
          description: Star removed (or was not present)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [unstarred]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ============================================================
  # MESSAGE PINS
  # ============================================================
  /rooms/{roomId}/messages/{messageId}/pin:
    put:
      operationId: pinMessage
      summary: Pin a message
      description: Pins a message in the room. Requires moderator role (room owner, room admin, or global admin).
      tags:
        - message-pins
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathMessageId"
      responses:
        "200":
          description: Message pinned
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [pinned]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    delete:
      operationId: unpinMessage
      summary: Unpin a message
      description: Unpins a message from the room. Requires moderator role.
      tags:
        - message-pins
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathMessageId"
      responses:
        "200":
          description: Message unpinned
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [unpinned]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /rooms/{roomId}/pins:
    get:
      operationId: getRoomPins
      summary: List pinned messages
      description: Returns all pinned messages for the room. Any room member can access this endpoint.
      tags:
        - message-pins
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/queryLimit"
        - $ref: "#/components/parameters/queryOffset"
        - $ref: "#/components/parameters/querySort"
        - $ref: "#/components/parameters/queryOrder"
      responses:
        "200":
          description: List of pinned messages
          headers:
            X-Total-Count:
              description: Total number of pinned messages before pagination
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: object
                properties:
                  pins:
                    type: array
                    items:
                      type: object
                      properties:
                        roomId:
                          type: string
                        messageId:
                          type: string
                        pinnedBy:
                          type: string
                        pinnedAt:
                          type: string
                          format: date-time
                  hasMore:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ============================================================
  # MODERATION
  # ============================================================
  /rooms/{roomId}/messages/{messageId}/report:
    post:
      operationId: reportMessage
      summary: Report a message
      description: Any room member can report a message for moderation review.
      tags:
        - moderation
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathMessageId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
      responses:
        "201":
          description: Message reported
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [reported]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Not a member of the room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /rooms/{roomId}/reports:
    get:
      operationId: getRoomReports
      summary: List reports for a room
      description: Returns all reports for the room. Requires moderator role.
      tags:
        - moderation
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/queryLimit"
        - $ref: "#/components/parameters/queryOffset"
        - $ref: "#/components/parameters/querySort"
        - $ref: "#/components/parameters/queryOrder"
      responses:
        "200":
          description: List of reports
          headers:
            X-Total-Count:
              description: Total number of reports before pagination
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: object
                properties:
                  reports:
                    type: array
                    items:
                      type: object
                      properties:
                        reporterId:
                          type: string
                        targetUserId:
                          type: string
                        messageId:
                          type: string
                        roomId:
                          type: string
                        reason:
                          type: string
                        reportedAt:
                          type: string
                          format: date-time
                  hasMore:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /rooms/{roomId}/users/{userId}/ban:
    put:
      operationId: banRoomUser
      summary: Ban a user from a room
      description: Bans a user from the room. Requires moderator role.
      tags:
        - moderation
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathUserId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: User banned
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [banned]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden or cannot ban room owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    delete:
      operationId: unbanRoomUser
      summary: Unban a user from a room
      description: Removes a ban on a user. Requires moderator role.
      tags:
        - moderation
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathUserId"
      responses:
        "200":
          description: User unbanned
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [unbanned]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /rooms/{roomId}/users/{userId}/mute:
    put:
      operationId: muteRoomUser
      summary: Mute a user in a room
      description: Mutes a user in the room. Requires moderator role.
      tags:
        - moderation
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathUserId"
      responses:
        "200":
          description: User muted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [muted]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden or cannot mute room owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    delete:
      operationId: unmuteRoomUser
      summary: Unmute a user in a room
      description: Removes a mute on a user. Requires moderator role.
      tags:
        - moderation
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathUserId"
      responses:
        "200":
          description: User unmuted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [unmuted]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ============================================================
  # CONVERSATIONS (legacy/convenience)
  # ============================================================
  /conversations/{conversationId}/messages:
    get:
      operationId: getConversationMessages
      summary: Get messages for a conversation
      deprecated: true
      description: |
        **Deprecated.** Use `GET /rooms/{roomId}/messages` (the `conversationId`
        is the room id). Retained as a legacy/convenience alias for at least one
        release cycle.
      tags:
        - messages
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/headerUserId"
        - $ref: "#/components/parameters/queryBefore"
        - $ref: "#/components/parameters/queryAfter"
        - $ref: "#/components/parameters/queryLimit"
      responses:
        "200":
          $ref: "#/components/responses/MessageListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ============================================================
  # ATTACHMENTS
  # ============================================================
  /rooms/{roomId}/scheduled-messages:
    post:
      operationId: postScheduledMessage
      summary: Schedule a message to be sent later
      description: |
        Schedules a message to be sent at a specific time in the future.
        The server sends due messages periodically based on the configured interval.
        Requires room membership.
      tags:
        - scheduled-messages
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sendAt
              properties:
                text:
                  type: string
                  description: Message text to send
                sendAt:
                  type: string
                  format: date-time
                  description: ISO 8601 timestamp when the message should be sent
                metadata:
                  type: object
                  description: Optional metadata to attach to the message
      responses:
        "201":
          description: Message scheduled successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduledMessage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    get:
      operationId: getScheduledMessages
      summary: List scheduled messages for a room
      description: |
        Returns all pending scheduled messages for the authenticated user in the specified room.
        Returns `X-Total-Count` header with total count.
      tags:
        - scheduled-messages
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
      responses:
        "200":
          description: List of scheduled messages
          headers:
            X-Total-Count:
              description: Total number of scheduled messages
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: object
                properties:
                  scheduledMessages:
                    type: array
                    items:
                      $ref: "#/components/schemas/ScheduledMessage"
                  hasMore:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /rooms/{roomId}/scheduled-messages/{scheduledId}:
    delete:
      operationId: deleteScheduledMessage
      summary: Cancel a scheduled message
      description: |
        Deletes a scheduled message before it is sent. Only the user who scheduled
        the message can delete it.
      tags:
        - scheduled-messages
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - name: scheduledId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the scheduled message
      responses:
        "204":
          description: Scheduled message cancelled
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /rooms/{roomId}/attachments:
    get:
      operationId: getRoomAttachments
      summary: List attachment messages in a room
      description: |
        Returns messages that contain attachments in the specified room.
        Messages are identified as attachments by having a non-empty `attachment` field
        or metadata containing `mimeType`/`getUrl` keys.
        Supports pagination via `limit` and `before`/`after` query parameters.
        Returns `X-Total-Count` header with total attachment count.
      tags:
        - attachments
        - messages
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/queryLimit"
        - $ref: "#/components/parameters/queryBefore"
        - $ref: "#/components/parameters/queryAfter"

      responses:
        "200":
          description: List of attachment messages
          headers:
            X-Total-Count:
              description: Total number of attachment messages in the room
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: object
                properties:
                  attachments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
                  hasMore:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /rooms/{roomId}/attachments/{messageId}:
    delete:
      operationId: deleteRoomAttachment
      summary: Delete an attachment message
      description: |
        Deletes a message that contains an attachment. Returns 400 if the message
        exists but is not an attachment. Only the message sender can delete it.
      tags:
        - attachments
        - messages
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - name: messageId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MessageId"
      responses:
        "204":
          description: Attachment deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /attachments:
    post:
      operationId: uploadAttachment
      summary: Upload a file attachment
      description: |
        Upload a file (image, audio, document, etc.). Returns opaque metadata
        that must be included when referencing the attachment in a message.
      tags:
        - attachments
      requestBody:
        content:
          "*/*":
            schema:
              type: string
              format: binary
      responses:
        "200":
          $ref: "#/components/responses/AttachmentMetadataResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          description: Payload too large (max 10MB)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /attachments/{attachmentId}/signed-url:
    get:
      operationId: getAttachmentSignedUrl
      summary: Resolve a signed download URL for an attachment
      description: |
        Primary, robust way to access an attachment. Verifies that the caller is
        a member of `roomId` (fail-closed: returns `403 not_a_room_member`
        otherwise) and returns a short-lived download URL carrying an HMAC
        signature, an expiry, and the authorized user inline. The returned URL is
        self-authorizing, so it can be handed straight to an `<img>` tag, an
        image cache, or a native viewer without re-attaching auth headers. Treat
        it as ephemeral; request a fresh one when it expires.
      tags:
        - attachments
      parameters:
        - name: attachmentId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AttachmentId"
        - name: roomId
          in: query
          required: true
          description: Room the attachment belongs to; membership is enforced.
          schema:
            $ref: "#/components/schemas/RoomId"
        - $ref: "#/components/parameters/headerUserId"
      responses:
        "200":
          description: Signed download URL
          content:
            application/json:
              schema:
                type: object
                required:
                  - url
                properties:
                  url:
                    type: string
                    description: |
                      Relative or absolute download URL with signature, expiry,
                      and user encoded. Usable directly in an image element /
                      cache / native viewer.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /attachments/{attachmentId}:
    get:
      operationId: getAttachment
      deprecated: true
      summary: Download an attachment (deprecated header-only flow)
      description: |
        **Deprecated** — use `GET /attachments/{attachmentId}/signed-url` and
        fetch the returned URL instead. This endpoint now enforces room
        membership fail-closed: it requires the `roomId` query parameter and
        returns `403 not_a_room_member` when the caller is not a member of that
        room. The `x-attachment-metadata` header alone no longer authorizes a
        download.
      tags:
        - attachments
      parameters:
        - name: attachmentId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AttachmentId"
        - name: roomId
          in: query
          required: true
          description: Room the attachment belongs to; membership is enforced.
          schema:
            $ref: "#/components/schemas/RoomId"
        - name: x-attachment-metadata
          in: header
          required: false
          description: |
            Attachment metadata as base64 (returned from upload). Deprecated:
            kept for source compatibility but no longer sufficient on its own —
            membership on `roomId` is the authorization check.
          schema:
            type: string
        - $ref: "#/components/parameters/headerUserId"
      responses:
        "200":
          description: Attachment binary data
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ============================================================
  # PRESENCE
  # ============================================================
  /presence:
    get:
      operationId: getOwnPresence
      summary: Get own presence and contacts presence
      tags:
        - presence
      responses:
        "200":
          description: Own presence and all contacts' presence
          content:
            application/json:
              schema:
                type: object
                properties:
                  own:
                    $ref: "#/components/schemas/PresenceInfo"
                  contacts:
                    type: array
                    items:
                      $ref: "#/components/schemas/PresenceInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    put:
      operationId: updateOwnPresence
      summary: Set own presence status
      tags:
        - presence
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  $ref: "#/components/schemas/PresenceStatus"
      responses:
        "204":
          description: Presence updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /contacts/{userId}/presence:
    get:
      operationId: getContactPresence
      summary: Get a contact's presence (online, status, last seen)
      tags:
        - presence
        - contacts
      parameters:
        - $ref: "#/components/parameters/pathUserId"
      responses:
        "200":
          description: Contact presence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresenceInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /contacts/{userId}/activity:
    post:
      operationId: postContactActivity
      summary: Send typing indicator to a contact (DM)
      description: |
        Sends a typing activity event (startsTyping / stopsTyping) to a direct message contact.
        The event is delivered via NRTE as a `typing` event with `contactId` instead of `roomId`.
        Returns 403 if the user is blocked. Invalid activity values are silently ignored (204).
      tags:
        - contacts
      parameters:
        - $ref: "#/components/parameters/pathUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - activity
              properties:
                activity:
                  type: string
                  enum:
                    - startsTyping
                    - stopsTyping
      responses:
        "204":
          description: Activity sent
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ============================================================
  # BLOCKING
  # ============================================================
  /contacts/{userId}/block:
    put:
      operationId: blockUser
      summary: Block a user
      description: |
        Block a user. Blocked users cannot send messages to or see the
        presence of the blocking user (and vice versa).

        Blocking is intentionally deniable: **no** event is pushed to the
        blocked user. Any 1:1 DM room stays in place on their side, and their
        subsequent sends are silently dropped (the sender still gets `204`), so
        the block is not observable to the blocked party.
      tags:
        - contacts
      parameters:
        - $ref: "#/components/parameters/pathUserId"
      responses:
        "204":
          description: User blocked successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    delete:
      operationId: unblockUser
      summary: Unblock a user
      description: |
        Unblock a user. Idempotent — returns 204 even if the user was not blocked.
      tags:
        - contacts
      parameters:
        - $ref: "#/components/parameters/pathUserId"
      responses:
        "204":
          description: User unblocked (or was not blocked)
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /starred:
    get:
      operationId: getStarredMessages
      summary: List the caller's starred messages
      description: |
        Returns the authenticated user's starred messages across all rooms,
        most recent first, paginated. Each entry is a lightweight reference
        (ids + timestamp); fetch the full message via its room if needed.
      tags:
        - messages
      parameters:
        - $ref: "#/components/parameters/queryLimit"
        - $ref: "#/components/parameters/queryOffset"
        - $ref: "#/components/parameters/querySort"
        - $ref: "#/components/parameters/queryOrder"
      responses:
        "200":
          description: Starred messages
          headers:
            X-Total-Count:
              description: Total number of starred messages before pagination
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: object
                properties:
                  starred:
                    type: array
                    items:
                      type: object
                      required:
                        - userId
                        - messageId
                        - roomId
                        - starredAt
                      properties:
                        userId:
                          $ref: "#/components/schemas/UserId"
                        messageId:
                          $ref: "#/components/schemas/MessageId"
                        roomId:
                          $ref: "#/components/schemas/RoomId"
                        starredAt:
                          type: string
                          format: date-time
                  hasMore:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /blocked:
    get:
      operationId: getBlockedUsers
      summary: Get list of blocked users
      deprecated: true
      description: |
        **Deprecated.** Block/unblock operations live under
        `/contacts/{userId}/block`; this listing is kept at `/blocked` for
        backwards compatibility and will move under the contacts namespace.
        Returns the list of blocked user IDs.
      tags:
        - contacts
      parameters:
        - $ref: "#/components/parameters/queryLimit"
        - $ref: "#/components/parameters/queryOffset"
        - $ref: "#/components/parameters/querySort"
        - $ref: "#/components/parameters/queryOrder"
      responses:
        "200":
          description: |
            List of blocked user IDs. Returns only IDs (not full user objects)
            for lightweight blocking checks.
          headers:
            X-Total-Count:
              description: Total number of items before pagination
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: object
                required:
                  - blockedUsers
                properties:
                  blockedUsers:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserId"
                  hasMore:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ============================================================
  # REAL-TIME EVENTS
  # ============================================================
  /events:
    get:
      operationId: subscribeSSE
      summary: Subscribe to server-sent events
      description: |
        Opens an SSE stream that pushes real-time events to the client.
        Events include new messages, message updates, presence changes,
        room updates, and typing indicators.

        **Important**: SSE is served by the NRTE subsystem on a separate TCP port
        (default 2081, configurable; wb uses 2082). This is NOT served on the main
        REST HTTP port. Clients connect to `http://{host}:{nrte_port}/eventsource`.

        Event replay on reconnect (`Last-Event-ID`) is **not** currently
        supported: the stream is live-only, so a client that reconnects must
        resync missed state via the REST listing endpoints. Backlog/replay is
        tracked as a future enhancement.

        This endpoint must be enabled in server configuration (`sse_enabled`).
      tags:
        - events
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/ServerEvent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: SSE is disabled in server configuration

  /ws:
    get:
      operationId: connectWebSocket
      summary: Establish WebSocket connection
      description: |
        Upgrades HTTP connection to WebSocket for bidirectional real-time
        communication. After connection, client must send an auth message.

        Server -> Client: same events as SSE (new_message, presence_changed,
        typing, etc.)
        Client -> Server: send messages, typing indicators, delivery/read
        receipts, and keepalive pings. (Presence is set via REST
        `PUT /presence`, not over the socket.)

        This endpoint must be enabled in server configuration (`ws_enabled`).

        ## Authentication
        After WebSocket upgrade, send the full `Authorization` header value in the
        `token` field (either Bearer JWT or Basic credentials):
        ```json
        {"type": "auth", "token": "Bearer <jwt_token>"}
        ```
        ```json
        {"type": "auth", "token": "Basic <base64(user:pass)>"}
        ```

        ## Client -> Server messages
        ```json
        {"type": "message", "roomId": "...", "text": "...", "messageType": "regular"}
        {"type": "typing", "roomId": "...", "activity": "startsTyping"}
        {"type": "receipt", "roomId": "...", "messageId": "...", "status": "read"}
        {"type": "delivered", "roomId": "...", "messageId": "..."}
        {"type": "ping"}
        {"type": "auth_refresh", "token": "<new_jwt>"}
        ```
        The server replies to `{"type":"ping"}` with `{"type":"pong"}`
        (keepalive). An unrecognised type yields
        `{"error":"unknown_type"}`; `presence` is **not** a valid client frame.

        ## Token expiration and refresh
        On successful auth the server emits
        `{"type":"auth_ok","userId":"...","expiresAt":<unix|null>}` and arms a
        timer with the JWT `exp`. When the timer fires the server sends
        `{"type":"auth_error","reason":"token_expired"}` and closes the socket
        with code **4003 token_expired**. If the user is revoked while
        connected the socket is closed with code **4004 token_revoked**.

        Clients can send `{"type":"auth_refresh","token":"<new_jwt>"}` to
        rotate the token without reconnecting (cooldown 30 s per connection).
        Server responses:
          - `{"type":"auth_refreshed","expiresAt":<unix|null>}` on success.
          - `{"type":"auth_refresh_error","code":"<expired|revoked|user_mismatch|invalid|rate_limited|missing_token>"}`
            on failure; `user_mismatch` and `invalid`/`expired`/`revoked` are
            followed by a close (4002/4003/4004).

        ## Close codes
          - **4001** `auth_timeout` — first auth message not received in 10 s
          - **4002** `auth_failed` — invalid credentials at handshake or
            user mismatch on `auth_refresh`
          - **4003** `token_expired` — JWT `exp` reached or refresh token
            invalid
          - **4004** `token_revoked` — user is in the revocation blacklist
          - **4005** `too_many_auth_attempts` — too many failed auth/refresh
            attempts on this connection (max 5); the client must not retry with
            the same credentials
      tags:
        - events
      responses:
        "200":
          description: WebSocket connection established via HTTP 101 Switching Protocols
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: WebSocket is disabled in server configuration

  # ============================================================
  # HEALTH
  # ============================================================
  /health:
    get:
      operationId: getHealth
      summary: Health check with dependency status
      tags:
        - health
      security: []
      responses:
        "200":
          description: All dependencies healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  checks:
                    type: object
                    properties:
                      memtabd:
                        type: string
                      db:
                        type: string
        "503":
          description: One or more dependencies degraded
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [degraded]
                  checks:
                    type: object
                    properties:
                      memtabd:
                        type: string
                      db:
                        type: string

  # ============================================================
  # ADMIN
  # ============================================================

  # ── Admin panel authentication ────────────────────────────────
  # The admin React panel (`/chat/admin/*`) authenticates
  # with HTTP Basic Auth against the shared `ADMIN_DASHBOARD_PASSWORD`,
  # which the server resolves to the synthetic admin user id
  # configured via `admin_user_id` (default `_admin`).
  # The legacy cookie flow (`uc_admin_sid`) was removed; the panel
  # now uses stateless HTTP Basic Auth on every call.

  /admin/login:
    post:
      operationId: postAdminLogin
      summary: Verify admin credentials
      description: |
        Verifies the credentials carried in the standard HTTP `Authorization:
        Basic` header against the configured admin dashboard password.
        Because the panel uses stateless Basic Auth, this endpoint does not
        issue any session token — the browser keeps the credentials in
        memory and replays them on every subsequent admin request.
        Rate-limited per client IP (5 attempts per minute by default);
        every attempt is recorded in the admin audit log with result
        `ok`, `invalid_credentials` or `rate_limited`.
      tags:
        - admin
      security:
        - BasicAuth: []
      responses:
        "200":
          description: Credentials accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: ["ok"]
              example:
                status: "ok"
        "401":
          description: Missing or invalid credentials
          headers:
            WWW-Authenticate:
              description: |
                Standard Basic Auth challenge so browsers prompt the user.
              schema:
                type: string
                example: 'Basic realm="admin"'
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 401
                detail: "unauthorized"
        "403":
          description: Admin panel disabled (no password configured)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 403
                detail: "admin panel disabled"
        "429":
          description: Too many login attempts from this client IP
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
              example:
                detail: "too many login attempts"

  /admin/logout:
    post:
      operationId: postAdminLogout
      summary: Legacy admin logout
      description: |
        Retained for backward compatibility with the legacy cookie flow.
        With stateless Basic Auth there is no server-side session to
        invalidate: the browser clears the credentials when the user
        closes the tab. The endpoint accepts no body and always returns
        `204 No Content`.
      tags:
        - admin
      security: []
      responses:
        "204":
          description: No content

  /admin/me:
    get:
      operationId: getAdminMe
      summary: Identify the authenticated admin
      description: |
        Re-checks the `Authorization: Basic` header and, on success, echoes
        the synthetic admin user id used by the rest of the `/admin/*` API.
        Auth is stateless Basic — there is no session cookie and no login form;
        the browser prompts for credentials and replays the header on every
        call. The admin React panel calls this endpoint directly on load to
        confirm the credentials and display the admin identity.
        (`/admin/login` and `/admin/logout` exist for programmatic/legacy
        clients and are not used by the panel.)
      tags:
        - admin
      security:
        - BasicAuth: []
      responses:
        "200":
          description: Authenticated admin identity
          content:
            application/json:
              schema:
                type: object
                required:
                  - authenticated
                  - adminUserId
                properties:
                  authenticated:
                    type: boolean
                    enum: [true]
                  adminUserId:
                    type: string
                    description: |
                      Synthetic admin user id (`admin_user_id` config,
                      default `_admin`).
              example:
                authenticated: true
                adminUserId: "_admin"
        "401":
          description: Missing or invalid credentials
          headers:
            WWW-Authenticate:
              description: |
                Standard Basic Auth challenge so browsers prompt the user.
              schema:
                type: string
                example: 'Basic realm="admin"'
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 401
                detail: "unauthorized"
        "403":
          description: Admin panel disabled (no password configured)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 403
                detail: "admin panel disabled"

  /admin/users:
    get:
      operationId: getAdminUsers
      summary: List all registered users
      description: |
        Returns a paginated list of users with optional substring search
        and an `active` filter. Requires admin role.
      tags:
        - admin
      parameters:
        - name: q
          in: query
          required: false
          description: |
            Case-insensitive substring match against `displayName`, `id`,
            `email` and `bio`. Omit or send an empty value to disable the
            search and return all users (subject to the other filters).
          schema:
            type: string
        - name: active
          in: query
          required: false
          description: |
            Filter by the `active` boolean flag. When omitted, both active and
            deactivated users are returned.
          schema:
            type: boolean
        - $ref: "#/components/parameters/queryLimit"
        - $ref: "#/components/parameters/queryOffset"
        - $ref: "#/components/parameters/querySort"
        - $ref: "#/components/parameters/queryOrder"
      responses:
        "200":
          description: List of users
          headers:
            X-Total-Count:
              description: Total number of items before pagination
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  hasMore:
                    type: boolean
                  total:
                    type: integer
                    description: Total number of items before pagination
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/stats:
    get:
      operationId: getAdminStats
      summary: Get system statistics
      description: Requires admin role.
      tags:
        - admin
      responses:
        "200":
          description: System statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/sessions:
    get:
      operationId: getAdminSessions
      summary: List all active sessions
      description: Requires admin role.
      tags:
        - admin
      parameters:
        - $ref: "#/components/parameters/queryLimit"
        - $ref: "#/components/parameters/queryOffset"
        - $ref: "#/components/parameters/querySort"
        - $ref: "#/components/parameters/queryOrder"
      responses:
        "200":
          description: Active sessions list
          headers:
            X-Total-Count:
              description: Total number of items before pagination
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminSession"
                  hasMore:
                    type: boolean
                  total:
                    type: integer
                    description: Total number of items before pagination
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/sessions/{userId}:
    delete:
      operationId: deleteAdminSession
      summary: Force close a user session
      description: Requires admin role.
      tags:
        - admin
      parameters:
        - $ref: "#/components/parameters/pathUserId"
      responses:
        "200":
          description: Session closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/config:
    get:
      operationId: getAdminConfig
      summary: Get runtime configuration
      description: |
        Returns the current runtime configuration values with their defaults
        and types. If reading a value fails, that entry has `value: "error"`
        and `degraded: true`; the rest of the response is still served and a
        warning is logged. Requires admin role.
      tags:
        - admin
      responses:
        "200":
          description: Configuration values
          content:
            application/json:
              schema:
                type: object
                properties:
                  config:
                    type: array
                    items:
                      type: object
                      properties:
                        key:
                          type: string
                        value:
                          description: Current value (type varies per key)
                        default:
                          description: Default value
                        type:
                          type: string
                          enum: [integer, boolean, string]
                        degraded:
                          type: boolean
                          description: Present and `true` when reading this key failed; `value` is `"error"` in that case.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    put:
      operationId: putAdminConfig
      summary: Update runtime configuration (cluster-wide)
      description: |
        Update runtime configuration. Requires admin role.
        Allowed keys: `kill_time` (integer, session timeout in ms),
        `sse_enabled` (boolean), `ws_enabled` (boolean),
        `rate_limit_enabled` (boolean), `rate_limit_max` (integer),
        `rate_limit_window` (integer, ms), `internal_api_key` (string,
        minimum 32 bytes).

        Changes are applied locally and propagated to every other cluster
        node under a `global:trans` lock. Returns **409 Conflict** if
        another node is already applying a configuration update.
      tags:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                kill_time:
                  type: integer
                  description: Session timeout in milliseconds (must be > 0)
                sse_enabled:
                  type: boolean
                ws_enabled:
                  type: boolean
                rate_limit_enabled:
                  type: boolean
                rate_limit_max:
                  type: integer
                  description: Max requests per window (must be > 0)
                rate_limit_window:
                  type: integer
                  description: Rate limit window in milliseconds (must be > 0)
                internal_api_key:
                  type: string
                  minLength: 32
                  description: Pre-shared key for /v1/internal endpoints. Must be at least 32 bytes.
      responses:
        "200":
          description: Configuration updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Another cluster node is applying a configuration update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/broadcast:
    post:
      operationId: postAdminBroadcast
      summary: Broadcast a message
      deprecated: true
      description: |
        **Deprecated.** Use the `/admin/announcement-rooms` group instead
        (`POST /admin/announcement-rooms/{roomId}/messages` for sending). This
        endpoint is retained for one release cycle for legacy programmatic
        callers. See the global API description for the deprecation policy
        (`Deprecation`/`Sunset` headers).

        Targeted broadcast only: persists `message` inside each room in
        `roomIds` via `send_internal_message/4`, bypassing membership checks so
        the admin pseudo-user can post into private rooms. SDK clients observe
        these through their realtime event stream. The legacy **global mode**
        has been removed — `roomIds` is now required, and an empty or missing
        `roomIds` returns `400`. Writes an `admin_broadcast` audit entry with the
        resolved `roomIds`. Requires admin role.
      tags:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
                - roomIds
              properties:
                message:
                  type: string
                  minLength: 1
                  description: Plain-text body of the broadcast.
                roomIds:
                  type: array
                  minItems: 1
                  items:
                    $ref: "#/components/schemas/RoomId"
                  description: |
                    Non-empty list of external room UUIDs to deliver the message
                    to. Required: an empty or missing list returns `400`
                    (global broadcast is deprecated).
            example:
              message: "Maintenance window starts at 23:00 UTC."
              roomIds:
                - "f0e1d2c3-b4a5-4968-8765-432109876543"
      responses:
        "200":
          description: Broadcast sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "400":
          description: Missing `message`, or empty/missing `roomIds`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/announcement-room:
    post:
      operationId: postAdminAnnouncementRoom
      summary: Create an announcement room (legacy)
      deprecated: true
      description: |
        **Deprecated.** Use `POST /admin/announcement-rooms` instead, which
        creates the room atomically. This legacy endpoint creates the room in
        two steps (regular room, then patches `type=announcement`) and is
        retained for one release cycle.

        Creates a read-only announcement room. Multiple announcement rooms may
        coexist. All registered users are implicit members; only platform
        admins can send messages (members cannot reply or react — `403`). Users
        see messages sent after their registration date (`createdAt`). Requires
        admin role.
      tags:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: Display name for the announcement room
                subject:
                  type: string
                  description: Optional subject/description of the room
      responses:
        "201":
          description: Announcement room created
          content:
            application/json:
              schema:
                type: object
                properties:
                  roomId:
                    type: string
                  name:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/announcement-rooms:
    get:
      operationId: getAdminAnnouncementRooms
      summary: List announcement rooms
      description: |
        Returns a paginated list of announcement rooms. This is a thin wrapper
        over `GET /admin/rooms?type=announcement` exposed as a dedicated group
        for the Broadcast admin panel. Supports search by name/subject via `q`
        and the standard pagination parameters. Requires admin role.

        Announcement-room semantics: every registered user is an implicit
        member and may READ the room, but non-subscribers do not appear in the
        room's user list (the member whitelist is empty by design). Members
        cannot reply or react (`403`); only platform admins can publish.
      tags:
        - admin
      parameters:
        - name: q
          in: query
          description: Search query (minimum 2 characters, searches name and subject)
          required: false
          schema:
            type: string
        - $ref: "#/components/parameters/queryLimit"
        - $ref: "#/components/parameters/queryOffset"
        - $ref: "#/components/parameters/querySort"
        - $ref: "#/components/parameters/queryOrder"
      responses:
        "200":
          description: List of announcement rooms
          headers:
            X-Total-Count:
              description: Total number of items before pagination
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: object
                properties:
                  rooms:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminRoom"
                  hasMore:
                    type: boolean
                  total:
                    type: integer
                    description: Total number of items before pagination
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      operationId: createAdminAnnouncementRoom
      summary: Create an announcement room
      description: |
        Creates an announcement room atomically (single insert with
        `type=announcement`, owner = global admin pseudo-user). All registered
        users become implicit members; only platform admins can publish.
        Requires admin role.
      tags:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: Display name for the announcement room
                subject:
                  type: string
                  description: Optional subject/description of the room
      responses:
        "201":
          description: Announcement room created
          content:
            application/json:
              schema:
                type: object
                properties:
                  roomId:
                    type: string
                  name:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/announcement-rooms/{roomId}:
    delete:
      operationId: deleteAdminAnnouncementRoom
      summary: Delete an announcement room
      description: |
        Deletes an announcement room and fans out a `room_deleted` event to all
        connected clients. Returns `404` when the room does not exist or is not
        an announcement room. Requires admin role.
      tags:
        - admin
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
      responses:
        "204":
          description: Announcement room deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/announcement-rooms/{roomId}/messages:
    post:
      operationId: postAdminAnnouncementRoomMessage
      summary: Publish a message to an announcement room
      description: |
        Publishes a message to the announcement room with full announcement
        semantics (persist + ack + batch-unhide + fan-out to every connected
        session). Authorised for any platform admin (not only the room owner).
        Returns `404` when the announcement room does not exist. Requires admin
        role.
      tags:
        - admin
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                  minLength: 1
                  description: Plain-text body of the announcement.
      responses:
        "201":
          description: Message published
          content:
            application/json:
              schema:
                type: object
                properties:
                  messageId:
                    type: string
                  roomId:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/users/{userId}/role:
    put:
      operationId: putAdminUserRole
      summary: Change a user's role
      description: Requires admin role.
      tags:
        - admin
      parameters:
        - $ref: "#/components/parameters/pathUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum: [user, admin]
                  default: user
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/content-filters:
    post:
      operationId: postAdminContentFilter
      summary: Add a content filter pattern
      description: |
        Adds a new word/pattern to the content filter list. Messages containing
        matching patterns will be blocked or censored depending on configuration.
        Requires admin role.
      tags:
        - admin
        - content-filter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - pattern
              properties:
                pattern:
                  type: string
                  description: Word or phrase to filter (case-insensitive matching)
      responses:
        "201":
          description: Filter created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentFilter"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    get:
      operationId: getAdminContentFilters
      summary: List all content filter patterns
      description: |
        Returns the configured content filter patterns. Routed through
        `chat_engine_pagination:paginate_list/2`, so the standard
        `limit`, `offset`, `sort` and `order` query parameters apply.
        Requires admin role.
      tags:
        - admin
        - content-filter
      parameters:
        - $ref: "#/components/parameters/queryLimit"
        - $ref: "#/components/parameters/queryOffset"
        - $ref: "#/components/parameters/querySort"
        - $ref: "#/components/parameters/queryOrder"
      responses:
        "200":
          description: List of content filters
          headers:
            X-Total-Count:
              description: Total number of filters
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: object
                properties:
                  filters:
                    type: array
                    items:
                      $ref: "#/components/schemas/ContentFilter"
                  hasMore:
                    type: boolean
                  total:
                    type: integer
                    description: Total number of items before pagination
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/content-filters/{filterId}:
    delete:
      operationId: deleteAdminContentFilter
      summary: Remove a content filter pattern
      description: |
        Removes a content filter pattern by ID. Requires admin role.
      tags:
        - admin
        - content-filter
      parameters:
        - name: filterId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the content filter to remove
      responses:
        "204":
          description: Filter removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/rooms:
    get:
      operationId: getAdminRooms
      summary: List all rooms
      description: |
        Returns a paginated list of rooms. Supports search by name/subject via `q` parameter.
        Requires admin role.
      tags:
        - admin
      parameters:
        - name: q
          in: query
          description: Search query (minimum 2 characters, searches name and subject)
          required: false
          schema:
            type: string
        - name: type
          in: query
          description: |
            Room-type filter. When set to `announcement`, only announcement
            rooms are returned. When omitted, announcement rooms are excluded
            from the listing (regular rooms only). The Broadcast admin panel
            relies on `?type=announcement`; the dedicated
            `GET /admin/announcement-rooms` group wraps this same handler.
          required: false
          schema:
            type: string
            enum: [announcement]
        - $ref: "#/components/parameters/queryLimit"
        - $ref: "#/components/parameters/queryOffset"
        - $ref: "#/components/parameters/querySort"
        - $ref: "#/components/parameters/queryOrder"
      responses:
        "200":
          description: List of rooms
          headers:
            X-Total-Count:
              description: Total number of items before pagination
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: object
                properties:
                  rooms:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminRoom"
                  hasMore:
                    type: boolean
                  total:
                    type: integer
                    description: Total number of items before pagination
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/rooms/{roomId}:
    get:
      operationId: getAdminRoom
      summary: Get room details
      description: Requires admin role.
      tags:
        - admin
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
      responses:
        "200":
          description: Room details
          content:
            application/json:
              schema:
                type: object
                properties:
                  room:
                    $ref: "#/components/schemas/AdminRoom"
                  stats:
                    type: object
                    properties:
                      messageCount:
                        type: integer
                      lastMessageAt:
                        type: string
                        format: date-time
                        nullable: true
                  recentMessages:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminMessage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    put:
      operationId: putAdminRoom
      summary: Update a room's name, subject or avatar (admin)
      description: |
        Partial update of `name`, `subject` and/or `avatarUrl` on the
        target room. At least one field must be provided. Writes an
        `update_room` audit entry. Requires admin role.
      tags:
        - admin
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                name:
                  type: string
                  description: New display name for the room.
                subject:
                  type: string
                  description: New subject/description.
                avatarUrl:
                  type: string
                  description: New avatar URL.
      responses:
        "204":
          description: Room updated.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    delete:
      operationId: deleteAdminRoom
      summary: Delete a room
      description: Deletes a room and all associated data. Requires admin role.
      tags:
        - admin
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
      responses:
        "204":
          description: Room deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/rooms/{roomId}/messages:
    post:
      operationId: postAdminRoomMessage
      summary: Send a message as admin
      description: |
        Sends a message to the target room on behalf of the admin account.
        The message is tagged with `metadata.adminSent: true` so clients can
        render an "from admin" badge. For announcement rooms the server
        best-effort auto-adds active users to the membership before sending.
        Writes a `send_room_message` audit entry. Requires admin role.
      tags:
        - admin
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                  minLength: 1
                  description: Plain-text body of the message to send.
      responses:
        "200":
          description: Message sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: ["ok"]
              example:
                status: "ok"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/messages:
    get:
      operationId: getAdminMessages
      summary: Search messages
      description: |
        Search messages across all rooms. Requires `q` parameter (minimum 2 characters).
        Optionally filter by `roomId`. Requires admin role.
      tags:
        - admin
      parameters:
        - name: q
          in: query
          description: Search query (minimum 2 characters)
          required: false
          schema:
            type: string
        - name: roomId
          in: query
          description: Filter by room ID
          required: false
          schema:
            type: string
        - $ref: "#/components/parameters/queryLimit"
        - $ref: "#/components/parameters/queryOffset"
        - $ref: "#/components/parameters/querySort"
        - $ref: "#/components/parameters/queryOrder"
      responses:
        "200":
          description: List of messages
          headers:
            X-Total-Count:
              description: Total number of items before pagination
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminMessage"
                  hasMore:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/messages/{messageId}:
    put:
      operationId: putAdminMessage
      summary: Edit a message (admin)
      description: |
        Replaces the body of a message regardless of authorship. The previous
        text is preserved in `bodyHistory` and the message metadata is flagged
        with `adminEdited: true` so clients can render an "edited by admin"
        badge. Broadcasts a `message_updated` WebSocket event to room members.
        Writes an `edit_message` audit entry. Requires admin role.
      tags:
        - admin
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: string
          description: ID of the message to edit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
              properties:
                text:
                  type: string
                  minLength: 1
                  description: |
                    New message body. Max length is governed server-side by
                    `max_message_length` configuration.
      responses:
        "204":
          description: Message updated
        "400":
          description: |
            Validation error. Returned when `text` is missing/empty or when
            the message has already been soft-deleted (`isDeleted: true`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                detail: "message deleted"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    delete:
      operationId: deleteAdminMessage
      summary: Delete a message
      description: Permanently deletes a message. Requires admin role.
      tags:
        - admin
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: string
          description: ID of the message to delete
      responses:
        "204":
          description: Message deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/cluster:
    get:
      operationId: getAdminCluster
      summary: Get cluster status
      description: |
        Returns information about all cluster nodes including uptime, memory,
        process counts, and connected nodes. Requires admin role.
      tags:
        - admin
      responses:
        "200":
          description: Cluster status
          content:
            application/json:
              schema:
                type: object
                properties:
                  nodes:
                    type: array
                    items:
                      type: object
                      properties:
                        node:
                          type: string
                        uptime:
                          type: integer
                        activeSessions:
                          type: integer
                        processCount:
                          type: integer
                        processLimit:
                          type: integer
                        memory:
                          type: object
                          properties:
                            totalBytes:
                              type: integer
                            processesBytes:
                              type: integer
                            etsBytes:
                              type: integer
                            binaryBytes:
                              type: integer
                            atomBytes:
                              type: integer
                        otp:
                          type: string
                        connectedNodes:
                          type: array
                          items:
                            type: string
                  totalNodes:
                    type: integer
                  localNode:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/metrics/delivery:
    get:
      operationId: getAdminDeliveryMetrics
      summary: Get message delivery metrics
      description: |
        Returns delivery metrics and rate limit configuration for the local node.
        Requires admin role.
      tags:
        - admin
      responses:
        "200":
          description: Delivery metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  delivery:
                    $ref: "#/components/schemas/DeliveryStats"
                  config:
                    type: object
                    properties:
                      rateLimit:
                        type: object
                        properties:
                          enabled:
                            type: boolean
                          max:
                            type: integer
                          windowMs:
                            type: integer
                  node:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/moderation:
    get:
      operationId: getAdminModeration
      summary: Get moderation overview
      description: |
        Returns summary counts plus a paginated preview of bans and mutes.

        Pagination is native MongoDB (`skip`, `limit`) and applies to both the
        `bans` and `mutes` arrays. Totals (`totalBans`, `totalMutes`,
        `totalReports`) are computed via `db:generic_count`. `hasMore` is
        true when at least one of the two lists has more pages available.

        Requires admin role.
      tags:
        - admin
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
          description: Maximum number of items to return for each of `bans` and `mutes`.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 100000
            default: 0
          description: Skip count.
      responses:
        "200":
          description: Moderation overview
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalBans:
                    type: integer
                  totalMutes:
                    type: integer
                  totalReports:
                    type: integer
                  bans:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminBan"
                  mutes:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminMute"
                  hasMore:
                    type: boolean
                  totalGlobalBans:
                    type: integer
                    description: Count of globally banned (deactivated) users
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/moderation/reports:
    get:
      operationId: getAdminModerationReports
      summary: List moderation reports
      description: |
        Paginated list of moderation reports. Supports filtering by reported
        user and/or room — both filters apply as a Mongo selector before
        pagination, so they reduce `X-Total-Count` accordingly. Requires admin role.
      tags:
        - admin
      parameters:
        - $ref: "#/components/parameters/queryUserIdFilter"
        - $ref: "#/components/parameters/queryRoomIdFilter"
        - $ref: "#/components/parameters/queryLimit"
        - $ref: "#/components/parameters/queryOffset"
        - $ref: "#/components/parameters/querySort"
        - $ref: "#/components/parameters/queryOrder"
      responses:
        "200":
          description: List of reports
          headers:
            X-Total-Count:
              description: Total number of items before pagination
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: object
                properties:
                  reports:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminReport"
                  hasMore:
                    type: boolean
                  total:
                    type: integer
                    description: Total number of items before pagination
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/audit:
    get:
      operationId: getAdminAuditLog
      summary: Get audit log
      description: |
        Paginated list of admin audit log entries. Each entry records an admin
        action with timestamp, admin ID, action name, details, and result.

        Pagination is native MongoDB (`sort: timestamp desc, skip, limit`) and
        the collection has a TTL index of 365 days on `timestampDate`
        (configurable via `audit_log_retention_seconds`).

        Supports structured filtering via query string. Filters are combined
        with AND. Requires admin role.
      tags:
        - admin
      parameters:
        - $ref: "#/components/parameters/queryLimit"
        - $ref: "#/components/parameters/queryOffset"
        - $ref: "#/components/parameters/querySort"
        - $ref: "#/components/parameters/queryOrder"
        - name: adminId
          in: query
          required: false
          schema:
            type: string
          description: Filter by external admin id (exact match).
        - name: action
          in: query
          required: false
          schema:
            type: string
          description: |
            Filter by audit action (exact match). Examples: `delete_session`,
            `update_config`, `delete_room`, `delete_message`, `expire_ban`,
            `update_webhooks_config`, `reset_rate_limit`, `create_ban`.
        - name: result
          in: query
          required: false
          schema:
            type: string
            enum: [ok, failed]
          description: Filter by audit result.
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Inclusive lower bound for `timestamp` (ISO 8601). Returns 400 if malformed.
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Inclusive upper bound for `timestamp` (ISO 8601). Returns 400 if malformed.
      responses:
        "200":
          description: Audit log entries
          headers:
            X-Total-Count:
              description: Total number of items before pagination
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        adminId:
                          type: string
                        action:
                          type: string
                        details:
                          type: object
                        result:
                          type: string
                        timestamp:
                          type: string
                          format: date-time
                  hasMore:
                    type: boolean
                  total:
                    type: integer
                    description: Total number of items before pagination
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/audit/options:
    get:
      operationId: getAdminAuditOptions
      summary: Get audit log filter options
      description: |
        Returns the canonical filter dropdown options for the audit log page
        of the admin panel — the list of known action names and result
        values. The panel calls this once at mount to populate its dropdowns
        so the backend is the single source of truth and the lists never
        drift. Requires admin role.
      tags:
        - admin
      responses:
        "200":
          description: Audit filter options
          content:
            application/json:
              schema:
                type: object
                properties:
                  actions:
                    type: array
                    items:
                      type: string
                  results:
                    type: array
                    items:
                      type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/bans:
    get:
      operationId: getAdminBans
      summary: List all bans
      description: |
        Paginated list of all room bans across the system. Supports filtering
        by user and/or room — both filters apply as a Mongo selector before
        pagination, so they reduce `X-Total-Count` accordingly. Requires admin role.
      tags:
        - admin
      parameters:
        - $ref: "#/components/parameters/queryUserIdFilter"
        - $ref: "#/components/parameters/queryRoomIdFilter"
        - $ref: "#/components/parameters/queryLimit"
        - $ref: "#/components/parameters/queryOffset"
        - $ref: "#/components/parameters/querySort"
        - $ref: "#/components/parameters/queryOrder"
      responses:
        "200":
          description: List of bans
          headers:
            X-Total-Count:
              description: Total number of bans
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: object
                properties:
                  bans:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminBan"
                  hasMore:
                    type: boolean
                  total:
                    type: integer
                    description: Total number of items before pagination
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      operationId: postAdminBan
      summary: Create a ban (optionally temporary)
      description: |
        Creates a ban for `userId` in `roomId`, recorded as banned by the
        admin issuing the request. When `expiresAt` is omitted the ban is
        permanent.

        When `expiresAt` is set, both the ISO 8601 string and an internal
        `expiresAtMs` (epoch milliseconds) are persisted so the
        `chat_api_admin_ban_expiry` scheduler can range-query for
        expirations. On expiry the ban is removed automatically and an
        `expire_ban` audit entry is written.

        Requires admin role.
      tags:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
                - roomId
              properties:
                userId:
                  type: string
                  description: Target user external id.
                roomId:
                  type: string
                  description: Target room external id.
                reason:
                  type: string
                  description: Optional human-readable reason for the ban.
                expiresAt:
                  type: string
                  format: date-time
                  description: |
                    Optional ISO 8601 timestamp at which the ban expires
                    automatically. Omit for permanent bans.
      responses:
        "201":
          description: Ban created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/bans/{banId}:
    delete:
      operationId: deleteAdminBan
      summary: Remove a ban
      description: |
        Removes a ban by its document ID (`userId::roomId`). Invalidates the moderation
        cache for the affected user and room. Requires admin role.
      tags:
        - admin
      parameters:
        - name: banId
          in: path
          required: true
          description: Ban document ID (format `userId::roomId`)
          schema:
            type: string
      responses:
        "204":
          description: Ban removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/mutes:
    get:
      operationId: getAdminMutes
      summary: List all mutes
      description: |
        Paginated list of all room mutes across the system. Supports filtering
        by user and/or room — both filters apply as a Mongo selector before
        pagination, so they reduce `X-Total-Count` accordingly. Requires admin role.
      tags:
        - admin
      parameters:
        - $ref: "#/components/parameters/queryUserIdFilter"
        - $ref: "#/components/parameters/queryRoomIdFilter"
        - $ref: "#/components/parameters/queryLimit"
        - $ref: "#/components/parameters/queryOffset"
        - $ref: "#/components/parameters/querySort"
        - $ref: "#/components/parameters/queryOrder"
      responses:
        "200":
          description: List of mutes
          headers:
            X-Total-Count:
              description: Total number of mutes
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: object
                properties:
                  mutes:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminMute"
                  hasMore:
                    type: boolean
                  total:
                    type: integer
                    description: Total number of items before pagination
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      operationId: postAdminMute
      summary: Create a mute
      description: |
        Mutes a user in a specific room. The user remains a member but cannot
        post messages there. Writes a `create_mute` audit entry. Requires
        admin role.
      tags:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
                - roomId
              properties:
                userId:
                  $ref: "#/components/schemas/ExternalUserId"
                  description: External UUID of the user to mute.
                roomId:
                  $ref: "#/components/schemas/RoomId"
                  description: Room in which the mute applies.
                reason:
                  type: string
                  maxLength: 500
                  description: Optional reason recorded with the mute.
      responses:
        "201":
          description: Mute created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: ["ok"]
              example:
                status: "ok"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/mutes/{muteId}:
    delete:
      operationId: deleteAdminMute
      summary: Remove a mute
      description: |
        Removes a mute by its document ID (`userId::roomId`). Invalidates the moderation
        cache for the affected user and room. Requires admin role.
      tags:
        - admin
      parameters:
        - name: muteId
          in: path
          required: true
          description: Mute document ID (format `userId::roomId`)
          schema:
            type: string
      responses:
        "204":
          description: Mute removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/reports:
    post:
      operationId: postAdminReport
      summary: File a moderation report (admin)
      description: |
        Files a report against a user as the admin account. `roomId` is
        optional — when omitted or empty, the report is recorded as global
        (not bound to any room). Writes a `create_report` audit entry.
        Requires admin role.
      tags:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
                - reason
              properties:
                userId:
                  $ref: "#/components/schemas/ExternalUserId"
                  description: External UUID of the user being reported.
                roomId:
                  $ref: "#/components/schemas/RoomId"
                  description: |
                    Optional room where the violation occurred. Pass an empty
                    string or omit the field to record a user-level report.
                reason:
                  type: string
                  minLength: 1
                  maxLength: 500
                  description: Required reason text recorded with the report.
      responses:
        "201":
          description: Report created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: ["ok"]
              example:
                status: "ok"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/reports/{reportId}:
    delete:
      operationId: deleteAdminReport
      summary: Delete a message report
      description: |
        Deletes a message report by its document ID. Requires admin role.
      tags:
        - admin
      parameters:
        - name: reportId
          in: path
          required: true
          description: Report document ID
          schema:
            type: string
      responses:
        "204":
          description: Report deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/health:
    get:
      operationId: getAdminHealth
      summary: Check service health
      description: |
        Returns health status of core services: memtabd and mongodb.
        Each service reports `"ok"` or `"error"`. Requires admin role.
      tags:
        - admin
      responses:
        "200":
          description: Service health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  memtabd:
                    type: string
                    enum: [ok, error]
                  mongodb:
                    type: string
                    enum: [ok, error]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/alerts:
    get:
      operationId: getAdminAlerts
      summary: Get system alerts
      description: |
        Returns system alerts based on service health, memory usage (>1 GB),
        and process count (>80% of limit). Checks all connected nodes.
        Requires admin role.
      tags:
        - admin
      responses:
        "200":
          description: System alerts
          content:
            application/json:
              schema:
                type: object
                properties:
                  alerts:
                    type: array
                    items:
                      type: object
                      properties:
                        level:
                          type: string
                          enum: [danger, warning, info]
                        message:
                          type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/webhooks/status:
    get:
      operationId: getAdminWebhooksStatus
      summary: Get webhook circuit breaker status
      description: |
        Returns webhook circuit breaker and retry queue status plus the
        durable delivery queue counters. Circuits track failure counts per
        webhook URL. Retries track pending in-memory retry attempts.
        `queueDepth` counts pending plus in-flight durable deliveries and
        `dlqCount` counts dead-lettered deliveries awaiting redrive or TTL
        expiry. Requires admin role.
      tags:
        - admin
      responses:
        "200":
          description: Webhook status
          content:
            application/json:
              schema:
                type: object
                properties:
                  circuits:
                    type: array
                    items:
                      type: object
                      properties:
                        key:
                          type: string
                        failures:
                          type: integer
                        lastFailure:
                          type: string
                  retries:
                    type: array
                    items:
                      type: object
                      properties:
                        key:
                          type: string
                        retryCount:
                          type: integer
                  totalCircuits:
                    type: integer
                  totalRetries:
                    type: integer
                  queueEnabled:
                    type: boolean
                    description: Whether the durable delivery queue is enabled.
                  queueDepth:
                    type: integer
                    description: Pending plus in-flight durable deliveries.
                  dlqCount:
                    type: integer
                    description: Dead-lettered deliveries currently retained.
                  oldestPendingAgeSeconds:
                    type: integer
                    nullable: true
                    description: >
                      Age in seconds of the oldest pending durable delivery,
                      or null when nothing is pending.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/webhooks/dlq:
    get:
      operationId: getAdminWebhooksDlq
      summary: List dead webhook deliveries
      description: |
        Returns one page of dead-lettered webhook deliveries (durable
        deliveries that exhausted their retry budget), most recently died
        first. Each row carries the delivery id, the target reduced to its
        kind plus address (credentials are never returned), the rendered
        body and the last recorded error. Dead deliveries expire
        automatically after the configured DLQ TTL. Requires admin role.
      tags:
        - admin
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: One page of dead webhook deliveries
          headers:
            X-Total-Count:
              description: Total number of dead deliveries before pagination
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: object
                properties:
                  deliveries:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: >
                            Delivery id; matches the X-Webhook-Delivery-Id
                            header sent on every attempt.
                        target:
                          type: object
                          properties:
                            kind:
                              type: string
                              enum: [user, url]
                            userId:
                              type: string
                            url:
                              type: string
                        eventType:
                          type: string
                        source:
                          type: string
                        attempts:
                          type: integer
                        maxAttempts:
                          type: integer
                        lastError:
                          type: object
                          nullable: true
                          properties:
                            attempt:
                              type: integer
                            reason:
                              type: string
                            at:
                              type: string
                        createdAt:
                          type: string
                        body:
                          type: string
                          description: >
                            JSON body exactly as it is POSTed to the
                            webhook endpoint.
                  hasMore:
                    type: boolean
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/webhooks/dlq/{deliveryId}:
    delete:
      operationId: deleteAdminWebhooksDlq
      summary: Delete a dead webhook delivery
      description: |
        Permanently removes a dead-lettered webhook delivery. Returns 404
        when the delivery does not exist or is not dead. Requires admin
        role.
      tags:
        - admin
      parameters:
        - name: deliveryId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Dead delivery removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/webhooks/dlq/{deliveryId}/retry:
    post:
      operationId: postAdminWebhooksDlqRetry
      summary: Redrive a dead webhook delivery
      description: |
        Re-queues a dead-lettered webhook delivery for immediate retry with
        a fresh attempt budget. The previous failure is kept as history on
        the delivery. Returns 404 when the delivery does not exist or is
        not dead. Requires admin role.
      tags:
        - admin
      parameters:
        - name: deliveryId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Dead delivery re-queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/messages/{messageId}/context:
    get:
      operationId: getAdminMessageContext
      summary: Get message with surrounding context
      description: |
        Returns the specified message along with up to 5 messages before and
        5 messages after it in the same room, ordered by timestamp.
        Requires admin role.
      tags:
        - admin
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Message with context
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    $ref: "#/components/schemas/AdminMessage"
                  before:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminMessage"
                  after:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminMessage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/attachments/{slot}:
    get:
      operationId: getAdminAttachment
      summary: Download an attachment by slot (admin)
      description: |
        Streams the raw bytes of an attachment stored in the shared blob
        storage, identified by its opaque slot ID. The optional `mime` and
        `name` query parameters control the response `Content-Type` and
        `Content-Disposition` headers respectively, so the admin panel can
        serve the file with the right MIME hint and download filename even
        when those values are not embedded in the slot metadata.
        Requires admin role.
      tags:
        - admin
      parameters:
        - name: slot
          in: path
          required: true
          schema:
            type: string
          description: Opaque slot identifier returned by the upload pipeline.
        - name: mime
          in: query
          required: false
          schema:
            type: string
          description: |
            Content-Type to set on the response. Defaults to
            `application/octet-stream` when omitted.
        - name: name
          in: query
          required: false
          schema:
            type: string
          description: |
            Filename for the `Content-Disposition` header. When omitted, the
            header is not sent at all.
      responses:
        "200":
          description: Attachment bytes
          headers:
            Content-Type:
              description: MIME type, taken from the `mime` query param when present.
              schema:
                type: string
            Content-Disposition:
              description: |
                `inline; filename=...` when `name` is provided (inline so the
                panel can render previews); omitted otherwise.
              schema:
                type: string
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/users/{userId}:
    get:
      operationId: getAdminUserDetail
      summary: Get detailed user information
      description: |
        Returns enriched user details including their rooms, recent messages,
        bans, mutes, and active session status. The `userId` path parameter is
        the user's external ID (UUID), the same identifier used across the rest
        of the `/admin/*` API. Requires admin role.
      tags:
        - admin
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    description: User profile data
                  rooms:
                    type: array
                    items:
                      type: object
                      description: Rooms the user belongs to
                  recentMessages:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminMessage"
                  bans:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminBan"
                  mutes:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminMute"
                  activeSession:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    delete:
      operationId: deleteAdminUser
      summary: Hard-delete a user (admin)
      description: |
        Permanently removes a user and cascades the deletion through every
        artefact tied to them: rooms they own (via the same path used by
        `deleteAdminRoom`, so remaining members are notified), every
        message they authored across any room, their roster doc, and the
        baseline cleanup performed by the regular user delete (active
        session, room prefs, blocks, bans, mutes, read receipts,
        scheduled messages, and the `chat_engine_service` doc itself).

        Refuses to delete the synthetic panel admin (`panel_admin`) and
        any config admin (`config_admin`). Writes a `delete_user` audit
        entry. Requires admin role.
      tags:
        - admin
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: User deleted with cascade.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/users/{userId}/rate-limit/reset:
    post:
      operationId: postAdminResetRateLimit
      summary: Reset a user's rate limit counters
      description: |
        Clears any rate-limit counters for the target user on every cluster
        node. Useful when supporting a user that was incorrectly throttled or
        for resetting bursts manually. Writes a `reset_rate_limit` audit
        entry. Requires admin role.
      tags:
        - admin
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: Target user's external id.
      responses:
        "204":
          description: Rate-limit counters cleared
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/users/{userId}/messages:
    get:
      operationId: getAdminUserMessages
      summary: List messages sent by a user (admin)
      description: |
        Returns a paginated list of all messages authored by the target user
        across every room, sorted by timestamp descending (newest first).
        The `userId` parameter is the full internal JID (e.g.
        `user1@chat-core.com`), matching the convention used by other
        `/admin/users/{userId}` endpoints. Requires admin role.
      tags:
        - admin
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: Target user's internal JID.
        - $ref: "#/components/parameters/queryOffset"
        - $ref: "#/components/parameters/queryLimit"
      responses:
        "200":
          description: Paginated list of messages authored by the user
          headers:
            X-Total-Count:
              description: Total number of messages authored by this user
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: object
                required:
                  - messages
                  - hasMore
                  - total
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminMessage"
                  hasMore:
                    type: boolean
                    description: |
                      True when `offset + messages.length < total`.
                  total:
                    type: integer
                    description: Total messages authored by the user.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ============================================================
  # ADMIN — bulk operations + active toggle
  # ============================================================
  # Bulk endpoints accept a list of IDs in the body and return a
  # `BulkOperationResult` reflecting partial success. Each call writes
  # a single audit entry with the count of successful items.
  /admin/users/bulk-delete:
    post:
      operationId: postAdminUsersBulkDelete
      summary: Hard-delete multiple users in one call
      description: |
        Hard-deletes each user in `userIds` with the same cascade as
        `deleteAdminUser`. Synthetic panel admin and config admins are
        skipped with `panel_admin` / `config_admin` reasons in the per-id
        error map. Writes a single `bulk_delete_users` audit entry with
        the count of users actually removed. Requires admin role.
      tags:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userIds]
              properties:
                userIds:
                  type: array
                  items:
                    type: string
                  description: External user IDs to delete.
      responses:
        "200":
          description: Bulk operation result with per-id status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkOperationResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/users/bulk-deactivate:
    post:
      operationId: postAdminUsersBulkDeactivate
      summary: Deactivate multiple users in one call
      description: |
        Soft-deactivates each user in `userIds`. Skips the synthetic panel
        admin (`panel_admin` reason) and any config admin (`config_admin`
        reason). Force-closes active sessions of deactivated users. Writes
        a single `bulk_deactivate_users` audit entry. Requires admin role.
      tags:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userIds]
              properties:
                userIds:
                  type: array
                  items:
                    type: string
                  description: External user IDs to deactivate.
      responses:
        "200":
          description: Bulk operation result with per-id status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkOperationResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/users/{userId}/active:
    put:
      operationId: putAdminUserActive
      summary: Toggle a user's active flag (admin)
      description: |
        Activates or deactivates a single user. Returns `403 Forbidden` for
        the synthetic panel admin and any config admin. Setting
        `active: false` force-closes the user's active session and writes
        a `change_user_active` audit entry. Requires admin role.
      tags:
        - admin
      parameters:
        - $ref: "#/components/parameters/pathUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [active]
              properties:
                active:
                  type: boolean
                  description: New active state for the user.
      responses:
        "200":
          description: Active flag updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/sessions/bulk-kick:
    post:
      operationId: postAdminSessionsBulkKick
      summary: Force-close active sessions for multiple users
      description: |
        Force-closes the active session of each user in `userIds`. Writes a
        single `bulk_kick_sessions` audit entry with the count of sessions
        closed. Requires admin role.
      tags:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userIds]
              properties:
                userIds:
                  type: array
                  items:
                    type: string
                  description: External user IDs whose sessions should be closed.
      responses:
        "200":
          description: Bulk operation result with per-id status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkOperationResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/messages/bulk-delete:
    post:
      operationId: postAdminMessagesBulkDelete
      summary: Delete multiple messages in one call
      description: |
        Marks each message in `ids` as deleted. Writes a single
        `bulk_delete_messages` audit entry with the count of deletions.
        Requires admin role.
      tags:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  description: Message IDs to delete.
      responses:
        "200":
          description: Bulk operation result with per-id status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkOperationResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/bans/bulk-delete:
    post:
      operationId: postAdminBansBulkDelete
      summary: Remove multiple room bans in one call
      description: |
        Removes each ban in `ids` and invalidates the moderation cache for
        the affected `(user, room)` pairs. Writes a single
        `bulk_remove_bans` audit entry. Requires admin role.
      tags:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  description: Ban IDs to remove.
      responses:
        "200":
          description: Bulk operation result with per-id status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkOperationResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/mutes/bulk-delete:
    post:
      operationId: postAdminMutesBulkDelete
      summary: Remove multiple room mutes in one call
      description: |
        Removes each mute in `ids` and invalidates the moderation cache for
        the affected `(user, room)` pairs. Writes a single
        `bulk_remove_mutes` audit entry. Requires admin role.
      tags:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  description: Mute IDs to remove.
      responses:
        "200":
          description: Bulk operation result with per-id status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkOperationResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/reports/bulk-delete:
    post:
      operationId: postAdminReportsBulkDelete
      summary: Remove multiple message reports in one call
      description: |
        Removes each report in `ids`. Writes a single `bulk_delete_reports`
        audit entry. Requires admin role.
      tags:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  description: Report IDs to remove.
      responses:
        "200":
          description: Bulk operation result with per-id status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkOperationResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/blocks:
    get:
      operationId: getAdminBlocks
      summary: List user-to-user block records globally
      description: |
        Paginated list of all user-to-user block records. Each record links a
        `blockerId` to a `blockedId` (external ids). Useful for support
        investigations and audits. Requires admin role.
      tags:
        - admin
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 100000
            default: 0
      responses:
        "200":
          description: List of block records
          headers:
            X-Total-Count:
              description: Total number of block records
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: object
                properties:
                  blocks:
                    type: array
                    items:
                      type: object
                      properties:
                        blockerId:
                          type: string
                        blockedId:
                          type: string
                  totalBlocks:
                    type: integer
                  hasMore:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/webhooks/config:
    get:
      operationId: getAdminWebhooksConfig
      summary: Get webhook runtime configuration
      description: |
        Returns the current global webhook runtime configuration: timeout,
        retry budget and a flag indicating whether the signing secret is
        configured. The secret value is never returned. Requires admin role.
      tags:
        - admin
      responses:
        "200":
          description: Webhook runtime configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  timeoutMs:
                    type: integer
                    description: HTTP request timeout in milliseconds.
                  maxRetries:
                    type: integer
                    description: Maximum number of retries per delivery.
                  secretConfigured:
                    type: boolean
                    description: True when a non-empty signing secret is configured.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    put:
      operationId: putAdminWebhooksConfig
      summary: Update webhook runtime configuration (cluster-wide)
      description: |
        Updates the global webhook runtime configuration. The change is
        persisted to the `chat_api_admin_runtime_config` collection,
        applied locally and propagated to every other cluster node under a
        `global:trans` lock. Returns **409 Conflict** if another node is
        already applying a webhook config update.

        The audit entry redacts the `secret` value. Requires admin role.
      tags:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                timeoutMs:
                  type: integer
                  minimum: 1
                  description: HTTP request timeout in milliseconds (must be > 0).
                maxRetries:
                  type: integer
                  minimum: 0
                  description: Maximum number of retries per delivery.
                secret:
                  type: string
                  minLength: 32
                  description: Signing secret. Minimum 32 bytes. Stored opaque.
      responses:
        "200":
          description: Webhook configuration updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Another cluster node is applying a webhook config update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ============================================================
  # INTERNAL (service-to-service, requires API key)
  # ============================================================
  /internal/users:
    post:
      operationId: postInternalUser
      summary: Create user (internal)
      description: Same as POST /users but authenticated via internal API key.
      tags:
        - internal
      security:
        - ApiKeyAuth: []
      requestBody:
        $ref: "#/components/requestBodies/PostUserRequest"
      responses:
        "201":
          $ref: "#/components/responses/PostUserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /internal/users/{userId}:
    delete:
      operationId: deleteInternalUser
      summary: Delete user (internal)
      tags:
        - internal
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/pathUserId"
      responses:
        "204":
          description: User deleted
        "401":
          $ref: "#/components/responses/Unauthorized"

  /internal/rooms:
    post:
      operationId: postInternalRoom
      summary: Create room (internal)
      tags:
        - internal
      security:
        - ApiKeyAuth: []
      parameters:
        - name: x-user-id
          in: header
          required: true
          schema:
            type: string
          description: >-
            External ID of the user that owns the room. The backend resolves
            the actor from this header (falling back to `userId`/`externalIds`
            in the body); without it the request fails.
      requestBody:
        $ref: "#/components/requestBodies/PostRoomRequest"
      responses:
        "201":
          description: Room created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /internal/rooms/{roomId}:
    delete:
      operationId: deleteInternalRoom
      summary: Delete room (internal)
      tags:
        - internal
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
      responses:
        "204":
          description: Room deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /internal/rooms/{roomId}/users:
    post:
      operationId: postInternalRoomUser
      summary: Add user to room (internal)
      tags:
        - internal
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - name: x-user-id
          in: header
          required: true
          schema:
            type: string
          description: >-
            External ID of the inviting user. The backend resolves the actor
            from this header (falling back to `userId`/`externalIds` in the
            body); without it the request fails.
      requestBody:
        $ref: "#/components/requestBodies/PostRoomUserRequest"
      responses:
        "204":
          description: All operations completed successfully
        "207":
          description: >-
            Multi-Status. Some operations succeed and others fail.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - user
                    - result
                  properties:
                    user:
                      $ref: "#/components/schemas/UserId"
                    result:
                      type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /internal/rooms/{roomId}/users/{userId}:
    delete:
      operationId: deleteInternalRoomUser
      summary: Remove user from room (internal)
      description: Same as DELETE /rooms/{roomId}/users/{userId} but authenticated via internal API key.
      tags:
        - internal
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathUserId"
        - name: x-user-id
          in: header
          required: true
          schema:
            type: string
          description: User ID performing the action
      responses:
        "204":
          description: User removed from room
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /internal/rooms/{roomId}/users/{userId}/role:
    put:
      operationId: putInternalRoomUserRole
      summary: Update user role in room (internal)
      description: Same as PUT /rooms/{roomId}/users/{userId}/role but authenticated via internal API key.
      tags:
        - internal
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathUserId"
        - name: x-user-id
          in: header
          required: true
          schema:
            type: string
          description: User ID performing the action
      requestBody:
        $ref: "#/components/requestBodies/PutRoomUserRoleRequest"
      responses:
        "204":
          description: Role updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /internal/rooms/{roomId}/config:
    put:
      operationId: putInternalRoomConfig
      summary: Update room configuration (internal)
      description: Same as PUT /rooms/{roomId}/config but authenticated via internal API key.
      tags:
        - internal
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - name: x-user-id
          in: header
          required: true
          schema:
            type: string
          description: User ID performing the action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                subject:
                  type: string
                avatarUrl:
                  type: string
                custom:
                  type: object
                  additionalProperties: true
      responses:
        "204":
          description: Room configuration updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /internal/rooms/{roomId}/messages:
    post:
      operationId: postInternalRoomMessage
      summary: Send message to room (internal)
      description: |
        Sends a message to a room bypassing membership and moderation checks.
        Authenticated via internal API key.
      tags:
        - internal
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - from
                - body
                - type
              properties:
                from:
                  type: string
                  description: User ID of the sender
                body:
                  type: string
                  description: Message body text
                type:
                  type: string
                  description: "Message type (e.g. regular, system)"
                metadata:
                  type: object
                  description: Optional metadata (for system messages, merged with system flag)
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  from:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
                  text:
                    type: string
                  metadata:
                    type: object
                  messageId:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /internal/contacts:
    post:
      operationId: postInternalContact
      summary: Add a mutual contact relationship (internal)
      description: |
        Adds `contactUserId` to the roster of the user identified by the
        `x-user-id` header AND `x-user-id` to the roster of `contactUserId`,
        so both users immediately see each other in their roster and receive
        presence updates from each other. Authenticated via internal API key.
        Idempotent on each side: a side already in the roster is skipped, so
        callers do not need to make two separate calls. Used by WB backend to
        keep CHT contacts in sync with the social graph (e.g. when a user
        follows another).
      tags:
        - internal
      security:
        - ApiKeyAuth: []
      parameters:
        - name: x-user-id
          in: header
          required: true
          schema:
            type: string
          description: External ID of the user that owns the roster
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - contactUserId
              properties:
                contactUserId:
                  type: string
                  description: External ID of the user to add as contact
      responses:
        "204":
          description: Contact added (or already present)
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /internal/contacts/{userId}/block:
    put:
      operationId: putInternalBlockedUser
      summary: Block a user (internal)
      description: |
        Same as PUT /contacts/{userId}/block but authenticated via internal API key.
        Requires `x-user-id` header to identify the blocking user. Triggers async
        `room_deleted` SSE event to the blocked user if a DM room exists.
      tags:
        - internal
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/pathUserId"
        - name: x-user-id
          in: header
          required: true
          schema:
            type: string
          description: User ID performing the block
      responses:
        "204":
          description: User blocked
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: deleteInternalBlockedUser
      summary: Unblock a user (internal)
      description: |
        Same as DELETE /contacts/{userId}/block but authenticated via internal API key.
        Requires `x-user-id` header to identify the unblocking user.
      tags:
        - internal
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/pathUserId"
        - name: x-user-id
          in: header
          required: true
          schema:
            type: string
          description: User ID performing the unblock
      responses:
        "204":
          description: User unblocked
        "401":
          $ref: "#/components/responses/Unauthorized"

  /internal/sessions/{userId}:
    delete:
      operationId: deleteInternalSession
      summary: Force-close active session (internal)
      description: |
        Terminates the active XMPP/WebSocket session of the given user. Used by
        WB backend during account deactivation to immediately invalidate the
        user's connection. Authenticated via internal API key.
      tags:
        - internal
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/pathUserId"
      responses:
        "204":
          description: Session closed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /internal/revocations:
    post:
      operationId: postInternalRevocation
      summary: Mark all tokens of a user as revoked (internal)
      description: |
        Records a revocation entry for the user. Any subsequent JWT presented
        with `iat < revokedAt` is rejected with `Token revoked`. The entry
        auto-expires after `revoked_at + revocation_token_ttl` (default 65 min,
        i.e. max access-token TTL plus clock-skew leeway). Idempotent: repeated
        calls keep the maximum `revokedAt`/`expiresAt`. The active session for
        the user is force-closed as part of the call. Used by WB backend on
        logout and account deactivation. Authenticated via internal API key.

        Implementation: state lives in a per-node ETS cache replicated across
        the cluster via RPC and persisted to MongoDB (TTL index on
        `expires_at`) so revocations survive node restarts.
      tags:
        - internal
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, revokedAt]
              properties:
                userId:
                  $ref: "#/components/schemas/UserId"
                revokedAt:
                  type: integer
                  format: int64
                  description: Unix epoch in seconds. Tokens with `iat < revokedAt` are rejected.
                  example: 1714123456
      responses:
        "204":
          description: Revocation recorded
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

# ================================================================
# COMPONENTS
# ================================================================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
    BasicAuth:
      type: http
      scheme: basic
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

  # ----------------------------------------------------------
  # SCHEMAS
  # ----------------------------------------------------------
  schemas:
    UserId:
      type: string
      format: uuid
      example: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"

    RoomId:
      type: string
      format: uuid
      example: "f0e1d2c3-b4a5-4968-8765-432109876543"

    MessageId:
      type: string
      format: uuid
      example: "fbbc32b7-8f1a-4b5c-a685-556fd9ce1cc3"

    AttachmentId:
      type: string
      format: uuid

    ExternalUserId:
      type: string
      minLength: 1

    Metadata:
      type: object
      description: |
        Arbitrary key-value storage. Some keys are interpreted by the server
        depending on the messageType of the parent message:
        - For "location" messages, "lat" and "lng" are required and must be
          numbers (latitude and longitude); "staticMapUrl" is optional and,
          when present, holds a pre-rendered preview URL of the location.
      additionalProperties: true
      properties:
        lat:
          type: number
          description: Latitude. Required when the message has messageType "location".
        lng:
          type: number
          description: Longitude. Required when the message has messageType "location".
        staticMapUrl:
          type: string
          description: Optional pre-rendered static map URL for "location" messages.

    RoomDetail:
      type: object
      required:
        - id
        - name
        - subject
        - type
        - memberCount
        - userRole
        - config
      properties:
        id:
          $ref: "#/components/schemas/RoomId"
        name:
          type: string
          example: "Project chat"
        subject:
          type: string
          example: "Discuss project updates"
        type:
          type: string
          enum:
            - group
            - one-to-one
            - announcement
        createdAt:
          type: string
          nullable: true
          description: Room creation timestamp
        memberCount:
          type: integer
          minimum: 1
          description: Total number of members in the room
        userRole:
          type: string
          enum:
            - owner
            - admin
            - user
          description: The requesting user's role in the room
        avatarUrl:
          type: string
          nullable: true
          maxLength: 2048
        custom:
          type: object
          nullable: true
          additionalProperties: true
        muted:
          type: boolean
          description: Whether the requesting user has muted this room
        pinned:
          type: boolean
          description: Whether the requesting user has pinned this room
        selfMuted:
          type: boolean
          description: Whether an admin/owner has muted (silenced) the requesting user in this room
        config:
          type: object
          properties:
            allowInvitations:
              type: boolean

    UserSearchResult:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        configuration:
          type: object
        displayName:
          type: string
        avatarUrl:
          type: string
        bio:
          type: string
        email:
          type: string

    Error:
      type: object
      required:
        - code
        - detail
      properties:
        code:
          type: integer
        detail:
          type: string

    # --- Admin schemas ---
    AdminBan:
      type: object
      properties:
        _id:
          type: string
          description: Document ID (format `userId::roomId`)
        userId:
          type: string
        roomId:
          type: string
        bannedBy:
          type: string
        reason:
          type: string
        bannedAt:
          type: string
          format: date-time

    AdminMute:
      type: object
      properties:
        _id:
          type: string
          description: Document ID (format `userId::roomId`)
        userId:
          type: string
        roomId:
          type: string
        mutedBy:
          type: string
        mutedAt:
          type: string
          format: date-time

    AdminMessage:
      type: object
      description: >
        Message for admin cross-room views. Uses the same field naming as
        the user-facing Message schema, plus a roomId field.
      required:
        - messageId
        - from
        - timestamp
      properties:
        messageId:
          $ref: "#/components/schemas/MessageId"
        from:
          $ref: "#/components/schemas/UserId"
        timestamp:
          type: string
          format: date-time
        text:
          type: string
        text_history:
          type: array
          items:
            type: string
          nullable: true
        template:
          type: string
          nullable: true
        metadata:
          $ref: "#/components/schemas/Metadata"
        isRead:
          type: boolean
        isDeleted:
          type: boolean
        referencedMessageId:
          $ref: "#/components/schemas/MessageId"
        reaction:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/ReactionSummary"
        roomId:
          $ref: "#/components/schemas/RoomId"
          description: Room where the message was sent
        id:
          $ref: "#/components/schemas/MessageId"
          description: Alias of messageId (admin-panel denormalisation)
        body:
          type: string
          nullable: true
          description: Alias of text (admin-panel denormalisation)
        senderId:
          $ref: "#/components/schemas/UserId"
          description: Alias of from (admin-panel denormalisation)
        time:
          type: string
          format: date-time
          description: Alias of timestamp (admin-panel denormalisation)
        deleted:
          type: boolean
          description: Alias of isDeleted (admin-panel denormalisation)
        type:
          $ref: "#/components/schemas/MessageType"
          description: Derived message envelope type
        attachmentUrl:
          type: string
          nullable: true
        attachmentDownloadUrl:
          type: string
          nullable: true
          description: Admin-proxy download URL that bypasses raw slot expiry

    AdminRoom:
      type: object
      description: Room representation for admin endpoints
      required:
        - roomId
        - name
        - memberCount
      properties:
        roomId:
          $ref: "#/components/schemas/RoomId"
        name:
          type: string
        subject:
          type: string
        owner:
          $ref: "#/components/schemas/UserId"
        isPublic:
          type: boolean
          description: Whether the room allows public invitations
        memberCount:
          type: integer
        members:
          type: array
          items:
            $ref: "#/components/schemas/UserId"
        avatarUrl:
          type: string
          nullable: true
        custom:
          type: object
          nullable: true
          additionalProperties: true
        displayNames:
          type: object
          additionalProperties: true
          description: Map of member external id to display name
        type:
          type: string
          nullable: true
          description: Room type (e.g. announcement) or null

    AdminSession:
      type: object
      description: Active user session
      properties:
        userId:
          type: string
          description: External user ID
        mode:
          type: string
          enum:
            - realtime
            - webhook
            - unknown
          description: Delivery mode of the active session callback

    AdminReport:
      type: object
      description: Message report
      properties:
        _id:
          type: string
          description: Document ID
        reporterId:
          type: string
          description: User who filed the report
        messageId:
          type: string
        targetUserId:
          type: string
          description: User the report targets (for user-level reports)
        roomId:
          type: string
          nullable: true
          description: Room the report targets; null for global/user-level reports
        reason:
          type: string
        reportedAt:
          type: string
          format: date-time

    AdminStats:
      type: object
      description: System statistics
      properties:
        totalUsers:
          type: integer
          description: Total registered users
        activeSessions:
          type: integer
          description: Currently active session processes across all nodes
        totalRooms:
          type: integer
          description: Total room count from the `room` collection
        totalMessages:
          type: integer
          description: Total persisted message count from the `message` collection

    DeliveryStats:
      type: object
      description: Message delivery metrics counters
      properties:
        notify_room_attempts:
          type: integer
        notify_room_successes:
          type: integer
        notify_room_failures:
          type: integer
        notify_user_attempts:
          type: integer
        notify_user_successes:
          type: integer
        notify_user_failures:
          type: integer
        scheduled_attempts:
          type: integer
        scheduled_successes:
          type: integer
        scheduled_skipped:
          type: integer

    StatusOk:
      type: object
      properties:
        status:
          type: string
          enum: [ok]

    RoomPreferences:
      type: object
      required: [muted, pinned, hidden]
      properties:
        muted:
          type: boolean
          description: >-
            Effective mute state. For a timed mute this is `true` until
            `muteUntil` passes.
        pinned:
          type: boolean
        hidden:
          type: boolean
        muteUntil:
          type: string
          format: date-time
          nullable: true
          description: >-
            When a timed mute expires (UTC). Absent/`null` means a permanent
            mute (when `muted` is `true`) or no mute (when `muted` is `false`).

    BulkOperationResult:
      type: object
      required: [ok, errors]
      properties:
        ok:
          type: array
          items:
            type: string
          description: IDs that were processed successfully.
        errors:
          type: array
          items:
            type: object
            required: [id, reason]
            properties:
              id:
                type: string
              reason:
                type: string
          description: IDs that failed, each with the reason. Reasons are
            short tokens (e.g. `panel_admin`, `config_admin`, `not_found`,
            `invalid_id`, `internal_error`).

    # --- Read Receipts ---
    ReadReceipt:
      type: object
      properties:
        userId:
          type: string
          description: The user who read the messages
        lastReadMessageId:
          type: string
          nullable: true
          description: |
            ID of the last message this user marked as read. Absent/null when
            the user has not marked anything read in the room yet (e.g. has a
            delivered cursor but no read marker).
        lastReadAt:
          type: string
          format: date-time
          nullable: true
          description: |
            When the user last marked messages as read. Absent/null when the
            user has never marked anything read in the room.
        lastDeliveredMessageId:
          type: string
          nullable: true
          description: |
            The delivered cursor: ID of the newest message this user's client
            confirmed reception of. Every message at-or-before it in
            conversation order is delivered to this user. Absent/null when the
            user never confirmed delivery in the room. Masked (absent) on rows
            of users with a block relation with the caller.
        lastDeliveredAt:
          type: string
          format: date-time
          nullable: true
          description: |
            When the user last confirmed delivery (confirmation time, not
            message time). Absent/null when the user never confirmed delivery
            in the room. Masked (absent) on rows of users with a block
            relation with the caller.

    # --- Users ---
    User:
      type: object
      required:
        - id
      properties:
        id:
          $ref: "#/components/schemas/UserId"
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
          maxLength: 2048
        bio:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        role:
          type: string
          enum:
            - owner
            - admin
            - user
          description: Global system role
        active:
          type: boolean
        custom:
          type: object
          nullable: true
          additionalProperties: true
        configuration:
          $ref: "#/components/schemas/Configuration"

    Configuration:
      type: object
      properties:
        metadata:
          $ref: "#/components/schemas/Metadata"
        webhook:
          $ref: "#/components/schemas/WebhookConfig"

    WebhookConfig:
      type: object
      description: |
        Webhook endpoint configuration. Event deliveries are at-least-once:
        the same event can be POSTed more than once (e.g. a retry after a
        timeout whose original request was actually delivered). Every
        delivery attempt carries two additive headers the receiver can use
        to deduplicate and order:

        - `X-Webhook-Delivery-Id`: UUID identifying the logical delivery;
          constant across every retry of the same event. Deduplicate on it.
        - `X-Webhook-Attempt`: 1-based attempt counter for that delivery id.

        Delivery order across events is best-effort, not guaranteed; use
        the delivery id plus the event timestamp to reorder if needed.
      properties:
        url:
          type: string
          format: uri
        authToken:
          type: string
          description: Bearer token or basic credentials sent to the webhook.
        authMethod:
          type: string
          enum: [bearer, basic]

    UserRole:
      type: string
      enum:
        - owner
        - admin
        - user

    RoomUser:
      type: object
      required:
        - userId
      properties:
        userId:
          $ref: "#/components/schemas/UserId"
        role:
          $ref: "#/components/schemas/UserRole"

    # --- Contacts ---
    Contact:
      type: object
      required:
        - userId
        - jid
      properties:
        userId:
          type: string
          description: |
            Canonical external user ID of the contact. Prefer this field; the
            server always emits it alongside `jid`.
        jid:
          type: string
          deprecated: true
          description: |
            Legacy alias of `userId` (same value), retained for older SDK
            builds. Use `userId` instead.

    # --- Rooms ---
    Room:
      type: object
      required:
        - roomId
        - owner
      properties:
        roomId:
          $ref: "#/components/schemas/RoomId"
        name:
          type: string
        subject:
          type: string
        audience:
          type: string
          enum:
            - public
            - contacts
            - unrestricted
        allowInvitations:
          type: boolean
        owner:
          $ref: "#/components/schemas/UserId"
        members:
          type: array
          items:
            $ref: "#/components/schemas/UserId"
        publicToken:
          type: string
        avatarUrl:
          type: string
          nullable: true
          maxLength: 2048
        custom:
          type: object
          nullable: true
          additionalProperties: true
        forceGroup:
          type: boolean
          description: >-
            Present and `true` only when the room was created with
            `forceGroup: true`. Causes the room to always be reported as
            `type: "group"` regardless of member count or `allowInvitations`.

    InvitedRoom:
      type: object
      required:
        - roomId
        - invitedBy
      properties:
        roomId:
          $ref: "#/components/schemas/RoomId"
        invitedBy:
          $ref: "#/components/schemas/UserId"
        roomName:
          type: string
          description: Display name of the room
        subject:
          type: string
          description: Room subject/topic
        roomType:
          type: string
          enum: [public, private]
          description: Whether the room allows public invitations

    UnreadRoom:
      type: object
      required:
        - roomId
        - unreadMessages
      properties:
        roomId:
          $ref: "#/components/schemas/RoomId"
        unreadMessages:
          type: integer
        unreadMentions:
          type: integer
          description: >-
            Number of unread messages in this room that mention the
            authenticated user. `0` when there are none. Lets clients show an
            "@" badge without fetching message bodies.
        lastUnreadMessage:
          description: Last message object (internal format) or 0 if none
          oneOf:
            - type: object
              properties:
                from:
                  type: string
                  description: Canonical (normalized) user id of the message sender.
                fromJid:
                  type: string
                  deprecated: true
                  description: legacy alias of from; removal deferred
                timestamp:
                  type: string
                  format: date-time
                body:
                  type: string
                attachments:
                  type: array
                  items:
                    type: object
                metadata:
                  type: object
                  nullable: true
                messageId:
                  type: string
                reaction:
                  type: array
                  nullable: true
                  items:
                    $ref: "#/components/schemas/ReactionSummary"
                receipt:
                  type: string
                  enum: [sent, delivered, read]
                  description: |
                    WhatsApp-style delivery status of the last message. Present only
                    when the message was sent by the current user (no receipt is
                    emitted for incoming previews). DM semantics: `read` if the other
                    participant's lastRead covers the message; `delivered` if their
                    lastDelivered covers it; otherwise `sent`. Group semantics
                    aggregate with ALL: `read`/`delivered` only when EVERY other
                    current member's cursor covers the message. Members with a
                    block relation with the caller never count as covering, so
                    those previews stall at `sent`.
            - type: integer
              enum: [0]
        name:
          type: string
          description: Room name (group rooms only)
        avatarUrl:
          type: string
          nullable: true
          description: Room avatar URL (group rooms only)
        type:
          type: string
          enum: [group, one-to-one, announcement]
          description: Room type
        memberCount:
          type: integer
          description: Number of members (group rooms only)
        userRole:
          type: string
          enum: [owner, admin, user]
          description: Current user's role in the room (group rooms only)
        muted:
          type: boolean
          description: Whether the user has muted this room
          default: false
        pinned:
          type: boolean
          description: Whether the user has pinned this room
          default: false
        hidden:
          type: boolean
          description: Whether the user has hidden this room
          default: false
        selfMuted:
          type: boolean
          description: Whether an admin/owner has muted (silenced) the requesting user in this room

    UserRooms:
      type: object
      properties:
        invitedRooms:
          type: array
          items:
            $ref: "#/components/schemas/InvitedRoom"
        rooms:
          type: array
          items:
            $ref: "#/components/schemas/UnreadRoom"
        hasMore:
          type: boolean

    # --- Messages ---
    MessageType:
      type: string
      enum:
        - regular
        - attachment
        - reaction
        - reply
        - audio
        - forward
        - location

    ReceiptStatus:
      type: string
      enum:
        - sent
        - delivered
        - read

    ReceiptUpdateStatus:
      type: string
      description: |
        Status values accepted when updating a receipt via
        `PUT /rooms/{roomId}/messages/{messageId}/receipts`. Only `delivered`
        and `read` are accepted; `sent` is an outbound-only state and the server
        rejects it with `400`.
      enum:
        - delivered
        - read

    ContentFilter:
      type: object
      required:
        - id
        - pattern
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the filter
        pattern:
          type: string
          description: Word or phrase to match (case-insensitive)
        createdAt:
          type: string
          format: date-time
          description: When the filter was created

    ScheduledMessage:
      type: object
      required:
        - id
        - userId
        - roomId
        - sendAt
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the scheduled message
        userId:
          $ref: "#/components/schemas/UserId"
        roomId:
          $ref: "#/components/schemas/RoomId"
        text:
          type: string
          description: Message text to be sent
        metadata:
          type: object
          description: Optional metadata
          nullable: true
        sendAt:
          type: string
          format: date-time
          description: When the message will be sent
        createdAt:
          type: string
          format: date-time
          description: When the scheduled message was created

    ReactionSummary:
      type: object
      properties:
        from:
          type: string
          description: User ID who reacted
        reaction:
          type: string
          description: The emoji character
        time:
          type: string
          format: date-time

    Message:
      type: object
      required:
        - messageId
        - from
        - timestamp
      properties:
        messageId:
          $ref: "#/components/schemas/MessageId"
        from:
          $ref: "#/components/schemas/UserId"
        timestamp:
          type: string
          format: date-time
        text:
          type: string
        messageType:
          $ref: "#/components/schemas/MessageType"
        attachmentUrl:
          type: string
        referencedMessageId:
          $ref: "#/components/schemas/MessageId"
        reaction:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/ReactionSummary"
          description: Aggregated reactions on this message
        metadata:
          $ref: "#/components/schemas/Metadata"
        text_history:
          type: array
          items:
            type: string
          nullable: true
          description: Previous versions of the message text after edits
        template:
          type: string
          nullable: true
          description: Message template identifier
        isRead:
          type: boolean
          description: Whether the message has been read by the current user
        isDeleted:
          type: boolean
          description: Whether the message has been soft-deleted
      example:
        messageId: "fbbc32b7-8f1a-4b5c-a685-556fd9ce1cc3"
        from: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"
        timestamp: "2026-03-27T10:30:00Z"
        text: "Hello team! Sprint planning starts now."
        messageType: "regular"

    NewMessage:
      type: object
      description: |
        Message payload. Required fields depend on messageType:
        - "regular": text is recommended
        - "reaction": emoji and referencedMessageId are required (deprecated —
          prefer POST /rooms/{roomId}/messages/{messageId}/reactions)
        - "reply": referencedMessageId and text (or reply) are required
        - "attachment" / "audio": attachmentUrl is required
        - "forward": referencedMessageId and sourceRoomId are required
        - "location": metadata.lat and metadata.lng are required and must be numbers
      required:
        - messageType
      properties:
        from:
          $ref: "#/components/schemas/UserId"
          description: Ignored by the server. The authenticated user is used as sender.
        text:
          type: string
          maxLength: 10000
        messageType:
          $ref: "#/components/schemas/MessageType"
        referencedMessageId:
          $ref: "#/components/schemas/MessageId"
        emoji:
          type: string
          description: Emoji character for reaction messages. Required when messageType is "reaction".
        attachmentUrl:
          type: string
          description: URL returned from attachment upload
        reply:
          type: string
          description: Reply text for reply messages
        metadata:
          $ref: "#/components/schemas/Metadata"
        sourceRoomId:
          $ref: "#/components/schemas/RoomId"
          description: Source room ID for forwarded messages. Required when messageType is "forward".
        clientMessageId:
          type: string
          maxLength: 128
          description: |
            Optional client-generated idempotency key (e.g. a UUID the SDK
            assigns to its optimistic temporary message). When supplied, the
            send is idempotent over `(roomId, from, clientMessageId)`: a retry
            that replays the same key does not create a duplicate — the server
            returns the already-persisted message with the same `201` as a fresh
            send. The value round-trips inside the response `metadata` (as
            `metadata.clientMessageId`), letting the SDK reconcile its optimistic
            temporary message with the server-assigned `messageId`. Recommended
            on mobile/unreliable networks to make POST retries safe.

    # --- Presence ---
    PresenceStatus:
      type: string
      enum:
        - available
        - away
        - busy
        - dnd
        - offline

    PresenceInfo:
      type: object
      required:
        - userId
        - status
        - online
      properties:
        userId:
          $ref: "#/components/schemas/UserId"
        status:
          $ref: "#/components/schemas/PresenceStatus"
        online:
          type: boolean
        lastSeen:
          type: string
          format: date-time
          nullable: true
          description: Last time the user was online; null if never/unknown
      example:
        userId: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"
        status: "busy"
        online: true
        lastSeen: "2026-03-27T09:15:00Z"

    # --- Activity ---
    Activity:
      type: string
      enum:
        - startsTyping
        - stopsTyping

    # --- Real-time Events ---
    ServerEventType:
      type: string
      enum:
        - new_message
        - message_updated
        - message_deleted
        - room_created
        - room_updated
        - room_deleted
        - user_joined
        - user_left
        - user_role_changed
        - typing
        - presence_changed
        - receipt_updated
        - reaction_added
        - reaction_deleted
        - broadcast
        - user_updated

    ServerEvent:
      type: object
      required:
        - type
        - timestamp
      properties:
        type:
          $ref: "#/components/schemas/ServerEventType"
        timestamp:
          type: string
          format: date-time
        roomId:
          $ref: "#/components/schemas/RoomId"
        userId:
          $ref: "#/components/schemas/UserId"
        messageId:
          type: string
          description: Message identifier (for message_updated, message_deleted, receipt_updated, reaction_added, reaction_deleted)
        message:
          $ref: "#/components/schemas/Message"
        presence:
          $ref: "#/components/schemas/PresenceInfo"
        activity:
          $ref: "#/components/schemas/Activity"
        role:
          type: string
          description: New role (for user_role_changed)
          enum: [owner, admin, user]
        status:
          type: string
          description: Receipt status (for receipt_updated)
          enum: [read]
        contactId:
          $ref: "#/components/schemas/UserId"
          description: Contact identifier (for typing in direct messages)
        fromUserId:
          $ref: "#/components/schemas/UserId"
          description: Sender identifier (for broadcast events)
        emoji:
          type: string
          description: Emoji reaction (for reaction_added)
        data:
          type: object
          additionalProperties: true
          description: |
            Additional event-specific data. Contents depend on event type:
            - new_message: Full message object in `message` field
            - message_updated: `messageId`, `roomId`, and optionally `message` (full updated message object)
            - message_deleted: `messageId` and `roomId`
            - room_created, room_updated, room_deleted: `roomId`
            - user_joined, user_left: `userId` and `roomId`
            - user_role_changed: `userId`, `roomId`, and `role`
            - typing (room): `userId`, `roomId`, and `activity`
            - typing (DM): `userId`, `contactId`, and `activity`
            - presence_changed: `userId` and `status`
            - receipt_updated: `messageId`, `roomId`, `status`, and `userId` (who sent the receipt)
            - reaction_added: `messageId`, `roomId`, `userId`, and `emoji`
            - reaction_deleted: `messageId` and `roomId`
            - broadcast: `fromUserId` and `message` (text)


  # ----------------------------------------------------------
  # PARAMETERS
  # ----------------------------------------------------------
  parameters:
    headerUserId:
      name: X-From-User-Id
      in: header
      required: false
      description: |
        User ID to act on behalf of. Used for managed-user delegation: a parent
        user authenticates with their own credentials and sets this header to the
        managed user's ID. The server verifies that the authenticated user is the
        parent of the specified user. If the header equals the authenticated user,
        it is a no-op. If the specified user is not a managed user of the
        authenticated user, the server responds 403 with `impersonation_denied`.
      schema:
        $ref: "#/components/schemas/ExternalUserId"

    pathUserId:
      name: userId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/UserId"

    pathParentId:
      name: parentId
      in: path
      required: true
      description: Identifier of the parent user that owns the managed users.
      schema:
        $ref: "#/components/schemas/UserId"

    pathRoomId:
      name: roomId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/RoomId"

    pathMessageId:
      name: messageId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/MessageId"

    queryBefore:
      name: before
      in: query
      required: false
      description: Return messages before this timestamp (pagination)
      schema:
        type: string
        format: date-time

    queryAfter:
      name: after
      in: query
      required: false
      description: Return messages after this timestamp (pagination)
      schema:
        type: string
        format: date-time

    queryLimit:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50

    queryOffset:
      name: offset
      in: query
      required: false
      description: Number of items to skip before returning results
      schema:
        type: integer
        minimum: 0
        default: 0

    querySort:
      name: sort
      in: query
      required: false
      description: Field name to sort results by
      schema:
        type: string

    queryOrder:
      name: order
      in: query
      required: false
      description: Sort direction (ascending or descending)
      schema:
        type: string
        enum:
          - asc
          - desc
        default: asc

    queryUserIdFilter:
      name: userId
      in: query
      required: false
      description: |
        Optional external user UUID filter. Restricts the result set to the
        rows that involve this user.
      schema:
        $ref: "#/components/schemas/ExternalUserId"

    queryRoomIdFilter:
      name: roomId
      in: query
      required: false
      description: |
        Optional external room UUID filter. Restricts the result set to the
        rows that involve this room.
      schema:
        $ref: "#/components/schemas/RoomId"

  # ----------------------------------------------------------
  # REQUEST BODIES
  # ----------------------------------------------------------
  requestBodies:
    PostUserRequest:
      description: |
        Optional body. The user identity is derived from the authentication
        token/headers, but any profile fields supplied here are validated and
        applied in the same request (the endpoint doubles as create + initial
        profile, so no follow-up `PATCH` is needed). Profile changes are
        notified to the user's contacts. `externalIds`/`passwords` are only
        consulted when an `id_mapping_mod`/`basic_auth_mod` is configured.
      required: false
      content:
        application/json:
          schema:
            type: object
            properties:
              displayName:
                type: string
                maxLength: 128
              avatarUrl:
                type: string
                maxLength: 2048
              bio:
                type: string
                maxLength: 500
              email:
                type: string
                maxLength: 256
              custom:
                type: object
                additionalProperties: true
                description: >-
                  Arbitrary client metadata. Serialized form capped at 8192
                  bytes (400 if exceeded).
              externalIds:
                type: string
                description: >-
                  External system identifier, passed to the configured
                  id_mapping_mod to resolve the internal user ID. Only used
                  when id_mapping_mod is configured.
              passwords:
                type: string
                description: >-
                  Credentials for the basic auth module. Only used when
                  basic_auth_mod is configured.

    PostManagedUsersRequest:
      content:
        application/json:
          schema:
            type: object
            required:
              - externalIds
            properties:
              externalIds:
                type: array
                items:
                  type: string

    PostContactRequest:
      content:
        application/json:
          schema:
            type: object
            required:
              - userId
            properties:
              userId:
                $ref: "#/components/schemas/UserId"

    PostRoomRequest:
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                maxLength: 100
              subject:
                type: string
              audience:
                type: string
                enum: [public, contacts, unrestricted]
                description: >-
                  Room visibility. "public" allows anyone, "contacts" requires
                  members to be in the creator's roster, "unrestricted" validates
                  that members exist and are not blocked but does not require roster.
              members:
                type: array
                items:
                  $ref: "#/components/schemas/UserId"
              allowInvitations:
                type: boolean
              avatarUrl:
                type: string
                maxLength: 2048
              custom:
                type: object
                additionalProperties: true
                description: >-
                  Arbitrary client metadata. Serialized form capped at 8192
                  bytes; a larger payload returns `400`.
              forceGroup:
                type: boolean
                description: >-
                  When true, the room is always reported as `type: "group"`
                  regardless of member count or `allowInvitations`. Use this
                  for rooms whose nature is conceptually a group (e.g. plans
                  with two participants) so they are not misclassified as DMs.
          example:
            name: "Project Alpha"
            subject: "Sprint planning and updates"
            audience: "contacts"
            members: ["a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d", "b2c3d4e5-f6a7-4b8c-9d0e-1f2a3b4c5d6e"]
            allowInvitations: true
            forceGroup: false

    PutRoomConfigRequest:
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                maxLength: 100
              subject:
                type: string
              avatarUrl:
                type: string
                maxLength: 2048
              custom:
                type: object
                additionalProperties: true
                description: >-
                  Arbitrary client metadata. Serialized form capped at 8192
                  bytes; a larger payload returns `400`.
          example:
            name: "Project Alpha - v2"
            subject: "Retrospective"

    PostRoomUserRequest:
      content:
        application/json:
          schema:
            type: object
            required:
              - userIds
              - mode
            properties:
              userIds:
                type: array
                minItems: 1
                maxItems: 100
                items:
                  $ref: "#/components/schemas/UserId"
              mode:
                type: string
                enum:
                  - invite
                  - accept_invitation
                  - decline_invitation
                  - invite_and_join
              token:
                type: string
                description: >-
                  Public room join token. Only used with mode "invite_and_join"
                  for public rooms. The server validates this token against the
                  room's publicToken.

    PutRoomUserRoleRequest:
      content:
        application/json:
          schema:
            type: object
            required:
              - role
            properties:
              role:
                type: string
                description: >-
                  Target role. Only `admin` and `user` are assignable; `owner`
                  is not (it is set at room creation and cannot be reassigned
                  through this endpoint — sending it returns `400`).
                enum:
                  - admin
                  - user
          example:
            role: "admin"

    PutRoomActivityRequest:
      content:
        application/json:
          schema:
            type: object
            required:
              - activity
            properties:
              activity:
                $ref: "#/components/schemas/Activity"
              from:
                $ref: "#/components/schemas/UserId"
                description: Ignored by the server. The authenticated user is used as sender.
          example:
            activity: "startsTyping"
            from: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"

    PostRoomMessageRequest:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/NewMessage"
          examples:
            regular:
              summary: Regular text message
              value:
                text: "Hello team! Sprint planning starts now."
                messageType: "regular"
            reply:
              summary: Reply to another message
              value:
                text: "Ready! Let's go."
                messageType: "reply"
                referencedMessageId: "fbbc32b7-8f1a-4b5c-a685-556fd9ce1cc3"
            reaction:
              summary: Emoji reaction
              value:
                emoji: "🚀"
                messageType: "reaction"
                referencedMessageId: "fbbc32b7-8f1a-4b5c-a685-556fd9ce1cc3"
            forward:
              summary: Forward from another room
              value:
                text: "Check this out"
                messageType: "forward"
                referencedMessageId: "fbbc32b7-8f1a-4b5c-a685-556fd9ce1cc3"
                sourceRoomId: "f0e1d2c3-b4a5-4968-8765-432109876543"

    PutRoomMessageRequest:
      content:
        application/json:
          schema:
            type: object
            required:
              - text
            properties:
              from:
                $ref: "#/components/schemas/UserId"
                description: Ignored by the server. The authenticated user is used as sender.
              text:
                type: string
                maxLength: 10000
              metadata:
                $ref: "#/components/schemas/Metadata"

    PutReceiptRequest:
      content:
        application/json:
          schema:
            type: object
            required:
              - status
            properties:
              from:
                $ref: "#/components/schemas/UserId"
              status:
                $ref: "#/components/schemas/ReceiptUpdateStatus"
          example:
            status: "read"
            from: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"

  # ----------------------------------------------------------
  # RESPONSES
  # ----------------------------------------------------------
  responses:
    PostUserResponse:
      description: |
        User created. Returns the assigned external `userId` plus the freshly
        created profile under `user` (id + configuration) — handy so the
        client does not need a follow-up `GET /users/{userId}` to read the
        configuration applied at creation time.
      content:
        application/json:
          schema:
            type: object
            required:
              - userId
              - user
            properties:
              userId:
                $ref: "#/components/schemas/UserId"
                description: The ID assigned to the new user.
              user:
                type: object
                required:
                  - id
                properties:
                  id:
                    type: string
                    description: External user ID (same value as `userId`).
                  configuration:
                    $ref: "#/components/schemas/Configuration"
          example:
            userId: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"
            user:
              id: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"
              configuration:
                metadata: {}
                webhook: null

    GetUserResponse:
      description: |
        User profile wrapped in the `user` key. Returns the public projection
        produced by `user_to_search_json/1`: always includes `id` and
        `configuration`; `displayName`, `avatarUrl`, `bio` and `email` are
        emitted only when the user has set them. Mirrors what
        `GET /v1/users?q=...` exposes for the same user.
      content:
        application/json:
          schema:
            type: object
            properties:
              user:
                type: object
                required:
                  - id
                properties:
                  id:
                    type: string
                    description: External user ID
                  configuration:
                    $ref: "#/components/schemas/Configuration"
                  displayName:
                    type: string
                    description: Optional. Present only when set on the profile.
                  avatarUrl:
                    type: string
                    maxLength: 2048
                    description: Optional. Present only when set on the profile.
                  bio:
                    type: string
                    description: Optional. Present only when set on the profile.
                  email:
                    type: string
                    description: Optional. Present only when set on the profile.
          example:
            user:
              id: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"
              configuration:
                metadata: {}
                webhook: null
              displayName: "Alice"
              avatarUrl: "https://cdn.example.com/avatars/alice.png"
              bio: "Coffee enthusiast"
              email: "alice@example.com"

    ManagedUserResponse:
      description: Managed user info
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/User"

    ManagedUsersListResponse:
      description: List of managed users
      headers:
        X-Total-Count:
          description: Total number of items before pagination
          schema:
            type: integer
      content:
        application/json:
          schema:
            type: object
            properties:
              users:
                type: array
                items:
                  $ref: "#/components/schemas/User"
              hasMore:
                type: boolean

    CreateManagedUsersResponse:
      description: |
        Managed users created. Each entry maps the supplied `externalId` to the
        assigned internal `id`. Unlike the list endpoint this response is a
        thin id-mapping and does not carry full `User` projections or an
        `X-Total-Count` header.
      content:
        application/json:
          schema:
            type: object
            properties:
              users:
                type: array
                items:
                  type: object
                  required:
                    - externalId
                    - id
                  properties:
                    externalId:
                      type: string
                    id:
                      type: string
              hasMore:
                type: boolean

    ContactsListResponse:
      description: List of contacts
      headers:
        X-Total-Count:
          description: Total number of items before pagination
          schema:
            type: integer
      content:
        application/json:
          schema:
            type: object
            properties:
              user:
                type: string
                description: External ID of the authenticated user
              contacts:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"
              hasMore:
                type: boolean

    PostRoomResponse:
      description: Room created
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Room"

    RoomsListResponse:
      description: User rooms with unread info and invitations
      headers:
        X-Total-Count:
          description: Total number of rooms before pagination
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UserRooms"

    RoomUsersResponse:
      description: Users in a room
      headers:
        X-Total-Count:
          description: Total number of items before pagination
          schema:
            type: integer
      content:
        application/json:
          schema:
            type: object
            properties:
              users:
                type: array
                items:
                  $ref: "#/components/schemas/RoomUser"
              hasMore:
                type: boolean

    PostMessageResponse:
      description: Message sent
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Message"
          example:
            messageId: "fbbc32b7-8f1a-4b5c-a685-556fd9ce1cc3"
            from: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"
            timestamp: "2026-03-27T10:30:00Z"
            text: "Hello team! Sprint planning starts now."
            text_history: null
            template: null
            metadata: null

    MessageListResponse:
      description: List of messages
      content:
        application/json:
          schema:
            type: object
            properties:
              messages:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
              hasMore:
                type: boolean

    AttachmentMetadataResponse:
      description: Attachment uploaded successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              attachment:
                type: object
                description: |
                  Metadata returned by the upload (id, optional URL). To download
                  later, resolve a signed URL via
                  `GET /attachments/{attachmentId}/signed-url?roomId=...` and fetch
                  it. The legacy `x-attachment-metadata` header flow on
                  `GET /attachments/{attachmentId}` is deprecated and now also
                  requires a membership-checked `roomId`.

    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: 400
            detail: "Invalid request body"

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: 401
            detail: "Invalid or missing credentials"

    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: 403
            detail: "You do not have permission to perform this action"

    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: 404
            detail: "The requested resource does not exist"

    TooManyRequests:
      description: Rate limit exceeded
      headers:
        X-RateLimit-Limit:
          description: Maximum requests allowed per window
          schema:
            type: integer
        X-RateLimit-Remaining:
          description: Requests remaining in current window
          schema:
            type: integer
        X-RateLimit-Reset:
          description: Seconds until the rate limit window resets
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: 429
            detail: "rate_limited"

    Conflict:
      description: Conflict (resource already exists)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: 409
            detail: "User already exists"
