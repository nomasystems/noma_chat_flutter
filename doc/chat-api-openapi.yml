        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /rooms/{roomId}/attachments/{messageId}:
    delete:
      x-audience: user
      operationId: deleteRoomAttachment
      summary: Delete an attachment message
      description: |
        Deletes a message that contains an attachment. Returns 400 if the message
        exists but is not an attachment. Only the message sender can delete it.
      tags:
        - attachments
        - messages
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - name: messageId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MessageId"
      responses:
        "204":
          description: Attachment deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /attachments:
    post:
      x-audience: user
      operationId: uploadAttachment
      summary: Upload a file attachment
      description: |
        Upload a file (image, audio, document, etc.). Returns opaque metadata
        that must be included when referencing the attachment in a message.
      tags:
        - attachments
      requestBody:
        content:
          "*/*":
            schema:
              type: string
              format: binary
      responses:
        "200":
          $ref: "#/components/responses/AttachmentMetadataResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          description: Payload too large (max 10MB)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /attachments/{attachmentId}/signed-url:
    get:
      x-audience: user
      operationId: getAttachmentSignedUrl
      summary: Mint a temporary signed download URL for an attachment (recommended)
      description: |
        **Recommended/primary way to download an attachment.** Returns a
        short-lived signed URL that downloads the attachment over
        `GET /attachments/{attachmentId}` WITHOUT the custom
        `x-attachment-metadata` header, so it can be placed directly in an
        `<img>` tag, handed to a CDN, or opened by a native media viewer. Prefer
        this over the legacy `x-attachment-metadata` header flow, which is
        deprecated.

        The caller must be a current member of the owning `roomId` (passed as a
        query parameter); membership is enforced here, so an outsider cannot
        obtain a capability. The returned URL is bound — via HMAC-SHA256 over
        `attachmentId|roomId|userId|expiry` — to this attachment, this room, the
        calling user and an expiry (`attachment_signed_url_ttl_seconds`, default
        3600s). It does not outlive the user's membership: the download path
        re-checks room membership when the URL is used.
      tags:
        - attachments
      parameters:
        - name: attachmentId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AttachmentId"
        - name: roomId
          in: query
          required: true
          description: External UUID of the room that owns the attachment.
          schema:
            $ref: "#/components/schemas/RoomId"
      responses:
        "200":
          description: Signed download URL
          content:
            application/json:
              schema:
                type: object
                required:
                  - url
                properties:
                  url:
                    type: string
                    description: |
                      Relative signed download URL (path + query string with
                      `roomId`, `userId`, `expiry` and `sig`). Append to the API
                      base URL to fetch the attachment without the
                      `x-attachment-metadata` header.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          description: |
            Internal error — the signed URL could not be minted (e.g. no signing
            secret is configured on the server).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /attachments/{attachmentId}:
    get:
      x-audience: user
      operationId: getAttachment
      summary: Download an attachment
      description: |
        Download a previously uploaded attachment. Access is membership-checked:
        the request must carry a server-verifiable binding to the owning room and
        the caller must currently be a member of that room. Two ways supply the
        binding:

        - **(recommended)** a **signed URL** minted by
          `GET /attachments/{attachmentId}/signed-url` (operation
          `getAttachmentSignedUrl`), carrying the `roomId`, `userId`, `expiry`
          and `sig` query parameters. This is the primary download path: the HMAC
          proves the server issued the URL for an authorized member; the embedded
          `userId` must match the caller and membership is re-checked at download
          time, so the URL never outlives membership. No `x-attachment-metadata`
          header is needed in this mode.
        - **(deprecated)** the legacy **`x-attachment-metadata` header** flow,
          which now ALSO requires a `roomId` query parameter the caller is a
          member of. The header alone is no longer a sufficient capability. This
          flow is deprecated in favor of signed URLs (obtained via
          `getAttachmentSignedUrl`) and is kept only for backward compatibility.

        If neither establishes membership, the attachment is never served and the
        response is `403` with the `not_a_room_member` token. The owning room is
        taken from the verified request binding, never from the opaque metadata.

        **Error tokens** (the optional `error` field in the error body): this
        operation may surface `not_a_room_member` (membership could not be
        confirmed), `attachment_not_found` and `message_not_attachment`.
      tags:
        - attachments
      parameters:
        - name: attachmentId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AttachmentId"
        - name: x-attachment-metadata
          in: header
          required: false
          deprecated: true
          description: |
            DEPRECATED. Attachment metadata as base64 (returned from upload).
            Required for the legacy header download mode; omitted when using a
            signed URL. This header-only flow is deprecated in favor of signed
            URLs obtained via `getAttachmentSignedUrl`, and now additionally
            requires a membership-checked `roomId` query parameter. Kept only for
            backward compatibility.
          schema:
            type: string
        - name: roomId
          in: query
          required: false
          description: |
            External UUID of the owning room. Required for the legacy header mode
            (the caller's membership of this room is checked). Also present, and
            signed, on a minted signed URL.
          schema:
            $ref: "#/components/schemas/RoomId"
        - name: userId
          in: query
          required: false
          description: |
            Signed-URL field: the user the URL was minted for. Must match the
            authenticated caller. Present only on minted signed URLs.
          schema:
            type: string
        - name: expiry
          in: query
          required: false
          description: |
            Signed-URL field: absolute unix expiry (seconds). Present only on
            minted signed URLs.
          schema:
            type: integer
            format: int64
        - name: sig
          in: query
          required: false
          description: |
            Signed-URL field: lowercase-hex HMAC-SHA256 signature. Present only on
            minted signed URLs.
          schema:
            type: string
        - $ref: "#/components/parameters/headerUserId"
      responses:
        "200":
          description: Attachment binary data
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

