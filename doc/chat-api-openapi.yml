  # ============================================================
  # ROOM PREFERENCES
  # ============================================================
  /rooms/{roomId}/preferences:
    patch:
      x-audience: user
      operationId: patchRoomPreferences
      summary: Update the caller's room preferences in one request
      description: |
        Unified partial update of the calling user's per-room preferences
        (`muted`, `pinned`, `hidden`). The body is a partial object: a field
        that is absent is left unchanged, and an empty body `{}` is a no-op.
        The response always echoes the full merged preference state.

        `muted` accepts a boolean (`true` for a permanent mute, `false` to
        unmute), an ISO-8601 `date-time` string (mute until that instant, after
        which the room reads as unmuted via lazy expiry), or `null` (unmute).
        When a timed mute is in effect the response includes `muteUntil`.

        **Error tokens** (the optional `error` field in the error body): an
        invalid body surfaces `invalid_preferences`.
      tags:
        - preferences
        - rooms
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: >-
                Partial preferences. Any omitted field is left unchanged; an
                empty object is a no-op.
              properties:
                muted:
                  description: >-
                    `true`/`false` for a permanent mute/unmute, an ISO-8601
                    instant to mute until that time, or `null` to unmute.
                  nullable: true
                  oneOf:
                    - type: boolean
                    - type: string
                      format: date-time
                pinned:
                  type: boolean
                hidden:
                  type: boolean
            examples:
              muteUntil:
                summary: Mute until a specific instant and pin
                value:
                  muted: "2026-12-31T23:59:59Z"
                  pinned: true
              unmute:
                summary: Permanently unmute
                value:
                  muted: false
              noop:
                summary: No-op
                value: {}
      responses:
        "200":
          description: Full merged preference state
          content:
            application/json:
              schema:
                type: object
                required:
                  - muted
                  - pinned
                  - hidden
                properties:
                  muted:
                    type: boolean
                    description: Current effective mute state.
                  pinned:
                    type: boolean
                  hidden:
                    type: boolean
                  muteUntil:
                    type: string
                    format: date-time
                    description: >-
                      Present only when a timed mute is in effect; the instant
                      until which the room stays muted.
              example:
                muted: true
                pinned: true
                hidden: false
                muteUntil: "2026-12-31T23:59:59Z"
        "400":
          description: >-
            Bad request — the body is not a valid partial preferences object
            (`error: invalid_preferences`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                detail: "Invalid preferences"
                error: "invalid_preferences"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ============================================================
  # READ RECEIPTS
  # ============================================================
  /rooms/{roomId}/read:
    post:
      x-audience: user
      operationId: markRoomAsRead
      summary: Mark a room as read
      description: |
        Marks a room as read. If `lastReadMessageId` is provided, marks as read up to that
        specific message AND fans out a `receipt_updated` event of status `read` to the
        other room members (so the original sender's client can flip the second tick).
        If omitted, only the room-level `lastReadAt` is persisted and no event is emitted.
      tags:
        - read-receipts
        - rooms
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lastReadMessageId:
                  type: string
                  description: >
                    The ID of the last message that was read. If omitted, all messages
                    in the room are marked as read.
            examples:
              withMessageId:
                summary: Mark read up to specific message
                value:
                  lastReadMessageId: "msg-001"
              withoutMessageId:
                summary: Mark entire room as read
                value: {}
      responses:
        "204":
          description: Read receipt stored successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /rooms/{roomId}/receipts:
