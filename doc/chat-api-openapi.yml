        - admin
      responses:
        "200":
          description: Webhook runtime configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  timeoutMs:
                    type: integer
                    description: HTTP request timeout in milliseconds.
                  maxRetries:
                    type: integer
                    description: Maximum number of retries per delivery.
                  secretConfigured:
                    type: boolean
                    description: True when a non-empty signing secret is configured.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    put:
      x-audience: admin
      operationId: putAdminWebhooksConfig
      summary: Update webhook runtime configuration (cluster-wide)
      description: |
        Updates the global webhook runtime configuration. The change is
        persisted to the `chat_api_admin_runtime_config` collection,
        applied locally and propagated to every other cluster node under a
        `global:trans` lock. Returns **409 Conflict** if another node is
        already applying a webhook config update.

        The audit entry redacts the `secret` value. Requires admin role.
      tags:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                timeoutMs:
                  type: integer
                  minimum: 1
                  description: HTTP request timeout in milliseconds (must be > 0).
                maxRetries:
                  type: integer
                  minimum: 0
                  description: Maximum number of retries per delivery.
                secret:
                  type: string
                  minLength: 32
                  description: Signing secret. Minimum 32 bytes. Stored opaque.
      responses:
        "200":
          description: Webhook configuration updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Another cluster node is applying a webhook config update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ============================================================
  # INTERNAL (service-to-service, requires API key)
  # ============================================================
  /internal/users:
    post:
      x-audience: internal
      operationId: postInternalUser
      summary: Create user (internal)
      description: Same as POST /users but authenticated via internal API key.
      tags:
        - internal
      security:
        - ApiKeyAuth: []
      requestBody:
        $ref: "#/components/requestBodies/PostUserRequest"
      responses:
        "201":
          $ref: "#/components/responses/PostUserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /internal/users/{userId}:
    delete:
      x-audience: internal
      operationId: deleteInternalUser
      summary: Delete user (internal)
      tags:
        - internal
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/pathUserId"
      responses:
        "204":
          description: User deleted
        "401":
          $ref: "#/components/responses/Unauthorized"

  /internal/rooms:
    post:
      x-audience: internal
      operationId: postInternalRoom
      summary: Create room (internal)
      tags:
        - internal
      security:
        - ApiKeyAuth: []
      parameters:
        - name: x-user-id
          in: header
          required: true
          schema:
            type: string
          description: >-
            External ID of the user that owns the room. The backend resolves
            the actor from this header (falling back to `userId`/`externalIds`
            in the body); without it the request fails.
      requestBody:
        $ref: "#/components/requestBodies/PostRoomRequest"
      responses:
        "201":
          description: Room created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /internal/rooms/{roomId}:
    delete:
      x-audience: internal
      operationId: deleteInternalRoom
      summary: Delete room (internal)
      tags:
        - internal
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
      responses:
        "204":
          description: Room deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /internal/rooms/{roomId}/users:
    post:
      x-audience: internal
      operationId: postInternalRoomUser
      summary: Add user to room (internal)
      tags:
        - internal
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - name: x-user-id
          in: header
          required: true
          schema:
            type: string
          description: >-
            External ID of the inviting user. The backend resolves the actor
            from this header (falling back to `userId`/`externalIds` in the
            body); without it the request fails.
      requestBody:
        $ref: "#/components/requestBodies/PostRoomUserRequest"
      responses:
        "204":
          description: All operations completed successfully
        "207":
          description: >-
            Multi-Status. Some operations succeed and others fail.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - user
                    - result
                  properties:
                    user:
                      $ref: "#/components/schemas/UserId"
                    result:
                      type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /internal/rooms/{roomId}/users/{userId}:
    delete:
      x-audience: internal
      operationId: deleteInternalRoomUser
      summary: Remove user from room (internal)
      description: Same as DELETE /rooms/{roomId}/users/{userId} but authenticated via internal API key.
      tags:
        - internal
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathUserId"
        - name: x-user-id
          in: header
          required: true
          schema:
            type: string
          description: User ID performing the action
      responses:
        "204":
          description: User removed from room
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /internal/rooms/{roomId}/users/{userId}/role:
    put:
      x-audience: internal
      operationId: putInternalRoomUserRole
      summary: Update user role in room (internal)
      description: Same as PUT /rooms/{roomId}/users/{userId}/role but authenticated via internal API key.
      tags:
        - internal
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathUserId"
        - name: x-user-id
          in: header
          required: true
          schema:
            type: string
          description: User ID performing the action
      requestBody:
        $ref: "#/components/requestBodies/PutRoomUserRoleRequest"
      responses:
        "204":
          description: Role updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /internal/rooms/{roomId}/config:
    put:
      x-audience: internal
      operationId: putInternalRoomConfig
      summary: Update room configuration (internal)
      description: Same as PUT /rooms/{roomId}/config but authenticated via internal API key.
      tags:
        - internal
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - name: x-user-id
          in: header
          required: true
          schema:
            type: string
          description: User ID performing the action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                subject:
                  type: string
                avatarUrl:
                  type: string
                custom:
                  type: object
                  additionalProperties: true
      responses:
        "204":
          description: Room configuration updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /internal/rooms/{roomId}/messages:
    post:
      x-audience: internal
      operationId: postInternalRoomMessage
      summary: Send message to room (internal)
      description: |
        Sends a message to a room bypassing membership and moderation checks.
        Authenticated via internal API key.
      tags:
        - internal
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - from
                - body
                - type
              properties:
                from:
                  type: string
                  description: User ID of the sender
                body:
                  type: string
                  description: Message body text
                type:
                  type: string
                  description: "Message type (e.g. regular, system)"
                metadata:
                  type: object
                  description: Optional metadata (for system messages, merged with system flag)
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  from:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
                  text:
                    type: string
                  metadata:
                    type: object
                  messageId:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /internal/contacts:
    post:
      x-audience: internal
      operationId: postInternalContact
      summary: Add a mutual contact relationship (internal)
      description: |
        Adds `contactUserId` to the roster of the user identified by the
        `x-user-id` header AND `x-user-id` to the roster of `contactUserId`,
        so both users immediately see each other in their roster and receive
        presence updates from each other. Authenticated via internal API key.
        Idempotent on each side: a side already in the roster is skipped, so
        callers do not need to make two separate calls. Used by WB backend to
        keep CHT contacts in sync with the social graph (e.g. when a user
        follows another).
      tags:
        - internal
      security:
        - ApiKeyAuth: []
      parameters:
        - name: x-user-id
          in: header
          required: true
          schema:
            type: string
          description: External ID of the user that owns the roster
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - contactUserId
              properties:
                contactUserId:
                  type: string
                  description: External ID of the user to add as contact
      responses:
        "204":
          description: Contact added (or already present)
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /internal/contacts/{userId}/block:
    put:
      x-audience: internal
      operationId: putInternalBlockedUser
      summary: Block a user (internal)
      description: |
        Same as PUT /contacts/{userId}/block but authenticated via internal API key.
        Requires `x-user-id` header to identify the blocking user. Triggers async
        `room_deleted` SSE event to the blocked user if a DM room exists.
      tags:
        - internal
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/pathUserId"
        - name: x-user-id
          in: header
          required: true
          schema:
            type: string
          description: User ID performing the block
      responses:
        "204":
          description: User blocked
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      x-audience: internal
      operationId: deleteInternalBlockedUser
      summary: Unblock a user (internal)
      description: |
        Same as DELETE /contacts/{userId}/block but authenticated via internal API key.
        Requires `x-user-id` header to identify the unblocking user.
      tags:
        - internal
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/pathUserId"
        - name: x-user-id
          in: header
          required: true
          schema:
            type: string
          description: User ID performing the unblock
      responses:
        "204":
          description: User unblocked
        "401":
          $ref: "#/components/responses/Unauthorized"

  /internal/sessions/{userId}:
    delete:
      x-audience: internal
      operationId: deleteInternalSession
      summary: Force-close active session (internal)
      description: |
        Terminates the active realtime (WebSocket) session of the given user. Used by
        WB backend during account deactivation to immediately invalidate the
        user's connection. Authenticated via internal API key.
      tags:
        - internal
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/pathUserId"
      responses:
        "204":
          description: Session closed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /internal/revocations:
    post:
      x-audience: internal
      operationId: postInternalRevocation
      summary: Mark all tokens of a user as revoked (internal)
      description: |
        Records a revocation entry for the user. Any subsequent JWT presented
        with `iat < revokedAt` is rejected with `Token revoked`. The entry
        auto-expires after `revoked_at + revocation_token_ttl` (default 65 min,
        i.e. max access-token TTL plus clock-skew leeway). Idempotent: repeated
        calls keep the maximum `revokedAt`/`expiresAt`. The active session for
        the user is force-closed as part of the call. Used by WB backend on
        logout and account deactivation. Authenticated via internal API key.

        Implementation: state lives in a per-node ETS cache replicated across
        the cluster via RPC and persisted to MongoDB (TTL index on
        `expires_at`) so revocations survive node restarts.
      tags:
        - internal
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, revokedAt]
              properties:
                userId:
                  $ref: "#/components/schemas/UserId"
                revokedAt:
                  type: integer
                  format: int64
                  description: Unix epoch in seconds. Tokens with `iat < revokedAt` are rejected.
                  example: 1714123456
      responses:
        "204":
          description: Revocation recorded
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

# ================================================================
# COMPONENTS
# ================================================================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
    BasicAuth:
      type: http
      scheme: basic
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

  # ----------------------------------------------------------
  # SCHEMAS
  # ----------------------------------------------------------
  schemas:
    UserId:
      type: string
      format: uuid
      example: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"

    RoomId:
      type: string
      format: uuid
      example: "f0e1d2c3-b4a5-4968-8765-432109876543"

    MessageId:
      type: string
      format: uuid
      example: "fbbc32b7-8f1a-4b5c-a685-556fd9ce1cc3"

    AttachmentId:
      type: string
      format: uuid

    ExternalUserId:
      type: string
      minLength: 1

    Metadata:
      type: object
      description: |
        Arbitrary key-value storage. Some keys are interpreted by the server
        depending on the messageType of the parent message:
        - For "location" messages, "lat" and "lng" are required and must be
          numbers (latitude and longitude); "staticMapUrl" is optional and,
          when present, holds a pre-rendered preview URL of the location.
      additionalProperties: true
      properties:
        lat:
          type: number
          description: Latitude. Required when the message has messageType "location".
        lng:
          type: number
          description: Longitude. Required when the message has messageType "location".
        staticMapUrl:
          type: string
          description: Optional pre-rendered static map URL for "location" messages.

    RoomDetail:
      type: object
      required:
        - id
        - name
        - subject
        - type
        - memberCount
        - userRole
        - config
      properties:
        id:
          $ref: "#/components/schemas/RoomId"
        name:
          type: string
          example: "Project chat"
        subject:
          type: string
          example: "Discuss project updates"
        type:
          type: string
          enum:
            - group
            - one-to-one
            - announcement
        createdAt:
          type: string
          nullable: true
          description: Room creation timestamp
        memberCount:
          type: integer
          minimum: 1
          description: Total number of members in the room
        userRole:
          type: string
          enum:
            - owner
            - admin
            - user
          description: The requesting user's role in the room
        avatarUrl:
          type: string
          nullable: true
          maxLength: 2048
        custom:
          type: object
          nullable: true
          additionalProperties: true
        muted:
          type: boolean
          description: Whether the requesting user has muted this room
        pinned:
          type: boolean
          description: Whether the requesting user has pinned this room
        selfMuted:
          type: boolean
          description: Whether an admin/owner has muted (silenced) the requesting user in this room
        config:
          type: object
          properties:
            allowInvitations:
              type: boolean

    UserSearchResult:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        configuration:
          type: object
        displayName:
          type: string
        avatarUrl:
          type: string
        bio:
          type: string
        email:
          type: string

    Error:
      type: object
      required:
        - code
        - detail
      properties:
        code:
          type: integer
        detail:
          type: string
        error:
          type: string
          description: >
            Optional stable, machine-readable error token drawn from a closed
            vocabulary. When present, it identifies the failure semantics
            independently of `detail` (human prose that may change) and `code`
            (a coarse HTTP status), so clients can branch on it reliably. The
            field is OPTIONAL: it is simply ABSENT (never `null`) when no token
            applies to the failure. Clients MUST keep treating `code` and
            `detail` exactly as before; `error` is additive and never replaces
            them. Some tokens in the vocabulary may not yet be emitted by any
            operation — the enum is the canonical set of values the field can
            ever take. Note that the three membership tokens
            `not_a_member`, `not_a_room_member` and `not_member` coexist in the
            vocabulary as-is.
          enum:
            - room_not_found
            - user_not_found
            - managed_user_not_found
            - message_not_found
            - attachment_not_found
            - reaction_not_found
            - referenced_message_not_found
            - announcement_room_not_found
            - scheduled_message_not_found
            - delivery_not_found
            - report_not_found
            - ban_not_found
            - mute_not_found
            - filter_not_found
            - roster_not_found
            - configuration_not_found
            - not_found
            - unauthorized
            - not_authorized
            - forbidden
            - access_denied
            - user_mismatch
            - impersonation_denied
            - admin_panel_disabled
            - cannot_delete_other_user
            - not_a_member
            - not_a_room_member
            - not_member
            - notInvited
            - alreadyMember
            - not_a_contact
            - missing_contacts
            - blocked
            - banned
            - muted
            - user_deactivated
            - cannot_block_yourself
            - cannot_ban_owner
            - cannot_mute_owner
            - cannot_modify_config_admin
            - owner_immutable
            - no_successor
            - room_full
            - already_exists
            - message_deleted
            - message_not_attachment
            - message_blocked_by_content_filter
            - edit_window_expired
            - delete_window_expired
            - invalid_message
            - invalid_external_id
            - unsupported_type
            - invalid_cursor
            - invalid_preferences
            - rate_limited
            - transient
            - timeout
            - ban_failed
            - mute_failed
            - pin_failed
            - unpin_failed
            - star_failed
            - unstar_failed
            - report_failed

    # --- Admin schemas ---
    AdminBan:
      type: object
      properties:
        _id:
          type: string
          description: Document ID (format `userId::roomId`)
        userId:
          type: string
        roomId:
          type: string
        bannedBy:
          type: string
        reason:
          type: string
        bannedAt:
          type: string
          format: date-time

    AdminMute:
      type: object
      properties:
        _id:
          type: string
          description: Document ID (format `userId::roomId`)
        userId:
          type: string
        roomId:
          type: string
        mutedBy:
          type: string
        mutedAt:
          type: string
          format: date-time

    AdminMessage:
      type: object
      description: >
        Message for admin cross-room views. Uses the same field naming as
        the user-facing Message schema, plus a roomId field.
      required:
        - messageId
        - from
        - timestamp
      properties:
        messageId:
          $ref: "#/components/schemas/MessageId"
        from:
          $ref: "#/components/schemas/UserId"
        timestamp:
          type: string
          format: date-time
        text:
          type: string
        text_history:
          type: array
          items:
            type: string
          nullable: true
        template:
          type: string
          nullable: true
        metadata:
          $ref: "#/components/schemas/Metadata"
        isRead:
          type: boolean
        isDeleted:
          type: boolean
        referencedMessageId:
          $ref: "#/components/schemas/MessageId"
        reaction:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/ReactionSummary"
        roomId:
          $ref: "#/components/schemas/RoomId"
          description: Room where the message was sent
        id:
          $ref: "#/components/schemas/MessageId"
          description: Alias of messageId (admin-panel denormalisation)
        body:
          type: string
          nullable: true
          description: Alias of text (admin-panel denormalisation)
        senderId:
          $ref: "#/components/schemas/UserId"
          description: Alias of from (admin-panel denormalisation)
        time:
          type: string
          format: date-time
          description: Alias of timestamp (admin-panel denormalisation)
        deleted:
          type: boolean
          description: Alias of isDeleted (admin-panel denormalisation)
        type:
          $ref: "#/components/schemas/MessageType"
          description: Derived message envelope type
        attachmentUrl:
          type: string
          nullable: true
        attachmentDownloadUrl:
          type: string
          nullable: true
          description: Admin-proxy download URL that bypasses raw slot expiry

    AdminRoom:
      type: object
      description: Room representation for admin endpoints
      required:
        - roomId
        - name
        - memberCount
      properties:
        roomId:
          $ref: "#/components/schemas/RoomId"
        name:
          type: string
        subject:
          type: string
        owner:
          $ref: "#/components/schemas/UserId"
        isPublic:
          type: boolean
          description: Whether the room allows public invitations
        memberCount:
          type: integer
        members:
          type: array
          items:
            $ref: "#/components/schemas/UserId"
        avatarUrl:
          type: string
          nullable: true
        custom:
          type: object
          nullable: true
          additionalProperties: true
        displayNames:
          type: object
          additionalProperties: true
          description: Map of member external id to display name
        type:
          type: string
          nullable: true
          description: Room type (e.g. announcement) or null

    AdminSession:
      type: object
      description: Active user session
      properties:
        userId:
          type: string
          description: External user ID
        mode:
          type: string
          enum:
            - realtime
            - webhook
            - unknown
          description: Delivery mode of the active session callback

    AdminReport:
      type: object
      description: Message report
      properties:
        _id:
          type: string
          description: Document ID
        reporterId:
          type: string
          description: User who filed the report
        messageId:
          type: string
        targetUserId:
          type: string
          description: User the report targets (for user-level reports)
        roomId:
          type: string
          nullable: true
          description: Room the report targets; null for global/user-level reports
        reason:
          type: string
        reportedAt:
          type: string
          format: date-time

    AdminStats:
      type: object
      description: System statistics
      properties:
        totalUsers:
          type: integer
          description: Total registered users
        activeSessions:
          type: integer
          description: Currently active session processes across all nodes
        totalRooms:
          type: integer
          description: Total room count from the `room` collection
        totalMessages:
          type: integer
          description: Total persisted message count from the `message` collection

    DeliveryStats:
      type: object
      description: Message delivery metrics counters
      properties:
        notify_room_attempts:
          type: integer
        notify_room_successes:
          type: integer
        notify_room_failures:
          type: integer
        notify_user_attempts:
          type: integer
        notify_user_successes:
          type: integer
        notify_user_failures:
          type: integer
        scheduled_attempts:
          type: integer
        scheduled_successes:
          type: integer
        scheduled_skipped:
          type: integer

    StatusOk:
      type: object
      properties:
        status:
          type: string
          enum: [ok]

    BulkOperationResult:
      type: object
      required: [ok, errors]
      properties:
        ok:
          type: array
          items:
            type: string
          description: IDs that were processed successfully.
        errors:
          type: array
          items:
            type: object
            required: [id, reason]
            properties:
              id:
                type: string
              reason:
                type: string
          description: IDs that failed, each with the reason. Reasons are
            short tokens (e.g. `panel_admin`, `config_admin`, `not_found`,
            `invalid_id`, `internal_error`).

    # --- Read Receipts ---
    ReadReceipt:
      type: object
      properties:
        userId:
          type: string
          description: The user who read the messages
        lastReadMessageId:
          type: string
          nullable: true
          description: |
            ID of the last message this user marked as read. Absent/null when
            the user has not marked anything read in the room yet (e.g. has a
            delivered cursor but no read marker).
        lastReadAt:
          type: string
          format: date-time
          nullable: true
          description: |
            When the user last marked messages as read. Absent/null when the
            user has never marked anything read in the room.
        lastDeliveredMessageId:
          type: string
          nullable: true
          description: |
            The delivered cursor: ID of the newest message this user's client
            confirmed reception of. Every message at-or-before it in
            conversation order is delivered to this user. Absent/null when the
            user never confirmed delivery in the room. Masked (absent) on rows
            of users with a block relation with the caller.
        lastDeliveredAt:
          type: string
          format: date-time
          nullable: true
          description: |
            When the user last confirmed delivery (confirmation time, not
            message time). Absent/null when the user never confirmed delivery
            in the room. Masked (absent) on rows of users with a block
            relation with the caller.

    # --- Users ---
    User:
      type: object
      required:
        - id
      properties:
        id:
          $ref: "#/components/schemas/UserId"
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
          maxLength: 2048
        bio:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        role:
          type: string
          enum:
            - owner
            - admin
            - user
          description: Global system role
        active:
          type: boolean
        custom:
          type: object
          nullable: true
          additionalProperties: true
        configuration:
          $ref: "#/components/schemas/Configuration"

    Configuration:
      type: object
      properties:
        metadata:
          $ref: "#/components/schemas/Metadata"
        webhook:
          $ref: "#/components/schemas/WebhookConfig"

    WebhookConfig:
      type: object
      description: |
        Webhook endpoint configuration. Event deliveries are at-least-once:
        the same event can be POSTed more than once (e.g. a retry after a
        timeout whose original request was actually delivered). Every
        delivery attempt carries two additive headers the receiver can use
        to deduplicate and order:

        - `X-Webhook-Delivery-Id`: UUID identifying the logical delivery;
          constant across every retry of the same event. Deduplicate on it.
        - `X-Webhook-Attempt`: 1-based attempt counter for that delivery id.

        Delivery order across events is best-effort, not guaranteed; use
        the delivery id plus the event timestamp to reorder if needed.
      properties:
        url:
          type: string
          format: uri
        authToken:
          type: string
          description: Bearer token or basic credentials sent to the webhook.
        authMethod:
          type: string
          enum: [bearer, basic]

    UserRole:
      type: string
      enum:
        - owner
        - admin
        - user

    RoomUser:
      type: object
      required:
        - userId
      properties:
        userId:
          $ref: "#/components/schemas/UserId"
        role:
          $ref: "#/components/schemas/UserRole"
        displayName:
          type: string
          nullable: true
          description: >-
            Resolved display name of the member. Present ONLY when the request
            carried `expand=users`; absent otherwise.
        avatarUrl:
          type: string
          nullable: true
          description: >-
            Resolved avatar URL of the member. Present ONLY when the request
            carried `expand=users`; absent otherwise.

    # --- Contacts ---
    Contact:
      type: object
      required:
        - userId
      properties:
        userId:
          type: string
          description: Canonical external user ID of the contact.

    # --- Rooms ---
    Room:
      type: object
      required:
        - roomId
        - owner
      properties:
        roomId:
          $ref: "#/components/schemas/RoomId"
        name:
          type: string
        subject:
          type: string
        audience:
          type: string
          enum:
            - public
            - contacts
            - unrestricted
        allowInvitations:
          type: boolean
        owner:
          $ref: "#/components/schemas/UserId"
        members:
          type: array
          items:
            $ref: "#/components/schemas/UserId"
        publicToken:
          type: string
        avatarUrl:
          type: string
          nullable: true
          maxLength: 2048
        custom:
          type: object
          nullable: true
          additionalProperties: true
        forceGroup:
          type: boolean
          description: >-
            Present and `true` only when the room was created with
            `forceGroup: true`. Causes the room to always be reported as
            `type: "group"` regardless of member count or `allowInvitations`.

    InvitedRoom:
      type: object
      required:
        - roomId
        - invitedBy
      properties:
        roomId:
          $ref: "#/components/schemas/RoomId"
        invitedBy:
          $ref: "#/components/schemas/UserId"
        roomName:
          type: string
          description: Display name of the room
        subject:
          type: string
          description: Room subject/topic
        roomType:
          type: string
          enum: [public, private]
          description: Whether the room allows public invitations

    UnreadRoom:
      type: object
      required:
        - roomId
        - unreadMessages
      properties:
        roomId:
          $ref: "#/components/schemas/RoomId"
        unreadMessages:
          type: integer
        unreadMentions:
          type: integer
          description: >-
            Number of unread messages in this room that mention the
            authenticated user. `0` when there are none. Lets clients show an
            "@" badge without fetching message bodies.
        lastUnreadMessage:
          type: object
          nullable: true
          description: >-
            Last unread message preview, or `null` when there is no unread
            message in the room.
          properties:
            from:
              type: string
              description: Canonical (normalized) user id of the message sender.
            timestamp:
              type: string
              format: date-time
            body:
              type: string
            attachments:
              type: array
              items:
                type: object
            metadata:
              type: object
              nullable: true
            messageId:
              type: string
            reaction:
              type: array
              nullable: true
              items:
                $ref: "#/components/schemas/ReactionSummary"
            receipt:
              type: string
              enum: [sent, delivered, read]
              description: |
                WhatsApp-style delivery status of the last message. Present only
                when the message was sent by the current user (no receipt is
                emitted for incoming previews). DM semantics: `read` if the other
                participant's lastRead covers the message; `delivered` if their
                lastDelivered covers it; otherwise `sent`. Group semantics
                aggregate with ALL: `read`/`delivered` only when EVERY other
                current member's cursor covers the message. Members with a
                block relation with the caller never count as covering, so
                those previews stall at `sent`.
        name:
          type: string
          description: Room name (group rooms only)
        avatarUrl:
          type: string
          nullable: true
          description: Room avatar URL (group rooms only)
        type:
          type: string
          enum: [group, one-to-one, announcement]
          description: Room type
        memberCount:
          type: integer
          description: Number of members (group rooms only)
        userRole:
          type: string
          enum: [owner, admin, user]
          description: Current user's role in the room (group rooms only)
        muted:
          type: boolean
          description: Whether the user has muted this room
          default: false
        pinned:
          type: boolean
          description: Whether the user has pinned this room
          default: false
        hidden:
          type: boolean
          description: Whether the user has hidden this room
          default: false
        selfMuted:
          type: boolean
          description: Whether an admin/owner has muted (silenced) the requesting user in this room

    UserRooms:
      type: object
      properties:
        invitedRooms:
          type: array
          items:
            $ref: "#/components/schemas/InvitedRoom"
        rooms:
          type: array
          items:
            $ref: "#/components/schemas/UnreadRoom"
        hasMore:
          type: boolean

    # --- Messages ---
    MessageType:
      type: string
      description: |
        Type of a stored/returned message. Reactions are not sent through the
        message-send endpoint; use the canonical
        `POST /rooms/{roomId}/messages/{messageId}/reactions` endpoint instead.
      enum:
        - regular
        - attachment
        - reaction
        - reply
        - audio
        - forward
        - location

    ReceiptStatus:
      type: string
      enum:
        - sent
        - delivered
        - read

    ReceiptUpdateStatus:
      type: string
      description: |
        Status values accepted when updating a receipt via
        `PUT /rooms/{roomId}/messages/{messageId}/receipts`. Only `delivered`
        and `read` are accepted; `sent` is an outbound-only state and the server
        rejects it with `400`.
      enum:
        - delivered
        - read

    ContentFilter:
      type: object
      required:
        - id
        - pattern
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the filter
        pattern:
          type: string
          description: Word or phrase to match (case-insensitive)
        createdAt:
          type: string
          format: date-time
          description: When the filter was created

    ScheduledMessage:
      type: object
      required:
        - id
        - userId
        - roomId
        - sendAt
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the scheduled message
        userId:
          $ref: "#/components/schemas/UserId"
        roomId:
          $ref: "#/components/schemas/RoomId"
        text:
          type: string
          description: Message text to be sent
        metadata:
          type: object
          description: Optional metadata
          nullable: true
        sendAt:
          type: string
          format: date-time
          description: When the message will be sent
        createdAt:
          type: string
          format: date-time
          description: When the scheduled message was created

    ReactionSummary:
      type: object
      properties:
        from:
          type: string
          description: User ID who reacted
        reaction:
          type: string
          description: The emoji character
        time:
          type: string
          format: date-time

    Message:
      type: object
      required:
        - messageId
        - from
        - timestamp
      properties:
        messageId:
          $ref: "#/components/schemas/MessageId"
        from:
          $ref: "#/components/schemas/UserId"
        timestamp:
          type: string
          format: date-time
        text:
          type: string
        messageType:
          $ref: "#/components/schemas/MessageType"
        attachmentUrl:
          type: string
        referencedMessageId:
          $ref: "#/components/schemas/MessageId"
        reaction:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/ReactionSummary"
          description: Aggregated reactions on this message
        metadata:
          $ref: "#/components/schemas/Metadata"
        text_history:
          type: array
          items:
            type: string
          nullable: true
          description: Previous versions of the message text after edits
        template:
          type: string
          nullable: true
          description: Message template identifier
        isRead:
          type: boolean
          description: Whether the message has been read by the current user
        isDeleted:
          type: boolean
          description: Whether the message has been soft-deleted
      example:
        messageId: "fbbc32b7-8f1a-4b5c-a685-556fd9ce1cc3"
        from: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"
        timestamp: "2026-03-27T10:30:00Z"
        text: "Hello team! Sprint planning starts now."
        messageType: "regular"

    NewMessage:
      type: object
      description: |
        Message payload. Required fields depend on messageType:
        - "regular": text is recommended
        - "reply": referencedMessageId and text (or reply) are required
        - "attachment" / "audio": attachmentUrl is required
        - "forward": referencedMessageId and sourceRoomId are required
        - "location": metadata.lat and metadata.lng are required and must be numbers

        Reactions are not created here; use
        `POST /rooms/{roomId}/messages/{messageId}/reactions`.
      required:
        - messageType
      properties:
        from:
          $ref: "#/components/schemas/UserId"
          description: Ignored by the server. The authenticated user is used as sender.
        text:
          type: string
          maxLength: 10000
        messageType:
          type: string
          description: Type of message to send.
          enum:
            - regular
            - attachment
            - reply
            - audio
            - forward
            - location
        referencedMessageId:
          $ref: "#/components/schemas/MessageId"
        attachmentUrl:
          type: string
          description: URL returned from attachment upload
        reply:
          type: string
          description: Reply text for reply messages
        metadata:
          $ref: "#/components/schemas/Metadata"
        sourceRoomId:
          $ref: "#/components/schemas/RoomId"
          description: Source room ID for forwarded messages. Required when messageType is "forward".
        clientMessageId:
          type: string
          maxLength: 128
          description: |
            Optional client-generated idempotency key (e.g. a UUID the SDK
            assigns to its optimistic temporary message). When supplied, the
            send is idempotent over `(roomId, from, clientMessageId)`: a retry
            that replays the same key does not create a duplicate — the server
            returns the already-persisted message with the same `201` as a fresh
            send. The value round-trips inside the response `metadata` (as
            `metadata.clientMessageId`), letting the SDK reconcile its optimistic
            temporary message with the server-assigned `messageId`. Recommended
            on mobile/unreliable networks to make POST retries safe.

    # --- Presence ---
    PresenceStatus:
      type: string
      enum:
        - available
        - away
        - busy
        - dnd
        - offline

    PresenceInfo:
      type: object
      required:
        - userId
        - status
        - online
      properties:
        userId:
          $ref: "#/components/schemas/UserId"
        status:
          $ref: "#/components/schemas/PresenceStatus"
        online:
          type: boolean
        lastSeen:
          type: string
          format: date-time
          nullable: true
          description: Last time the user was online; null if never/unknown
      example:
        userId: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"
        status: "busy"
        online: true
        lastSeen: "2026-03-27T09:15:00Z"

    # --- Activity ---
    Activity:
      type: string
      enum:
        - startsTyping
        - stopsTyping

    # --- Real-time Events ---
    ServerEventType:
      type: string
      enum:
        - new_message
        - message_updated
        - message_deleted
        - room_created
        - room_updated
        - room_deleted
        - user_joined
        - user_left
        - user_role_changed
        - typing
        - presence_changed
        - receipt_updated
        - message_delivered
        - message_acked
        - reaction_added
        - reaction_deleted
        - broadcast
        - user_updated

    ServerEvent:
      type: object
      required:
        - type
        - timestamp
      properties:
        type:
          $ref: "#/components/schemas/ServerEventType"
        timestamp:
          type: string
          format: date-time
        roomId:
          $ref: "#/components/schemas/RoomId"
        userId:
          $ref: "#/components/schemas/UserId"
        messageId:
          type: string
          description: Message identifier (for message_updated, message_deleted, receipt_updated, reaction_added, reaction_deleted)
        message:
          $ref: "#/components/schemas/Message"
        presence:
          $ref: "#/components/schemas/PresenceInfo"
        activity:
          $ref: "#/components/schemas/Activity"
        role:
          type: string
          description: New role (for user_role_changed)
          enum: [owner, admin, user]
        status:
          type: string
          description: >
            Receipt status (for receipt_updated). Emitted by the backend ONLY
            with the value `read`; delivery is NOT signaled here. A separate,
            dedicated `message_delivered` event carries delivery confirmations,
            so clients should not expect a `delivered` value on this field.
          enum: [read]
        contactId:
          $ref: "#/components/schemas/UserId"
          description: Contact identifier (for typing in direct messages)
        fromUserId:
          $ref: "#/components/schemas/UserId"
          description: Sender identifier (for broadcast events)
        emoji:
          type: string
          description: Emoji reaction (for reaction_added)
        data:
          type: object
          additionalProperties: true
          description: |
            Additional event-specific data. Contents depend on event type:
            - new_message: Full message object in `message` field
            - message_updated: `messageId`, `roomId`, and optionally `message` (full updated message object)
            - message_deleted: `messageId` and `roomId`
            - room_created, room_updated, room_deleted: `roomId`
            - user_joined, user_left: `userId` and `roomId`
            - user_role_changed: `userId`, `roomId`, and `role`
            - typing (room): `userId`, `roomId`, and `activity`
            - typing (DM): `userId`, `contactId`, and `activity`
            - presence_changed: `userId` and `status`
            - receipt_updated: `messageId`, `roomId`, `status`, and `userId` (who sent the receipt)
            - message_delivered: `userId` (who confirmed delivery), `messageId`, `seq`, and optionally `roomId`
            - message_acked: `userId`/`toUserId` (the acknowledging party), `messageId`, `seq`, optionally `metadata`, and optionally `roomId`
            - reaction_added: `messageId`, `roomId`, `userId`, and `emoji`
            - reaction_deleted: `messageId` and `roomId`
            - broadcast: `fromUserId` and `message` (text)


  # ----------------------------------------------------------
  # PARAMETERS
  # ----------------------------------------------------------
  parameters:
    headerUserId:
      name: X-From-User-Id
      in: header
      required: false
      description: |
        User ID to act on behalf of. Used for managed-user delegation: a parent
        user authenticates with their own credentials and sets this header to the
        managed user's ID. The server verifies that the authenticated user is the
        parent of the specified user. If the header equals the authenticated user,
        it is a no-op. If the specified user is not a managed user of the
        authenticated user, the server responds 403 with `impersonation_denied`.
      schema:
        $ref: "#/components/schemas/ExternalUserId"

    pathUserId:
      name: userId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/UserId"

    pathParentId:
      name: parentId
      in: path
      required: true
      description: Identifier of the parent user that owns the managed users.
      schema:
        $ref: "#/components/schemas/UserId"

    pathRoomId:
      name: roomId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/RoomId"

    pathMessageId:
      name: messageId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/MessageId"

    queryLimit:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50

    queryOffset:
      name: offset
      in: query
      required: false
      description: Number of items to skip before returning results
      schema:
        type: integer
        minimum: 0
        default: 0

    queryCursor:
      name: cursor
      in: query
      required: false
      description: |
        Opaque pagination cursor. It is the base64 encoding of
        `conversationId:seq:messageId` and is obtained from the `next` field of
        a previous page response; clients MUST treat it as opaque and never
        parse or construct it. When supplied it takes precedence over `offset`,
        and the returned page is filtered to items whose
        underlying sequence is strictly greater than the decoded `seq` (the
        `seq` itself is never exposed in message JSON). An invalid or stale
        cursor returns `400` with `error: invalid_cursor`.
      schema:
        type: string

    queryDirection:
      name: direction
      in: query
      required: false
      description: |
        Direction to page relative to the supplied `cursor`, for bidirectional
        scrolling of message history. Ignored when no `cursor` is given (the
        no-cursor request always returns the latest page).

          - `older` — return the page of messages immediately BEFORE the cursor
            (scroll-up case): items whose underlying sequence is strictly less
            than the cursor's `seq`. Pair this with the response `prev` cursor to
            walk further back into history.
          - `newer` — return messages AFTER the cursor (catch-up case): items
            whose underlying sequence is strictly greater than the cursor's
            `seq`. This is the original forward-only behavior; pair it with the
            response `next` cursor.

        Defaults to `newer`, so a bare `?cursor=...` reproduces the prior
        forward-only paging exactly. Unknown values fall back to `newer`. In
        every direction the page is returned oldest-first and respects `limit`.
      schema:
        type: string
        enum:
          - older
          - newer
        default: newer

    querySort:
      name: sort
      in: query
      required: false
      description: Field name to sort results by
      schema:
        type: string

    queryOrder:
      name: order
      in: query
      required: false
      description: Sort direction (ascending or descending)
      schema:
        type: string
        enum:
          - asc
          - desc
        default: asc

    queryUserIdFilter:
      name: userId
      in: query
      required: false
      description: |
        Optional external user UUID filter. Restricts the result set to the
        rows that involve this user.
      schema:
        $ref: "#/components/schemas/ExternalUserId"

    queryRoomIdFilter:
      name: roomId
      in: query
      required: false
      description: |
        Optional external room UUID filter. Restricts the result set to the
        rows that involve this room.
      schema:
        $ref: "#/components/schemas/RoomId"

    queryExpand:
      name: expand
      in: query
      required: false
      description: |
        Opt-in resource expansion. When set to `users`, each returned member is
        augmented with its profile fields (`displayName`, `avatarUrl`) resolved
        server-side. Omitted by default, in which case members carry only their
        identity and role.
      schema:
        type: string
        enum:
          - users

  # ----------------------------------------------------------
  # REQUEST BODIES
  # ----------------------------------------------------------
  requestBodies:
    PostUserRequest:
      description: |
        Optional body. The user identity is derived from the authentication
        token/headers, but any profile fields supplied here are validated and
        applied in the same request (the endpoint doubles as create + initial
        profile, so no follow-up `PATCH` is needed). Profile changes are
        notified to the user's contacts. `externalIds`/`passwords` are only
        consulted when an `id_mapping_mod`/`basic_auth_mod` is configured.
      required: false
      content:
        application/json:
          schema:
            type: object
            properties:
              displayName:
                type: string
                maxLength: 128
              avatarUrl:
                type: string
                maxLength: 2048
              bio:
                type: string
                maxLength: 500
              email:
                type: string
                maxLength: 256
              custom:
                type: object
                additionalProperties: true
                description: >-
                  Arbitrary client metadata. Serialized form capped at 8192
                  bytes (400 if exceeded).
              externalIds:
                type: string
                description: >-
                  External system identifier, passed to the configured
                  id_mapping_mod to resolve the internal user ID. Only used
                  when id_mapping_mod is configured.
              passwords:
                type: string
                description: >-
                  Credentials for the basic auth module. Only used when
                  basic_auth_mod is configured.

    PostManagedUsersRequest:
      content:
        application/json:
          schema:
            type: object
            required:
              - externalIds
            properties:
              externalIds:
                type: array
                items:
                  type: string

    PostContactRequest:
      content:
        application/json:
          schema:
            type: object
            required:
              - userId
            properties:
              userId:
                $ref: "#/components/schemas/UserId"

    PostRoomRequest:
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                maxLength: 100
              subject:
                type: string
              audience:
                type: string
                enum: [public, contacts, unrestricted]
                description: >-
                  Room visibility. "public" allows anyone, "contacts" requires
                  members to be in the creator's roster, "unrestricted" validates
                  that members exist and are not blocked but does not require roster.
              members:
                type: array
                items:
                  $ref: "#/components/schemas/UserId"
              allowInvitations:
                type: boolean
              avatarUrl:
                type: string
                maxLength: 2048
              custom:
                type: object
                additionalProperties: true
                description: >-
                  Arbitrary client metadata. Serialized form capped at 8192
                  bytes; a larger payload returns `400`.
              forceGroup:
                type: boolean
                description: >-
                  When true, the room is always reported as `type: "group"`
                  regardless of member count or `allowInvitations`. Use this
                  for rooms whose nature is conceptually a group (e.g. plans
                  with two participants) so they are not misclassified as DMs.
          example:
            name: "Project Alpha"
            subject: "Sprint planning and updates"
            audience: "contacts"
            members: ["a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d", "b2c3d4e5-f6a7-4b8c-9d0e-1f2a3b4c5d6e"]
            allowInvitations: true
            forceGroup: false

    PutRoomConfigRequest:
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                maxLength: 100
              subject:
                type: string
              avatarUrl:
                type: string
                maxLength: 2048
              custom:
                type: object
                additionalProperties: true
                description: >-
                  Arbitrary client metadata. Serialized form capped at 8192
                  bytes; a larger payload returns `400`.
          example:
            name: "Project Alpha - v2"
            subject: "Retrospective"

    PostRoomUserRequest:
      content:
        application/json:
          schema:
            type: object
            required:
              - userIds
              - mode
            properties:
              userIds:
                type: array
                minItems: 1
                maxItems: 100
                items:
                  $ref: "#/components/schemas/UserId"
              mode:
                type: string
                enum:
                  - invite
                  - accept_invitation
                  - decline_invitation
                  - invite_and_join
              token:
                type: string
                description: >-
                  Public room join token. Only used with mode "invite_and_join"
                  for public rooms. The server validates this token against the
                  room's publicToken.

    PutRoomUserRoleRequest:
      content:
        application/json:
          schema:
            type: object
            required:
              - role
            properties:
              role:
                type: string
                description: >-
                  Target role. Only `admin` and `user` are assignable; `owner`
                  is not (it is set at room creation and cannot be reassigned
                  through this endpoint — sending it returns `400`).
                enum:
                  - admin
                  - user
          example:
            role: "admin"

    PutRoomActivityRequest:
      content:
        application/json:
          schema:
            type: object
            required:
              - activity
            properties:
              activity:
                $ref: "#/components/schemas/Activity"
              from:
                $ref: "#/components/schemas/UserId"
                description: Ignored by the server. The authenticated user is used as sender.
          example:
            activity: "startsTyping"
            from: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"

    PostRoomMessageRequest:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/NewMessage"
          examples:
            regular:
              summary: Regular text message
              value:
                text: "Hello team! Sprint planning starts now."
                messageType: "regular"
            reply:
              summary: Reply to another message
              value:
                text: "Ready! Let's go."
                messageType: "reply"
                referencedMessageId: "fbbc32b7-8f1a-4b5c-a685-556fd9ce1cc3"
            forward:
              summary: Forward from another room
              value:
                text: "Check this out"
                messageType: "forward"
                referencedMessageId: "fbbc32b7-8f1a-4b5c-a685-556fd9ce1cc3"
                sourceRoomId: "f0e1d2c3-b4a5-4968-8765-432109876543"

    PutRoomMessageRequest:
      content:
        application/json:
          schema:
            type: object
            required:
              - text
            properties:
              from:
                $ref: "#/components/schemas/UserId"
                description: Ignored by the server. The authenticated user is used as sender.
              text:
                type: string
                maxLength: 10000
              metadata:
                $ref: "#/components/schemas/Metadata"

    PutReceiptRequest:
      content:
        application/json:
          schema:
            type: object
            required:
              - status
            properties:
              from:
                $ref: "#/components/schemas/UserId"
              status:
                $ref: "#/components/schemas/ReceiptUpdateStatus"
          example:
            status: "read"
            from: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"

  # ----------------------------------------------------------
  # RESPONSES
  # ----------------------------------------------------------
  responses:
    PostUserResponse:
      description: |
        User created. Returns the assigned external `userId` plus the freshly
        created profile under `user` (id + configuration) — handy so the
        client does not need a follow-up `GET /users/{userId}` to read the
        configuration applied at creation time.
      content:
        application/json:
          schema:
            type: object
            required:
              - userId
              - user
            properties:
              userId:
                $ref: "#/components/schemas/UserId"
                description: The ID assigned to the new user.
              user:
                type: object
                required:
                  - id
                properties:
                  id:
                    type: string
                    description: External user ID (same value as `userId`).
                  configuration:
                    $ref: "#/components/schemas/Configuration"
          example:
            userId: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"
            user:
              id: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"
              configuration:
                metadata: {}
                webhook: null

    GetUserResponse:
      description: |
        User profile wrapped in the `user` key. Returns the public projection
        produced by `user_to_search_json/1`: always includes `id` and
        `configuration`; `displayName`, `avatarUrl`, `bio` and `email` are
        emitted only when the user has set them. Mirrors what
        `GET /v1/users?q=...` exposes for the same user.
      content:
        application/json:
          schema:
            type: object
            properties:
              user:
                type: object
                required:
                  - id
                properties:
                  id:
                    type: string
                    description: External user ID
                  configuration:
                    $ref: "#/components/schemas/Configuration"
                  displayName:
                    type: string
                    description: Optional. Present only when set on the profile.
                  avatarUrl:
                    type: string
                    maxLength: 2048
                    description: Optional. Present only when set on the profile.
                  bio:
                    type: string
                    description: Optional. Present only when set on the profile.
                  email:
                    type: string
                    description: Optional. Present only when set on the profile.
          example:
            user:
              id: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"
              configuration:
                metadata: {}
                webhook: null
              displayName: "Alice"
              avatarUrl: "https://cdn.example.com/avatars/alice.png"
              bio: "Coffee enthusiast"
              email: "alice@example.com"

    ManagedUserResponse:
      description: Managed user info
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/User"

    ManagedUsersListResponse:
      description: List of managed users
      headers:
        X-Total-Count:
          description: Total number of items before pagination
          schema:
            type: integer
      content:
        application/json:
          schema:
            type: object
            properties:
              users:
                type: array
                items:
                  $ref: "#/components/schemas/User"
              hasMore:
                type: boolean

    CreateManagedUsersResponse:
      description: |
        Managed users created. Each entry maps the supplied `externalId` to the
        assigned internal `id`. Unlike the list endpoint this response is a
        thin id-mapping and does not carry full `User` projections or an
        `X-Total-Count` header.
      content:
        application/json:
          schema:
            type: object
            properties:
              users:
                type: array
                items:
                  type: object
                  required:
                    - externalId
                    - id
                  properties:
                    externalId:
                      type: string
                    id:
                      type: string
              hasMore:
                type: boolean

    ContactsListResponse:
      description: List of contacts
      headers:
        X-Total-Count:
          description: Total number of items before pagination
          schema:
            type: integer
      content:
        application/json:
          schema:
            type: object
            properties:
              user:
                type: string
                description: External ID of the authenticated user
              contacts:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"
              hasMore:
                type: boolean

    PostRoomResponse:
      description: Room created
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Room"

    RoomsListResponse:
      description: User rooms with unread info and invitations
      headers:
        X-Total-Count:
          description: Total number of rooms before pagination
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UserRooms"

    RoomUsersResponse:
      description: Users in a room
      headers:
        X-Total-Count:
          description: Total number of items before pagination
          schema:
            type: integer
      content:
        application/json:
          schema:
            type: object
            properties:
              users:
                type: array
                items:
                  $ref: "#/components/schemas/RoomUser"
              hasMore:
                type: boolean

    PostMessageResponse:
      description: Message sent
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Message"
          example:
            messageId: "fbbc32b7-8f1a-4b5c-a685-556fd9ce1cc3"
            from: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"
            timestamp: "2026-03-27T10:30:00Z"
            text: "Hello team! Sprint planning starts now."
            text_history: null
            template: null
            metadata: null

    MessageListResponse:
      description: List of messages
      content:
        application/json:
          schema:
            type: object
            properties:
              messages:
                type: array
                description: |
                  The page of messages, always ordered oldest-first (ascending by
                  the underlying sequence), regardless of paging `direction`.
                items:
                  $ref: "#/components/schemas/Message"
              hasMore:
                type: boolean
                description: |
                  Whether another page exists IN THE REQUESTED `direction`. For
                  `direction=older` it reports older history remaining; for
                  `direction=newer` (the default) it reports newer messages
                  remaining. Use the matching cursor field — `prev` for older,
                  `next` for newer — to fetch that page.
              prev:
                type: string
                nullable: true
                description: |
                  Opaque OLDER cursor, anchored on the OLDEST message in this
                  page. Pass it back as the `cursor` query parameter together
                  with `direction=older` to load older history; repeat with each
                  new `prev` until `hasMore` is `false` (or `prev` is `null`).
                  It is `null` when the page is empty or when its oldest message
                  predates sequence-stamping. Treat the value as opaque.
              next:
                type: string
                nullable: true
                description: |
                  Opaque NEWER cursor, anchored on the NEWEST message in this
                  page. Pass it back as the `cursor` query parameter together
                  with `direction=newer` to catch up on newer messages; repeat
                  with each new `next` until `hasMore` is `false` (or `next` is
                  `null`). It is `null` when the page is empty or when its newest
                  message predates sequence-stamping. Treat the value as opaque.

    AttachmentMetadataResponse:
      description: Attachment uploaded successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              attachment:
                type: object
                description: |
                  Opaque metadata returned by the upload. The client must pass
                  this value as a base64-encoded string in the `x-attachment-metadata`
                  header when downloading the attachment via GET /attachments/{attachmentId}.

    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: 400
            detail: "Invalid request body"
            error: "invalid_message"

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: 401
            detail: "Invalid or missing credentials"
            error: "unauthorized"

    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: 403
            detail: "You do not have permission to perform this action"
            error: "forbidden"

    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: 404
            detail: "The requested resource does not exist"
            error: "room_not_found"

    TooManyRequests:
      description: Rate limit exceeded
      headers:
        X-RateLimit-Limit:
          description: Maximum requests allowed per window
          schema:
            type: integer
        X-RateLimit-Remaining:
          description: Requests remaining in current window
          schema:
            type: integer
        X-RateLimit-Reset:
          description: Seconds until the rate limit window resets
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: 429
            detail: "rate_limited"
            error: "rate_limited"

    Conflict:
      description: Conflict (resource already exists)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: 409
            detail: "User already exists"
            error: "already_exists"
