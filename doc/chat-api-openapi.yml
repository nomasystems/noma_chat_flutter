      x-audience: user
      operationId: batchGetUnreadCounts
      summary: Get unread counts for multiple rooms
      description: |
        Returns unread message counts and last unread message for multiple rooms
        in a single request. Rooms where the user is not a member are silently excluded
        from the response.
      tags:
        - batch
        - rooms
        - read-receipts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - roomIds
              properties:
                roomIds:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items:
                    type: string
                  description: List of room IDs to query
            examples:
              default:
                summary: Get unread counts for several rooms
                value:
                  roomIds:
                    - "room-456"
                    - "room-789"
      responses:
        "200":
          description: Unread counts for requested rooms
          content:
            application/json:
              schema:
                type: object
                properties:
                  rooms:
                    type: array
                    items:
                      type: object
                      properties:
                        roomId:
                          type: string
                        unreadMessages:
                          type: integer
                        lastUnreadMessage:
                          type: object
                          nullable: true
                          description: >-
                            Last unread message preview, or `null` when there is
                            no unread message in the room.
        "400":
