        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ============================================================
  # MESSAGES
  # ============================================================
  /rooms/{roomId}/messages:
    post:
      x-audience: user
      operationId: sendRoomMessage
      summary: Send a message in a room
      description: |
        Send a text message, attachment, reply, or forwarded message to a room.
        The `messageType` field determines the type of message.

        To add an emoji reaction, use the canonical
        `POST /rooms/{roomId}/messages/{messageId}/reactions` endpoint.
        For replies, `referencedMessageId` and `text` (or `reply`) are required.
        For attachments, `attachmentUrl` is required.
        For forwards, `referencedMessageId` and `sourceRoomId` are required.

        In 1:1 DM rooms, returns 403 with `{"code": 403, "detail": "blocked"}` if either
        user has blocked the other. This check does not apply to group rooms.

        **Idempotency.** When the request carries a `clientMessageId`, the send
        is idempotent over `(roomId, from, clientMessageId)`. A retry that
        replays the same `clientMessageId` does not create a duplicate: the
        server returns the already-persisted message with the same `201` as a
        fresh send (the two are indistinguishable by status — reconcile by
        matching `metadata.clientMessageId`).

        **Error tokens** (the optional `error` field in the error body): this
        operation may surface `room_not_found`, `not_member`,
        `message_blocked_by_content_filter`, `blocked` (1:1 DM where either side
        blocked the other), `message_not_found` / `referenced_message_not_found`
        (reply/forward to a missing message), and `rate_limited`.

        **Asynchronous ACK (`ack_mode = async`, the server default).** The
        request body is validated for shape (a malformed body still returns
        `400`), then the server ACKs `201` immediately with a **provisional
        echo** and runs the membership guards, idempotency, content filter and
        persistence afterwards, in per-room order. The provisional body carries
        a server-minted `messageId` that does **not** correspond to the
        persisted message — do not use it for follow-up operations. Reconcile
        the send through `metadata.clientMessageId` on the `new_message` event
        (or the `message_acked` event when sending over WebSocket). Guard
        failures after the ACK (e.g. not a member, blocked, content filter) are
        logged server-side and the message is dropped silently. Deployments
        that need read-your-write REST semantics can set `ack_mode = sync`,
        which restores the fully synchronous behaviour described above.
      tags:
        - messages
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
      requestBody:
        $ref: "#/components/requestBodies/PostRoomMessageRequest"
      responses:
        "201":
          $ref: "#/components/responses/PostMessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    get:
      x-audience: user
      operationId: getRoomMessages
      summary: Get messages in a room
      description: |
        Returns a page of messages in the room, always ordered oldest-first.
        With no `cursor` the server returns the latest page (the newest `limit`
        messages). Page bidirectionally with the opaque `cursor` query parameter
        plus the `direction` parameter and the matching response cursor:

          - **Latest page**: `GET .../messages` (no `cursor`). Then use the
            response `prev` to start loading older history.
          - **Load older** (scroll-up): `GET .../messages?cursor=<prev>&direction=older`,
            then reuse each new `prev`; stop when `hasMore` is `false` (or `prev`
            is `null`).
          - **Catch up newer**: `GET .../messages?cursor=<next>&direction=newer`,
            then reuse each new `next`; stop when `hasMore` is `false` (or `next`
            is `null`).

        `direction` defaults to `newer`, so a bare `?cursor=...` behaves exactly
        like the prior forward-only paging. `hasMore` always refers to the
        requested direction.
      tags:
        - messages
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/headerUserId"
        - $ref: "#/components/parameters/queryCursor"
        - $ref: "#/components/parameters/queryDirection"
        - $ref: "#/components/parameters/queryLimit"
        - name: unreadOnly
          in: query
          description: When true, returns only unread messages. Defaults to false.
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          $ref: "#/components/responses/MessageListResponse"
        "400":
          description: >-
            Bad request — the supplied `cursor` is malformed or stale
            (`error: invalid_cursor`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                detail: "Invalid pagination cursor"
                error: "invalid_cursor"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /rooms/{roomId}/messages/{messageId}:
    put:
      x-audience: user
      operationId: updateRoomMessage
      summary: Edit a message in a room
      description: |
        Edits the caller's own message. Only the author may edit. Edits are
        allowed within a time window after the message was sent (default
        15 minutes); past it the server returns `403` with detail
        `edit window expired`. The window is configurable and may be disabled.

        **Error tokens** (the optional `error` field in the error body): this
        operation may surface `user_mismatch` (not the author),
        `edit_window_expired`, `message_deleted`,
        `message_blocked_by_content_filter`, `message_not_found` and
        `room_not_found`.
      tags:
        - messages
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathMessageId"
        - $ref: "#/components/parameters/headerUserId"
      requestBody:
        $ref: "#/components/requestBodies/PutRoomMessageRequest"
      responses:
        "204":
          description: Message updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: >-
            Forbidden — the caller is not the author, or the edit window has
            expired (detail `edit window expired`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    delete:
      x-audience: user
      operationId: deleteRoomMessage
      summary: Delete a message in a room
      description: |
        Deletes the caller's own message. Only the author may delete. Deletes
        are allowed within a time window after the message was sent (default
        2 days); past it the server returns `403` with detail
        `delete window expired`. The window is configurable and may be disabled.

        **Error tokens** (the optional `error` field in the error body): this
        operation may surface `user_mismatch` (not the author),
        `delete_window_expired`, `message_deleted` (already deleted),
        `message_not_found` and `room_not_found`.
      tags:
        - messages
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathMessageId"
        - $ref: "#/components/parameters/headerUserId"
      responses:
        "204":
          description: Message deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: >-
            Forbidden — the caller is not the author, or the delete window has
            expired (detail `delete window expired`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /rooms/{roomId}/messages/{messageId}/thread:
    get:
      x-audience: user
      operationId: getMessageThread
      summary: Get the complete thread for a message
      description: |
        Returns the root message and all its replies (direct and nested) as a flat
        array sorted by timestamp. Supports the same bidirectional pagination
        parameters as `GET /rooms/{roomId}/messages`: page with `cursor` plus
        `direction` (`older` | `newer`, default `newer`), and `hasMore` always
        refers to the requested direction.
      tags:
        - messages
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathMessageId"
        - $ref: "#/components/parameters/queryLimit"
      responses:
        "200":
          description: Thread messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
                  hasMore:
                    type: boolean
                    description: |
                      Whether another page exists in the requested `direction`.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /rooms/{roomId}/messages/{messageId}/receipts:
    put:
      x-audience: user
      operationId: updateMessageReceipt
      summary: Update message delivery/read receipt
      description: |
        `status` is required (see `ReceiptUpdateStatus`). Semantics:
          - `read` — advances the caller's read marker up to the message.
          - `delivered` — advances the caller's delivered cursor up to the
            message; does NOT touch the read marker. Emits a consolidated
            `message_delivered` event to the other members only when the
            cursor actually advances (repeated or stale confirmations are
            silent no-ops, still `204`).
          - a missing `status`, `sent`, or any other value — rejected with
            `400`.
      tags:
        - messages
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathMessageId"
      requestBody:
        $ref: "#/components/requestBodies/PutReceiptRequest"
      responses:
        "204":
          description: Receipt updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ============================================================
  # REACTIONS
  # ============================================================
  /rooms/{roomId}/messages/{messageId}/reactions:
    get:
      x-audience: user
      operationId: getMessageReactions
      summary: Get aggregated reactions for a message
      description: Returns reactions grouped by emoji with count and list of users who reacted.
      tags:
        - reactions
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathMessageId"
      responses:
        "200":
          description: Aggregated reactions
          content:
            application/json:
              schema:
                type: object
                properties:
                  reactions:
                    type: array
                    items:
                      type: object
                      properties:
                        emoji:
                          type: string
                          description: The reaction emoji
                        count:
                          type: integer
                          description: Number of users who reacted with this emoji
                        users:
                          type: array
                          items:
                            type: string
                          description: List of user IDs who reacted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      x-audience: user
      operationId: postMessageReaction
      summary: Add a reaction to a message
      description: |
        Canonical endpoint for adding an emoji reaction to a message.

        On success the server returns `201` with the public projection of the
        reaction message.

        **Error tokens** (the optional `error` field in the error body): this
        operation may surface `message_not_found` (target message missing),
        `forbidden` (the caller may not react in this room) and `invalid_message`.

        **Asynchronous ACK (`ack_mode = async`, the server default).** The
        emoji is validated synchronously (a malformed body still returns
        `400`), then the server ACKs `201` immediately with a minimal
        provisional echo — `{messageId, from, reaction}`, where `messageId` is
        the **target** message id from the path, not the full updated message
        projection — and applies the reaction afterwards, in per-room order.
        Failures after the ACK (message missing, forbidden) are logged
        server-side and dropped. Deployments that need read-your-write REST
        semantics can set `ack_mode = sync`, which returns the full updated
        message.
      tags:
        - reactions
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathMessageId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - emoji
              properties:
                emoji:
                  type: string
                  description: The reaction emoji to add.
            example:
              emoji: "🚀"
      responses:
        "201":
          description: Reaction added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          description: Internal error — the reaction could not be persisted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      x-audience: user
      operationId: deleteReaction
      summary: Delete own reaction from a message
      description: |
        Removes the caller's own reaction from a message. By default it removes
        the caller's reaction; pass the optional `emoji` query parameter to
        scope the removal to a specific reaction emoji.

        **Error tokens** (the optional `error` field in the error body): this
        operation may surface `reaction_not_found` (the caller has no reaction
        on the message) and `message_not_found`.
      tags:
        - reactions
      parameters:
        - $ref: "#/components/parameters/pathRoomId"
        - $ref: "#/components/parameters/pathMessageId"
        - name: emoji
          in: query
          required: false
          description: >-
            Optional specific reaction emoji to remove. When omitted, the
            caller's reaction on the message is removed.
          schema:
            type: string
      responses:
        "200":
          description: Reaction deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ============================================================
  # MESSAGE SEARCH
  # ============================================================
  /messages/search:
    get:
      x-audience: user
      operationId: searchMessages
      summary: Search messages by text content across the caller's rooms
      description: |
        Full-text search over message bodies. When `roomId` is provided the
        search is scoped to that single room; when `roomId` is omitted the
        search spans all rooms the caller is a member of (the scope is resolved
        server-side from the caller's membership — there is no parameter that
        widens it beyond the caller's own rooms).

        Search is backed by a MongoDB `$text` index over the `body_text` field;
        match semantics follow that index.
      tags:
        - messages
      parameters:
        - name: q
          in: query
          required: true
          description: Search query (min 2 characters)
          schema:
            type: string
            minLength: 2
        - name: roomId
          in: query
          required: false
          description: >-
            Optional room to scope the search to. When omitted, the search spans
            all of the caller's rooms.
          schema:
            $ref: "#/components/schemas/RoomId"
        - $ref: "#/components/parameters/queryLimit"
        - $ref: "#/components/parameters/queryOffset"
        - $ref: "#/components/parameters/querySort"
        - $ref: "#/components/parameters/queryOrder"
      responses:
        "200":
          description: Search results
          headers:
            X-Total-Count:
              description: Total number of items before pagination
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
                  hasMore:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

